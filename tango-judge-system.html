/* ════════════════════════════════════════════
   UTILITY FUNCTIONS
════════════════════════════════════════════ */
function calcEntryScore(entry, scoringType, criteriaKeys) {
  if (!entry) return null;
  if (scoringType === "simple") {
    return entry.simple != null ? Number(entry.simple) : null;
  }
  if (!criteriaKeys || !criteriaKeys.length) return null;
  const vals = criteriaKeys
    .map(k => entry.criteria?.[k])
    .filter(v => v != null && v !== "")
    .map(Number);
  if (!vals.length) return null;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

function calcCoupleAvg(scores, roundId, coupleId, judgeUsers, scoringType, criteriaKeys, avgMode) {
  if (!scores || !scores[roundId]) return null;
  const vals = judgeUsers
    .map(j => calcEntryScore(scores[roundId]?.[j.id]?.[coupleId], scoringType, criteriaKeys))
    .filter(v => v != null);
  if (!vals.length) return null;

  // trimmed: 최고·최저 제외 (심판 3명 이상일 때만 적용)
  if (avgMode === "trimmed" && vals.length >= 3) {
    const sorted = [...vals].sort((a, b) => a - b);
    const trimmed = sorted.slice(1, sorted.length - 1);
    return trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
  }

  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

function isOutlierScore(myScore, myJudgeId, scores, roundId, coupleId, judgeUsers, scoringType, criteriaKeys, threshold) {
  if (myScore == null || !threshold) return false;
  const others = judgeUsers
    .filter(j => j.id !== myJudgeId)
    .map(j => calcEntryScore(scores?.[roundId]?.[j.id]?.[coupleId], scoringType, criteriaKeys))
    .filter(v => v != null);
  if (!others.length) return false;
  const dev = others.filter(v => Math.abs(myScore - v) >= threshold).length;
  return dev >= Math.ceil(others.length * 0.6);
}

function getCatParticipants(tournament, catId) {
  const cat = (tournament.categories || []).find(c => c.id === catId);
  if (!cat) return [];
  return (cat.participantIds || [])
    .map(id => (tournament.participants || []).find(p => p.id === id))
    .filter(Boolean);
}

// 스테이지 순서에서 다음 스테이지키 반환
function getNextStageKey(cat, currentStageKey) {
  const stages = cat.stages || [];
  const idx = stages.findIndex(s => s.stageKey === currentStageKey);
  if (idx < 0 || idx >= stages.length - 1) return null;
  return stages[idx + 1].stageKey;
}

function getPrevStageKey(cat, currentStageKey) {
  const stages = cat.stages || [];
  const idx = stages.findIndex(s => s.stageKey === currentStageKey);
  if (idx <= 0) return null;
  return stages[idx - 1].stageKey;
}

/* ════════════════════════════════════════════
   FIREBASE ARRAY FIX
   Firebase는 배열을 {0:..., 1:...} 객체로 변환함.
   snap.val() 후 이 함수로 재귀 변환 필요.
════════════════════════════════════════════ */
function fixArrays(obj) {
  if (obj === null || obj === undefined) return obj;
  if (Array.isArray(obj)) return obj.map(fixArrays);
  if (typeof obj !== "object") return obj;

  // 모든 키가 연속된 정수 문자열이면 배열로 변환
  const keys = Object.keys(obj);
  if (keys.length > 0) {
    const isNumericArray = keys.every((k, i) => k === String(i));
    if (isNumericArray) {
      return keys.map(k => fixArrays(obj[k]));
    }
  }

  // 객체는 재귀적으로 처리
  const result = {};
  for (const k of keys) {
    result[k] = fixArrays(obj[k]);
  }
  return result;
}

/* ════════════════════════════════════════════
   ERROR BOUNDARY — 흰 화면 방지
════════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:"14px", padding:"24px" }}>
          <style>{STYLE}</style>
          <div style={{ fontSize:"44px" }}>⚠️</div>
          <h2 style={{ color:"var(--red2)", fontSize:"18px" }}>오류가 발생했습니다</h2>
          <p style={{ color:"var(--muted)", fontSize:"13px", textAlign:"center", maxWidth:"400px" }}>
            {String(this.state.error?.message || this.state.error || "알 수 없는 오류")}
          </p>
          <button className="btn btn-gold" onClick={() => window.location.reload()}>
            🔄 새로고침
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function LoginScreen({ users, onLogin, lang, setLang, t }) {
  const [selId, setSelId] = useState((users[0] || {}).id || "");
  const [pw, setPw]       = useState("");
  const [err, setErr]     = useState("");

  const doLogin = () => {
    const user = users.find(u => u.id === selId);
    if (!user) { setErr("계정을 선택하세요"); return; }
    if (user.password !== pw) { setErr(t("wrongPw")); return; }
    setErr(""); onLogin(user);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px" }}>
      <style>{STYLE}</style>
      <div style={{ textAlign:"center", marginBottom:"36px" }}>

        <h1 className="serif" style={{ fontSize:"2.2rem", color:"var(--gold)", letterSpacing:"2px", marginBottom:"4px" }}>
          Tango Judge System
        </h1>
        <p style={{ color:"var(--muted)", fontSize:"12px" }}>© 2026 김동욱 / 김토끼</p>
      </div>

      <div className="card" style={{ width:"100%", maxWidth:"360px", display:"flex", flexDirection:"column", gap:"14px" }}>
        <div style={{ display:"flex", gap:"5px", justifyContent:"center", flexWrap:"wrap" }}>
          {[["ko","한국어"],["en","EN"],["es","ES"],["ja","日本語"],["zh","中文"]].map(([l, lbl]) => (
            <button key={l} className={`pill-tab ${lang===l?"active":""}`}
              onClick={() => setLang(l)} style={{ fontSize:"11px", padding:"3px 10px" }}>
              {lbl}
            </button>
          ))}
        </div>

        <div>
          <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"5px" }}>계정</label>
          <select value={selId} onChange={e => setSelId(e.target.value)}>

                {u.name} ({u.role === "admin" ? "관리자" : u.role === "director" ? "감독관" : "심판"})
              </option>
            ))}
          </select>
        </div>

        <div>
          <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"5px" }}>{t("password")}</label>
          <input type="password" value={pw}
            onChange={e => { setPw(e.target.value); setErr(""); }}
            onKeyDown={e => e.key === "Enter" && doLogin()}
            placeholder="••••" />
          {err && <p style={{ color:"var(--red2)", fontSize:"12px", marginTop:"5px" }}>{err}</p>}
        </div>

        <button className="btn btn-gold" onClick={doLogin} style={{ width:"100%", padding:"11px" }}>
          {t("login")}
        </button>
      </div>
    </div>
  );
}

        </h2>
        <p style={{ color:"var(--muted)", fontSize:"13px", marginBottom:"20px" }}>
          채점표에 표시될 이름을 확인 또는 변경하세요
        </p>
        <input value={name} onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && doConfirm()}
          placeholder={t("namePlaceholder")}
          style={{ marginBottom:"14px", textAlign:"center", fontSize:"16px" }} />
        <button className="btn btn-gold" style={{ width:"100%" }} onClick={doConfirm} disabled={!name.trim()}>
          {t("confirm")} →
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   NAVBAR
════════════════════════════════════════════ */
function Navbar({ user, view, setView, onLogout, lang, setLang, onNameClick, t }) {
  const isAdmin    = user.role === "admin";
  const isDirector = user.role === "director" || isAdmin;

  const tabs = [
    isAdmin    && { id:"setup",    label:"⚙ "+t("setup") },
    isAdmin    && { id:"pmgmt",    label:"👤 "+t("pmgmt") },
    (user.role === "judge" || isAdmin) && { id:"scoring", label:"📋 "+t("scoring") },
    isDirector && { id:"director", label:"🎯 "+t("director") },
    { id:"live",   label:"📡 "+t("live") },
    { id:"export", label:"📤 "+t("export") },
  ].filter(Boolean);

  return (
    <nav>
      <span className="serif" style={{ color:"var(--gold)", fontSize:"1rem", marginRight:"4px" }}>🌹</span>
      {tabs.map(tab => (
        <button key={tab.id} className={`pill-tab ${view === tab.id ? "active" : ""}`}
          onClick={() => setView(tab.id)} style={{ fontSize:"11px", padding:"4px 9px" }}>
          {tab.label}
        </button>
      ))}
      <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:"7px" }}>
        <select value={lang} onChange={e => setLang(e.target.value)}
          style={{ width:"auto", padding:"4px 6px", fontSize:"11px" }}>
          <option value="ko">한국어</option>
          <option value="en">EN</option>
          <option value="es">ES</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
        </select>
        <button className="btn btn-ghost btn-sm" onClick={onNameClick}
          style={{ fontSize:"11px", color:"var(--gold)" }}>
          {user.name} ✏
        </button>
        <button className="btn btn-ghost btn-sm" onClick={onLogout}
          style={{ fontSize:"11px", color:"var(--muted)" }}>
          {t("logout")}
        </button>
      </div>
    </nav>
  );
}


/* ════════════════════════════════════════════
   SETUP PANEL
════════════════════════════════════════════ */
function SetupPanel({ tournament, setTournament, users, setUsers, directorLocks, setDirectorLocks, setJudgeLocks, setScores, t }) {
  const [selCat, setSelCat]           = useState((tournament.categories || [])[0]?.id || "");
  const [catTab, setCatTab]           = useState("basic");
  const [showAddCat, setShowAddCat]   = useState(false);
  const [newCatName, setNewCatName]   = useState("");
  const [newCatType, setNewCatType]   = useState("couple");
  const [newCatScoring, setNewCatScoring] = useState("detailed");
  const [newCatStages, setNewCatStages]   = useState(3);
  const [newRTitle, setNewRTitle]     = useState("");
  const [assigningRound, setAssigningRound] = useState(null);
  const [newJName, setNewJName]       = useState("");
  const [newJPw, setNewJPw]           = useState("");
  const [newDName, setNewDName]       = useState("");
  const [newDPw, setNewDPw]           = useState("");
  const [newAdminPw, setNewAdminPw]   = useState("");
  const [newAdminPw2, setNewAdminPw2] = useState("");
  const [adminPwMsg, setAdminPwMsg]   = useState("");
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  const cat         = (tournament.categories || []).find(c => c.id === selCat);
  const judgeUsers  = (users || []).filter(u => u.role === "judge");
  const dirUsers    = (users || []).filter(u => u.role === "director");
  const visibility  = tournament.roundVisibility || {};

  const updTmt = (patch) => setTournament(prev => ({ ...prev, ...patch }));

  const updCat = (id, patch) => setTournament(prev => ({
    ...prev,
    categories: (prev.categories || []).map(c => c.id === id ? { ...c, ...patch } : c)
  }));

  const moveCat = (id, dir) => {
    const cats = [...(tournament.categories || [])];
    const idx  = cats.findIndex(c => c.id === id);
    const to   = idx + dir;
    if (to < 0 || to >= cats.length) return;
    [cats[idx], cats[to]] = [cats[to], cats[idx]];
    setTournament(prev => ({ ...prev, categories: cats }));
  };

  const addCat = () => {
    if (!newCatName.trim()) return;
    const newC = mkCat(newCatName.trim(), newCatType, newCatScoring, newCatStages, []);
    setTournament(prev => ({ ...prev, categories: [...(prev.categories || []), newC] }));
    setSelCat(newC.id);
    setNewCatName(""); setShowAddCat(false);
  };

  const delCat = (cid) => {
    if (!window.confirm("이 종목을 삭제하시겠습니까? 모든 데이터가 삭제됩니다.")) return;
    const remaining = (tournament.categories || []).filter(c => c.id !== cid);
    setTournament(prev => ({ ...prev, categories: remaining }));
    setSelCat((remaining[0] || {}).id || "");
  };

  const resetCatData = (catId) => {
    if (!window.confirm("이 종목의 모든 채점/확정 데이터를 초기화하시겠습니까?")) return;
    const c = (tournament.categories || []).find(x => x.id === catId);
    if (!c) return;
    updCat(catId, {
      rounds: (c.rounds || []).map(r => ({ ...r, finalized: false, advancedIds: [], coupleIds: [] })),
      stages: (c.stages || []).map(s => ({ ...s, finalized: false, advancedIds: [] }))
    });
    const dl = { ...directorLocks };
    (c.rounds || []).forEach(r => { delete dl[r.id]; });
    setDirectorLocks(dl);
    setScores(prev => {
      const n = { ...prev };
      (c.rounds || []).forEach(r => { delete n[r.id]; });
      return n;
    });
    setJudgeLocks(prev => {
      const n = { ...prev };
      (c.rounds || []).forEach(r => { delete n[r.id]; });
      return n;
    });
  };

  const addRoundToStage = (catId, stageKey, stageLabel) => {
    const c = (tournament.categories || []).find(x => x.id === catId);
    if (!c) return;
    const stageRounds = (c.rounds || []).filter(r => r.stageKey === stageKey);
    const title = newRTitle.trim() || `${stageLabel} ${stageRounds.length + 1}론다`;
    const newR = {
      id: uid(), stageKey, stageName: stageLabel,
      title, coupleIds: [], targetSize: null,
      finalized: false, advancedIds: []
    };
    updCat(catId, { rounds: [...(c.rounds || []), newR] });
    setNewRTitle("");
  };

  const delRound = (catId, rid) => {
    if (!window.confirm("이 론다를 삭제하시겠습니까?")) return;
    const c = (tournament.categories || []).find(x => x.id === catId);
    updCat(catId, { rounds: (c.rounds || []).filter(r => r.id !== rid) });
    const dl = { ...directorLocks }; delete dl[rid]; setDirectorLocks(dl);
  };

  const toggleCouple = (catId, roundId, coupleId) => {
    const c = (tournament.categories || []).find(x => x.id === catId);
    const r = (c.rounds || []).find(x => x.id === roundId);
    const has = (r.coupleIds || []).includes(coupleId);
    const newIds = has
      ? (r.coupleIds || []).filter(id => id !== coupleId)
      : [...(r.coupleIds || []), coupleId];
    updCat(catId, { rounds: (c.rounds || []).map(x => x.id === roundId ? { ...x, coupleIds: newIds } : x) });
  };

  const autoDistribute = (catId, stageKey, mode) => {
    const c = (tournament.categories || []).find(x => x.id === catId);
    if (!c) return;
    const stageRounds = (c.rounds || []).filter(r => r.stageKey === stageKey);
    if (!stageRounds.length) return;
    let pool = getCatParticipants(tournament, catId);
    if (mode === "random") {
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
    } else {
      pool.sort((a, b) => parseInt(a.number) - parseInt(b.number));
    }
    const n = stageRounds.length;
    let idx = 0;
    const distributed = stageRounds.map((r, i) => {
      const sz = r.targetSize || Math.ceil(pool.length / n);
      const chunk = pool.slice(idx, idx + sz).map(p => p.id);
      idx += sz;
      return { ...r, coupleIds: chunk };
    });
    updCat(catId, {
      rounds: (c.rounds || []).map(r => { const d = distributed.find(x => x.id === r.id); return d || r; })
    });
  };

  const toggleVisibility = (rid) => {
    updTmt({ roundVisibility: { ...visibility, [rid]: !visibility[rid] } });
  };

  const addJudge = () => {
    if (!newJName.trim() || !newJPw.trim()) return;
    const jIdx = judgeUsers.length;
    setUsers(prev => [...(prev || []), { id: uid(), name: newJName.trim(), role: "judge", password: newJPw.trim(), jIdx }]);
    setNewJName(""); setNewJPw("");
  };
  const delJudge = (jid) => setUsers(prev => (prev || []).filter(u => u.id !== jid));

  const addDirector = () => {
    if (!newDName.trim() || !newDPw.trim()) return;
    setUsers(prev => [...(prev || []), { id: uid(), name: newDName.trim(), role: "director", password: newDPw.trim() }]);
    setNewDName(""); setNewDPw("");
  };
  const delDirector = (did) => setUsers(prev => (prev || []).filter(u => u.id !== did));

  const changeAdminPw = () => {
    if (!newAdminPw.trim()) { setAdminPwMsg("비밀번호를 입력하세요"); return; }
    if (newAdminPw !== newAdminPw2) { setAdminPwMsg("비밀번호가 일치하지 않습니다"); return; }
    if (newAdminPw.length < 4) { setAdminPwMsg("4자 이상 입력하세요"); return; }
    setUsers(prev => (prev || []).map(u => u.role === "admin" ? { ...u, password: newAdminPw.trim() } : u));
    setNewAdminPw(""); setNewAdminPw2(""); setAdminPwMsg("✓ 비밀번호가 변경됐습니다");
  };

  const resetAdminPw = () => {
    setUsers(prev => (prev || []).map(u => u.role === "admin" ? { ...u, password: "0000" } : u));
    setShowResetConfirm(false); setAdminPwMsg("✓ admin 비밀번호가 0000으로 초기화됐습니다");
  };

  return (
    <div style={{ padding:"20px", maxWidth:"920px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"16px" }}>

      {/* ── 대회 기본설정 ── */}
      <div className="card">
        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"14px" }}>🏆 대회 기본설정</h3>
        <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
            <label style={{ fontSize:"12px", color:"var(--muted)", whiteSpace:"nowrap" }}>대회명</label>
            <input value={tournament.name || ""} onChange={e => updTmt({ name: e.target.value })} style={{ maxWidth:"300px" }} />
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" }}>
            <label style={{ display:"flex", alignItems:"center", gap:"8px", cursor:"pointer" }}>
              <input type="checkbox" checked={tournament.outlierEnabled !== false}
                onChange={e => updTmt({ outlierEnabled: e.target.checked })} />
              <span style={{ fontSize:"13px" }}>이탈경고 활성화</span>
            </label>
            {tournament.outlierEnabled !== false && (
              <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                <label style={{ fontSize:"12px", color:"var(--muted)" }}>기준</label>
                <input type="number" min={0.5} max={5} step={0.5}
                  value={tournament.outlierThreshold || 2}
                  onChange={e => updTmt({ outlierThreshold: Number(e.target.value) })}
                  style={{ width:"70px" }} />
                <label style={{ fontSize:"12px", color:"var(--muted)" }}>점 이상 차이</label>
              </div>
            )}
          </div>
          <label style={{ display:"flex", alignItems:"center", gap:"8px", cursor:"pointer" }}>
            <input type="checkbox" checked={tournament.showAvgToJudge !== false}
              onChange={e => updTmt({ showAvgToJudge: e.target.checked })} />
            <span style={{ fontSize:"13px" }}>심판에게 실시간 평균점수 표시</span>
          </label>
        </div>
      </div>

      {/* ── 관리자 보안 설정 ── */}
      <div className="card">
        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"14px" }}>🔐 관리자 보안 설정</h3>
        <div style={{ display:"flex", flexDirection:"column", gap:"14px" }}>
          <div>
            <p style={{ fontSize:"13px", fontWeight:600, marginBottom:"8px" }}>관리자 비밀번호 변경</p>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"flex-end" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:"6px", flex:1, minWidth:"160px" }}>
                <input type="password" value={newAdminPw}
                  onChange={e => { setNewAdminPw(e.target.value); setAdminPwMsg(""); }}
                  placeholder="새 비밀번호 (4자 이상)" />
                <input type="password" value={newAdminPw2}
                  onChange={e => { setNewAdminPw2(e.target.value); setAdminPwMsg(""); }}
                  placeholder="비밀번호 확인" />
              </div>
              <button className="btn btn-gold btn-sm" onClick={changeAdminPw}>변경</button>
            </div>
            {adminPwMsg && (
              <p style={{ fontSize:"12px", marginTop:"6px", color: adminPwMsg.startsWith("✓") ? "var(--green)" : "var(--red2)" }}>
                {adminPwMsg}
              </p>
            )}
          </div>
          <div style={{ borderTop:"1px solid var(--border)", paddingTop:"12px" }}>
            <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"8px" }}>
              비밀번호를 잊어버린 경우: admin 비밀번호를 <strong style={{ color:"var(--text)" }}>0000</strong>으로 초기화합니다.
            </p>
            {!showResetConfirm
              ? <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--red2)", color:"var(--red2)" }}
                  onClick={() => setShowResetConfirm(true)}>
                  ⚠ admin 비밀번호 0000으로 초기화
                </button>
              : <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  <span style={{ fontSize:"12px", color:"var(--warn)" }}>정말 초기화하시겠습니까?</span>
                  <button className="btn btn-red btn-sm" onClick={resetAdminPw}>확인</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => setShowResetConfirm(false)}>취소</button>
                </div>
            }
          </div>
        </div>
      </div>

      {/* ── 관객 라이브 공개 관리 ── */}
      <div className="card">
        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"10px" }}>📡 관객 라이브 공개 관리</h3>
        <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"12px" }}>
          <code style={{ background:"var(--bg3)", padding:"1px 6px", borderRadius:"4px", fontSize:"11px" }}>URL?public</code>으로 접속 시 볼 수 있는 론다를 설정합니다.
          준결승·결승은 비공개 유지 후 발표 직전에 공개하세요.
        </p>
        {(tournament.categories || []).map(c => (
          <div key={c.id} style={{ marginBottom:"10px" }}>
            <p style={{ fontSize:"12px", fontWeight:700, marginBottom:"5px" }}>{c.name}</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"5px" }}>
              {(c.rounds || []).length === 0
                ? <span style={{ fontSize:"11px", color:"var(--muted)" }}>론다 없음</span>
                : (c.rounds || []).map(r => {
                    const pub = visibility[r.id];
                    const stage = (c.stages || []).find(s => s.stageKey === r.stageKey);
                    const stageIdx = (c.stages || []).findIndex(s => s.stageKey === r.stageKey);
                    const stageColor = stageIdx === 0 ? "var(--gold)" : stageIdx === (c.stages||[]).length-1 ? "var(--green)" : "var(--blue)";
                    return (
                      <button key={r.id} onClick={() => toggleVisibility(r.id)}
                        style={{ padding:"4px 12px", borderRadius:"20px", fontSize:"11px", fontWeight:600, cursor:"pointer",
                          border:"1px solid "+(pub ? stageColor : "var(--border)"),
                          background: pub ? "rgba(39,174,96,.1)" : "var(--bg3)",
                          color: pub ? "var(--green)" : "var(--muted)", transition:"all .15s" }}>
                        {pub ? "🟢" : "⚫"} {r.title}
                      </button>
                    );
                  })
              }
            </div>
          </div>
        ))}
        <div style={{ marginTop:"10px", padding:"10px 14px", background:"var(--bg3)", borderRadius:"8px", display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" }}>
          <code style={{ fontSize:"12px", color:"var(--gold)" }}>
            {typeof window !== "undefined" ? window.location.href.split("?")[0] : "[URL]"}?public
          </code>
          <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px" }}
            onClick={() => {
              const url = (typeof window !== "undefined" ? window.location.href.split("?")[0] : "") + "?public";
              navigator.clipboard?.writeText(url).then(() => alert("관객 URL 복사됨!")).catch(() => alert(url));
            }}>
            🔗 URL 복사
          </button>
        </div>
      </div>

      {/* ── 계정 관리 ── */}
      <div className="card">
        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"16px" }}>👤 계정 관리</h3>

        {/* 감독관 */}
        <div style={{ marginBottom:"20px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px" }}>
            <span style={{ fontSize:"13px", fontWeight:700, color:"var(--blue)" }}>🎯 감독관</span>
            <span className="tag tag-muted" style={{ fontSize:"10px" }}>{dirUsers.length}명</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"5px", marginBottom:"8px" }}>
            {dirUsers.length === 0 && <p style={{ fontSize:"12px", color:"var(--muted)", fontStyle:"italic" }}>없음</p>}
            {dirUsers.map(d => (
              <div key={d.id} style={{ display:"flex", alignItems:"center", gap:"8px", padding:"7px 12px", background:"rgba(52,152,219,.07)", border:"1px solid rgba(52,152,219,.2)", borderRadius:"8px" }}>
                <span style={{ fontWeight:600, flex:1 }}>{d.name}</span>
                <span style={{ fontSize:"11px", color:"var(--muted)", background:"var(--bg3)", padding:"2px 7px", borderRadius:"4px" }}>ID: {d.id}</span>
                <span style={{ fontSize:"11px", color:"var(--muted)", background:"var(--bg3)", padding:"2px 7px", borderRadius:"4px" }}>PW: {d.password}</span>
                <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }} onClick={() => delDirector(d.id)}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
            <input value={newDName} onChange={e => setNewDName(e.target.value)} placeholder="감독관 이름"
              style={{ flex:1, minWidth:"120px" }} onKeyDown={e => e.key === "Enter" && addDirector()} />
            <input value={newDPw} onChange={e => setNewDPw(e.target.value)} placeholder="비밀번호"
              style={{ width:"100px" }} onKeyDown={e => e.key === "Enter" && addDirector()} />
            <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--blue)", color:"var(--blue)" }} onClick={addDirector}>
              + 감독관
            </button>
          </div>
        </div>

        {/* 심판 */}
        <div style={{ borderTop:"1px solid var(--border)", paddingTop:"16px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px" }}>
            <span style={{ fontSize:"13px", fontWeight:700, color:"var(--gold)" }}>⚖ 심판</span>
            <span className="tag tag-muted" style={{ fontSize:"10px" }}>{judgeUsers.length}명</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"5px", marginBottom:"8px" }}>
            {judgeUsers.length === 0 && <p style={{ fontSize:"12px", color:"var(--muted)", fontStyle:"italic" }}>없음</p>}
            {judgeUsers.map(j => (
              <div key={j.id} style={{ display:"flex", alignItems:"center", gap:"8px", padding:"7px 12px", background:"rgba(201,168,76,.07)", border:"1px solid rgba(201,168,76,.2)", borderRadius:"8px" }}>
                <span style={{ fontWeight:600, flex:1 }}>{j.name}</span>
                <span style={{ fontSize:"11px", color:"var(--muted)", background:"var(--bg3)", padding:"2px 7px", borderRadius:"4px" }}>ID: {j.id}</span>
                <span style={{ fontSize:"11px", color:"var(--muted)", background:"var(--bg3)", padding:"2px 7px", borderRadius:"4px" }}>PW: {j.password}</span>
                <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }} onClick={() => delJudge(j.id)}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
            <input value={newJName} onChange={e => setNewJName(e.target.value)} placeholder="심판 이름"
              style={{ flex:1, minWidth:"120px" }} onKeyDown={e => e.key === "Enter" && addJudge()} />
            <input value={newJPw} onChange={e => setNewJPw(e.target.value)} placeholder="비밀번호"
              style={{ width:"100px" }} onKeyDown={e => e.key === "Enter" && addJudge()} />
            <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--gold)", color:"var(--gold)" }} onClick={addJudge}>
              + 심판
            </button>
          </div>
        </div>
      </div>

      {/* ── 종목 관리 ── */}
      <div className="card">
        <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"14px" }}>
          <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)" }}>🎵 종목 관리</h3>
          <span className="tag tag-muted" style={{ fontSize:"10px" }}>{(tournament.categories || []).length}개</span>
          <button className="btn btn-ghost btn-sm" style={{ marginLeft:"auto", borderColor:"var(--green)", color:"var(--green)", fontSize:"11px" }}
            onClick={() => setShowAddCat(s => !s)}>
            {showAddCat ? "▲ 닫기" : "＋ 종목 추가"}
          </button>
        </div>

        {/* 종목 추가 폼 */}
        {showAddCat && (
          <div style={{ background:"rgba(39,174,96,.06)", border:"1px solid rgba(39,174,96,.2)", borderRadius:"8px", padding:"14px", marginBottom:"14px" }}>
            <p style={{ fontSize:"12px", color:"var(--green)", fontWeight:700, marginBottom:"10px" }}>＋ 새 종목</p>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
              <input value={newCatName} onChange={e => setNewCatName(e.target.value)}
                placeholder="종목명" style={{ flex:1, minWidth:"140px" }}
                onKeyDown={e => e.key === "Enter" && addCat()} />
              <select value={newCatType} onChange={e => setNewCatType(e.target.value)} style={{ width:"110px", padding:"8px 10px" }}>
                <option value="couple">커플</option>
                <option value="jacknjill">잭앤질</option>
              </select>
              <select value={newCatScoring} onChange={e => setNewCatScoring(e.target.value)} style={{ width:"120px", padding:"8px 10px" }}>
                <option value="detailed">항목별 채점</option>
                <option value="simple">단순 점수</option>
              </select>
              <select value={newCatStages} onChange={e => setNewCatStages(Number(e.target.value))} style={{ width:"130px", padding:"8px 10px" }}>
                <option value={2}>2단계 (예선→결승)</option>
                <option value={3}>3단계 (예선→준결→결)</option>
                <option value={4}>4단계 (4강→결승)</option>
              </select>
              <button className="btn btn-green btn-sm" onClick={addCat} disabled={!newCatName.trim()}>추가</button>
            </div>
          </div>
        )}

        {/* 종목 탭 */}
        <div style={{ display:"flex", gap:"5px", flexWrap:"wrap", marginBottom:"14px" }}>
          {(tournament.categories || []).map((c, idx) => (
            <div key={c.id} style={{ display:"flex", alignItems:"center", gap:"2px" }}>
              <button className={`pill-tab ${selCat === c.id ? "active" : ""}`}
                onClick={() => { setSelCat(c.id); setCatTab("basic"); }}>
                {c.name}
              </button>
              <button className="btn btn-ghost" style={{ padding:"2px 4px", fontSize:"10px" }}
                onClick={() => moveCat(c.id, -1)} disabled={idx === 0}>▲</button>
              <button className="btn btn-ghost" style={{ padding:"2px 4px", fontSize:"10px" }}
                onClick={() => moveCat(c.id, 1)} disabled={idx === (tournament.categories || []).length - 1}>▼</button>
            </div>
          ))}
        </div>

        {cat && (
          <div>
            {/* 서브탭 */}
            <div style={{ display:"flex", gap:"5px", marginBottom:"14px", borderBottom:"1px solid var(--border)", paddingBottom:"12px" }}>
              {[["basic","⚙ 기본"], ["rounds","📋 론다"]].map(([id, lbl]) => (
                <button key={id} className={`pill-tab ${catTab === id ? "gold" : ""}`}
                  onClick={() => setCatTab(id)} style={{ fontSize:"11px" }}>
                  {lbl}
                </button>
              ))}
              <div style={{ marginLeft:"auto", display:"flex", gap:"5px" }}>
                <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px", color:"var(--warn)" }}
                  onClick={() => resetCatData(cat.id)}>⚠ 데이터 초기화</button>
                <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px", color:"var(--red2)", borderColor:"var(--red2)" }}
                  onClick={() => delCat(cat.id)}>🗑 종목 삭제</button>
              </div>
            </div>

            {/* 기본설정 탭 */}
            {catTab === "basic" && (
              <div style={{ display:"flex", flexDirection:"column", gap:"14px" }}>
                <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"center" }}>
                  <div style={{ flex:1, minWidth:"160px" }}>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"4px" }}>종목명</label>
                    <input value={cat.name} onChange={e => updCat(cat.id, { name: e.target.value })} />
                  </div>
                  <div>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"4px" }}>유형</label>
                    <select value={cat.type} onChange={e => updCat(cat.id, { type: e.target.value })} style={{ width:"120px" }}>
                      <option value="couple">커플</option>
                      <option value="jacknjill">잭앤질</option>
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"4px" }}>채점방식</label>
                    <select value={cat.scoringType} onChange={e => updCat(cat.id, { scoringType: e.target.value })} style={{ width:"120px" }}>
                      <option value="detailed">항목별</option>
                      <option value="simple">단순점수</option>
                    </select>
                  </div>
                </div>

                {/* 평균 계산 방식 */}
                <div>
                  <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"6px" }}>평균 계산 방식</label>
                  <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
                    {[["normal","일반 평균 (전체 심판 합산)"],["trimmed","절사 평균 (최고·최저 제외, 3명 이상)"]].map(([v, lbl]) => (
                      <label key={v} style={{ display:"flex", alignItems:"center", gap:"7px", cursor:"pointer", padding:"6px 12px", borderRadius:"8px",
                        background: cat.scoringAvgMode === v ? "rgba(201,168,76,.12)" : "var(--bg3)",
                        border:"1px solid "+(cat.scoringAvgMode === v ? "var(--gold)" : "var(--border)") }}>
                        <input type="radio" checked={cat.scoringAvgMode === v}
                          onChange={() => updCat(cat.id, { scoringAvgMode: v })} />
                        <span style={{ fontSize:"12px" }}>{lbl}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {/* 채점 항목 */}
                {cat.scoringType === "detailed" && (
                  <div>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"6px" }}>채점 항목</label>
                    <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                      {(cat.criteria || []).map((k, i) => (
                        <div key={i} style={{ display:"flex", alignItems:"center", gap:"3px" }}>
                          <input value={k} style={{ width:"90px" }}
                            onChange={e => {
                              const c2 = [...(cat.criteria || [])];
                              c2[i] = e.target.value;
                              updCat(cat.id, { criteria: c2 });
                            }} />
                          <button className="btn btn-ghost" style={{ padding:"4px 6px", fontSize:"11px", color:"var(--red2)" }}
                            onClick={() => updCat(cat.id, { criteria: (cat.criteria || []).filter((_, j) => j !== i) })}>×</button>
                        </div>
                      ))}
                      <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px" }}
                        onClick={() => updCat(cat.id, { criteria: [...(cat.criteria || []), "항목"] })}>
                        + 항목 추가
                      </button>
                    </div>
                  </div>
                )}

                {/* 스테이지 단계 변경 */}
                <div>
                  <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"6px" }}>토너먼트 단계</label>
                  <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                    {[[2,"2단계 (예선→결승)"],[3,"3단계 (예선→준결→결)"],[4,"4단계 (4강포함)"]].map(([n, lbl]) => (
                      <label key={n} style={{ display:"flex", alignItems:"center", gap:"7px", cursor:"pointer", padding:"6px 12px", borderRadius:"8px",
                        background: (cat.stageCount || 3) === n ? "rgba(52,152,219,.1)" : "var(--bg3)",
                        border:"1px solid "+((cat.stageCount || 3) === n ? "var(--blue)" : "var(--border)") }}>
                        <input type="radio" checked={(cat.stageCount || 3) === n}
                          onChange={() => {
                            if (!window.confirm("스테이지 단계를 변경하면 기존 스테이지 데이터가 초기화됩니다. 계속하시겠습니까?")) return;
                            const newStages = mkStages(n);
                            updCat(cat.id, {
                              stageCount: n,
                              stages: newStages,
                              rounds: (cat.rounds || []).filter(r => newStages.some(s => s.stageKey === r.stageKey))
                            });
                          }} />
                        <span style={{ fontSize:"12px" }}>{lbl}</span>
                      </label>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* 론다 탭 */}
            {catTab === "rounds" && (
              <div style={{ display:"flex", flexDirection:"column", gap:"20px" }}>
                {(cat.stages || []).map((stage, si) => {
                  const stageRounds = (cat.rounds || []).filter(r => r.stageKey === stage.stageKey);
                  const prevStageKey = getPrevStageKey(cat, stage.stageKey);
                  const prevStage = prevStageKey ? (cat.stages || []).find(s => s.stageKey === prevStageKey) : null;
                  const unlocked = !prevStage || prevStage.finalized;
                  const stageColor = si === 0 ? "var(--gold)" : si === (cat.stages||[]).length-1 ? "var(--green)" : "var(--blue)";

                  return (
                    <div key={stage.stageKey}>
                      <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px" }}>
                        <span style={{ fontWeight:700, color:stageColor, fontSize:"14px" }}>{stage.label}</span>
                        {stage.finalized && <span className="tag tag-green" style={{ fontSize:"10px" }}>✓ 확정</span>}
                        {!unlocked && <span style={{ fontSize:"11px", color:"var(--muted)" }}>🔒 이전 스테이지 미확정</span>}
                        {unlocked && !stage.finalized && stageRounds.length > 0 && (
                          <div style={{ marginLeft:"auto", display:"flex", gap:"5px" }}>
                            <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px" }}
                              onClick={() => autoDistribute(cat.id, stage.stageKey, "order")}>🔢 번호순</button>
                            <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px" }}
                              onClick={() => autoDistribute(cat.id, stage.stageKey, "random")}>🔀 랜덤</button>
                          </div>
                        )}
                      </div>

                      {stageRounds.map(r => {
                        const isLocked = directorLocks?.[r.id];
                        const catPs    = getCatParticipants(tournament, cat.id);
                        const otherAssigned = new Set(
                          stageRounds.filter(x => x.id !== r.id).flatMap(x => x.coupleIds || [])
                        );

                        return (
                          <div key={r.id} style={{ background:"var(--bg3)", borderRadius:"8px", padding:"10px 12px", marginBottom:"6px", border:"1px solid var(--border)" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:"7px", flexWrap:"wrap" }}>
                              <span style={{ fontWeight:600, fontSize:"13px" }}>{r.title}</span>
                              <span className="tag tag-muted" style={{ fontSize:"10px" }}>{(r.coupleIds||[]).length}팀</span>
                              {isLocked && <span className="tag tag-green" style={{ fontSize:"10px" }}>🔒 확정</span>}
                              <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:"5px" }}>
                                <label style={{ fontSize:"11px", color:"var(--muted)" }}>목표</label>
                                <input type="number" min={1} max={99} value={r.targetSize || ""}
                                  placeholder="명" style={{ width:"55px", padding:"3px 6px", fontSize:"11px" }}
                                  onChange={e => updCat(cat.id, { rounds: (cat.rounds||[]).map(x => x.id===r.id ? {...x,targetSize:parseInt(e.target.value)||null} : x) })} />
                                {unlocked && !isLocked && !stage.finalized && (
                                  <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px" }}
                                    onClick={() => setAssigningRound(assigningRound === r.id ? null : r.id)}>
                                    {assigningRound === r.id ? "닫기" : "수동배정"}
                                  </button>
                                )}
                                {unlocked && !isLocked && !stage.finalized && (
                                  <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)", fontSize:"11px" }}
                                    onClick={() => delRound(cat.id, r.id)}>×</button>
                                )}
                              </div>
                            </div>

                            {(r.coupleIds||[]).length > 0 && (
                              <div style={{ marginTop:"7px", display:"flex", flexWrap:"wrap", gap:"4px" }}>
                                {(r.coupleIds||[]).map(pid => {
                                  const p = (tournament.participants||[]).find(x => x.id === pid);
                                  if (!p) return null;
                                  return (
                                    <span key={pid} style={{ display:"inline-flex", alignItems:"center", gap:"3px", background:"rgba(201,168,76,.1)", border:"1px solid rgba(201,168,76,.25)", borderRadius:"4px", padding:"2px 6px", fontSize:"11px" }}>
                                      <span style={{ color:"var(--gold)", fontWeight:700 }}>{p.number}</span>
                                      {p.nickname && <span style={{ color:"var(--muted)" }}>{p.nickname}</span>}
                                    </span>
                                  );
                                })}
                              </div>
                            )}

                            {assigningRound === r.id && unlocked && !isLocked && (
                              <div style={{ marginTop:"10px" }}>
                                <p style={{ fontSize:"11px", color:"var(--muted)", marginBottom:"5px" }}>
                                  클릭으로 배정/해제 | 🔒 = 다른 론다에 이미 배정됨
                                </p>
                                <div style={{ display:"flex", flexWrap:"wrap", gap:"5px" }}>
                                  {catPs.map(p => {
                                    const inThis  = (r.coupleIds||[]).includes(p.id);
                                    const inOther = !inThis && otherAssigned.has(p.id);
                                    return (
                                      <label key={p.id} style={{
                                        display:"flex", alignItems:"center", gap:"4px", padding:"4px 8px",
                                        background: inThis ? "rgba(201,168,76,.15)" : inOther ? "rgba(192,57,43,.07)" : "var(--bg2)",
                                        borderRadius:"6px", cursor: inOther ? "not-allowed" : "pointer", fontSize:"11px",
                                        border:"1px solid "+(inThis?"var(--gold)":inOther?"rgba(192,57,43,.35)":"var(--border)"),
                                        opacity: inOther ? 0.5 : 1, pointerEvents: inOther ? "none" : "auto"
                                      }}>
                                        <input type="checkbox" checked={inThis}
                                          onChange={() => !inOther && toggleCouple(cat.id, r.id, p.id)} />
                                        <span style={{ color: inOther ? "var(--red2)" : "var(--gold)", fontWeight:700 }}>{p.number}</span>
                                        <span>{p.nickname || "–"}</span>
                                        {inOther && <span style={{ fontSize:"9px" }}>🔒</span>}
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}

                      {unlocked && !stage.finalized && (
                        <div style={{ display:"flex", gap:"6px" }}>
                          <input value={newRTitle} onChange={e => setNewRTitle(e.target.value)}
                            placeholder={`${stage.label} 론다 제목 (비우면 자동)`}
                            style={{ flex:1, fontSize:"12px" }} />
                          <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--gold)", color:"var(--gold)" }}
                            onClick={() => addRoundToStage(cat.id, stage.stageKey, stage.label)}>
                            + 론다 추가
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════
   PARTICIPANT MANAGEMENT PANEL
════════════════════════════════════════════ */
function ParticipantMgmtPanel({ tournament, setTournament, t }) {
  const [filter, setFilter]         = useState("");
  const [tab, setTab]               = useState("list");
  const [editingId, setEditingId]   = useState(null);
  const [editNo, setEditNo]         = useState("");
  const [editNick, setEditNick]     = useState("");
  const [editGender, setEditGender] = useState("couple");
  const [newNo, setNewNo]           = useState("");
  const [newNick, setNewNick]       = useState("");
  const [newGender, setNewGender]   = useState("couple");
  const [showBulk, setShowBulk]     = useState(false);
  const [bulkFrom, setBulkFrom]     = useState("");
  const [bulkTo, setBulkTo]         = useState("");
  const [bulkPrefix, setBulkPrefix] = useState("");
  const [bulkGender, setBulkGender] = useState("couple");
  const [selected, setSelected]     = useState(new Set());
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart]   = useState(null);
  const dragMode = React.useRef("add");
  const [rangeCat, setRangeCat]     = useState(((tournament.categories||[])[0]||{}).id || "");
  const [rangeFrom, setRangeFrom]   = useState("");
  const [rangeTo, setRangeTo]       = useState("");
  const [rangeAction, setRangeAction] = useState("add");

  const participants = tournament.participants || [];
  const categories   = tournament.categories   || [];

  const filtered = participants.filter(p => {
    if (!filter) return true;
    return p.number.includes(filter) || (p.nickname||"").toLowerCase().includes(filter.toLowerCase());
  });

  const deletePs = (ids) => {
    const s = new Set(ids);
    setTournament(prev => ({
      ...prev,
      participants: (prev.participants||[]).filter(p => !s.has(p.id)),
      categories: (prev.categories||[]).map(c => ({
        ...c,
        participantIds: (c.participantIds||[]).filter(id => !s.has(id)),
        rounds: (c.rounds||[]).map(r => ({ ...r, coupleIds: (r.coupleIds||[]).filter(id => !s.has(id)) }))
      }))
    }));
    setSelected(new Set());
  };

  const addP = () => {
    if (!newNo.trim() || !newNick.trim()) return;
    const p = { id: uid(), number: newNo.trim(), nickname: newNick.trim(), gender: newGender };
    setTournament(prev => ({ ...prev, participants: [...(prev.participants||[]), p] }));
    setNewNo(""); setNewNick("");
  };

  const bulkGenerate = () => {
    const from = parseInt(bulkFrom), to = parseInt(bulkTo);
    if (isNaN(from) || isNaN(to) || from > to) return;
    if (to - from > 499) { alert("최대 500명까지 가능합니다"); return; }
    const existing = new Set(participants.map(p => p.number));
    const newOnes = [];
    for (let n = from; n <= to; n++) {
      const num = String(n);
      if (!existing.has(num)) {
        newOnes.push({ id: uid(), number: num, nickname: bulkPrefix ? `${bulkPrefix}${n}` : "", gender: bulkGender });
      }
    }
    if (!newOnes.length) { alert("이미 모두 등록된 번호입니다"); return; }
    setTournament(prev => ({ ...prev, participants: [...(prev.participants||[]), ...newOnes] }));
    setShowBulk(false); setBulkFrom(""); setBulkTo(""); setBulkPrefix("");
    alert(`${newOnes.length}명 생성 완료!`);
  };

  const saveEdit = () => {
    setTournament(prev => ({
      ...prev,
      participants: (prev.participants||[]).map(p =>
        p.id === editingId ? { ...p, number: editNo.trim(), nickname: editNick.trim(), gender: editGender } : p
      )
    }));
    setEditingId(null);
  };

  const rowMouseDown = (pid, idx, e) => {
    if (["BUTTON","INPUT","SELECT"].includes(e.target.tagName)) return;
    e.preventDefault();
    setIsDragging(true); setDragStart(idx);
    dragMode.current = selected.has(pid) ? "remove" : "add";
    setSelected(prev => {
      const n = new Set(prev);
      dragMode.current === "add" ? n.add(pid) : n.delete(pid);
      return n;
    });
  };

  const rowMouseEnter = (pid, idx) => {
    if (!isDragging || dragStart === null) return;
    const lo = Math.min(dragStart, idx), hi = Math.max(dragStart, idx);
    setSelected(prev => {
      const n = new Set(prev);
      filtered.forEach((p, i) => {
        if (i >= lo && i <= hi) dragMode.current === "add" ? n.add(p.id) : n.delete(p.id);
      });
      return n;
    });
  };

  const mouseUp = () => { setIsDragging(false); setDragStart(null); };

  const applyRangeAssign = () => {
    const from = parseInt(rangeFrom), to = parseInt(rangeTo);
    if (isNaN(from) || isNaN(to) || !rangeCat) return;
    const inRange = participants.filter(p => { const n = parseInt(p.number); return n >= from && n <= to; });
    setTournament(prev => ({
      ...prev,
      categories: (prev.categories||[]).map(c => {
        if (c.id !== rangeCat) return c;
        let ids = new Set(c.participantIds||[]);
        inRange.forEach(p => rangeAction === "add" ? ids.add(p.id) : ids.delete(p.id));
        return { ...c, participantIds: [...ids] };
      })
    }));
  };

  return (
    <div style={{ padding:"20px", maxWidth:"920px", margin:"0 auto" }}>
      <div style={{ display:"flex", gap:"8px", marginBottom:"14px" }}>
        {[["list","📋 전체 목록"],["assign","🎯 종목 배정"]].map(([id,lbl]) => (
          <button key={id} className={`pill-tab ${tab===id?"active":""}`} onClick={() => setTab(id)}>{lbl}</button>
        ))}
      </div>

      {/* ── 전체 목록 ── */}
      {tab === "list" && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          {/* 툴바 */}
          <div style={{ padding:"10px 14px", borderBottom:"1px solid var(--border)", display:"flex", gap:"7px", flexWrap:"wrap", alignItems:"center" }}>
            <input value={filter} onChange={e => setFilter(e.target.value)}
              placeholder="🔍 번호 또는 닉네임" style={{ flex:1, minWidth:"140px" }} />
            <span style={{ fontSize:"12px", color:"var(--muted)" }}>{filtered.length}명</span>
            {selected.size > 0 ? (
              <>
                <span style={{ fontSize:"12px", color:"var(--warn)", fontWeight:600 }}>{selected.size}명 선택</span>
                <button className="btn btn-red btn-sm" onClick={() => deletePs([...selected])}>🗑 삭제({selected.size})</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setSelected(new Set())}>해제</button>
              </>
            ) : (
              <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px", color:"var(--muted)" }}
                onClick={() => setSelected(new Set(filtered.map(p => p.id)))}>전체선택</button>
            )}
            <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--gold)", color:"var(--gold)" }}
              onClick={() => setShowBulk(s => !s)}>
              ⚡ 일괄생성 {showBulk ? "▲" : "▼"}
            </button>
          </div>

          {/* 일괄생성 */}
          {showBulk && (
            <div style={{ padding:"12px 14px", borderBottom:"1px solid var(--border)", background:"rgba(201,168,76,.04)" }}>
              <p style={{ fontSize:"12px", color:"var(--gold)", fontWeight:700, marginBottom:"8px" }}>⚡ 일괄 생성</p>
              <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
                <input type="number" value={bulkFrom} onChange={e => setBulkFrom(e.target.value)} placeholder="시작번호" style={{ width:"90px" }} />
                <span style={{ color:"var(--muted)" }}>~</span>
                <input type="number" value={bulkTo} onChange={e => setBulkTo(e.target.value)} placeholder="끝번호" style={{ width:"90px" }} />
                <input value={bulkPrefix} onChange={e => setBulkPrefix(e.target.value)} placeholder="접두사(선택)" style={{ width:"110px" }} />
                <select value={bulkGender} onChange={e => setBulkGender(e.target.value)} style={{ width:"auto", padding:"7px 10px" }}>
                  <option value="couple">커플</option>
                  <option value="male">남(리더)</option>
                  <option value="female">여(팔로워)</option>
                </select>
                <button className="btn btn-gold btn-sm" onClick={bulkGenerate} disabled={!bulkFrom||!bulkTo}>
                  ⚡ {bulkFrom&&bulkTo ? `${bulkFrom}~${bulkTo} 생성` : "생성"}
                </button>
              </div>
            </div>
          )}

          {/* 테이블 */}
          <div style={{ overflowX:"auto", userSelect:"none" }}
            onMouseUp={mouseUp} onMouseLeave={mouseUp}>
            <table>
              <thead>
                <tr>
                  <th style={{ width:"32px" }}>
                    <input type="checkbox"
                      checked={filtered.length > 0 && filtered.every(p => selected.has(p.id))}
                      onChange={e => setSelected(e.target.checked ? new Set(filtered.map(p => p.id)) : new Set())} />
                  </th>
                  <th style={{ width:"80px" }}>등번호</th>
                  <th>닉네임</th>
                  <th style={{ width:"80px" }}>성별</th>
                  <th>참가 종목</th>
                  <th style={{ width:"90px" }}></th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 && (
                  <tr><td colSpan={6} style={{ textAlign:"center", color:"var(--muted)", padding:"30px" }}>참가자가 없습니다</td></tr>
                )}
                {filtered.map((p, rowIdx) => {
                  const assignedCats = categories.filter(c => (c.participantIds||[]).includes(p.id));
                  const isEditing    = editingId === p.id;
                  const isSel        = selected.has(p.id);
                  return (
                    <tr key={p.id}
                      onMouseDown={e => rowMouseDown(p.id, rowIdx, e)}
                      onMouseEnter={() => rowMouseEnter(p.id, rowIdx)}
                      style={{
                        background: isSel ? "rgba(192,57,43,.1)" : "",
                        borderLeft: isSel ? "3px solid var(--red2)" : "3px solid transparent",
                        cursor: isDragging ? "crosshair" : "default"
                      }}>
                      <td onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={isSel}
                          onChange={() => setSelected(prev => { const n=new Set(prev); isSel?n.delete(p.id):n.add(p.id); return n; })} />
                      </td>
                      <td>
                        {isEditing
                          ? <input value={editNo} onChange={e => setEditNo(e.target.value)} style={{ width:"70px" }} />
                          : <span style={{ color: isSel?"var(--red2)":"var(--gold)", fontWeight:700, fontSize:"15px" }}>{p.number}</span>
                        }
                      </td>
                      <td>
                        {isEditing
                          ? <input value={editNick} onChange={e => setEditNick(e.target.value)} style={{ width:"160px" }} />
                          : <span style={{ fontWeight:500 }}>{p.nickname}</span>
                        }
                      </td>
                      <td>
                        {isEditing
                          ? <select value={editGender} onChange={e => setEditGender(e.target.value)} style={{ padding:"4px 6px", fontSize:"12px", width:"auto" }}>
                              <option value="couple">커플</option>
                              <option value="male">남</option>
                              <option value="female">여</option>
                            </select>
                          : <span className={`tag ${p.gender==="male"?"tag-muted":p.gender==="female"?"tag-red":"tag-gold"}`} style={{ fontSize:"10px" }}>
                              {p.gender==="male"?"남":p.gender==="female"?"여":"커플"}
                            </span>
                        }
                      </td>
                      <td>
                        <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                          {assignedCats.length === 0
                            ? <span style={{ fontSize:"11px", color:"var(--muted)" }}>미배정</span>
                            : assignedCats.map(c => <span key={c.id} className="tag tag-gold" style={{ fontSize:"10px" }}>{c.name}</span>)
                          }
                        </div>
                      </td>
                      <td>
                        {isEditing ? (
                          <div style={{ display:"flex", gap:"4px" }}>
                            <button className="btn btn-gold btn-sm" onClick={saveEdit}>저장</button>
                            <button className="btn btn-ghost btn-sm" onClick={() => setEditingId(null)}>취소</button>
                          </div>
                        ) : (
                          <div style={{ display:"flex", gap:"4px" }}>
                            <button className="btn btn-ghost btn-sm"
                              onClick={e => { e.stopPropagation(); setEditingId(p.id); setEditNo(p.number); setEditNick(p.nickname||""); setEditGender(p.gender||"couple"); }}>
                              ✏
                            </button>
                            <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }}
                              onClick={e => { e.stopPropagation(); deletePs([p.id]); }}>×</button>
                          </div>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* 새 참가자 */}
          <div style={{ padding:"10px 14px", borderTop:"1px solid var(--border)", display:"flex", gap:"7px", flexWrap:"wrap", alignItems:"center", background:"var(--bg3)" }}>
            <span style={{ fontSize:"12px", color:"var(--muted)", minWidth:"55px" }}>새 참가자</span>
            <input value={newNo} onChange={e => setNewNo(e.target.value)} placeholder="등번호" style={{ width:"80px" }}
              onKeyDown={e => e.key==="Enter"&&addP()} />
            <input value={newNick} onChange={e => setNewNick(e.target.value)} placeholder="닉네임" style={{ flex:1, minWidth:"120px" }}
              onKeyDown={e => e.key==="Enter"&&addP()} />
            <select value={newGender} onChange={e => setNewGender(e.target.value)} style={{ padding:"7px 10px", width:"auto" }}>
              <option value="couple">커플</option>
              <option value="male">남</option>
              <option value="female">여</option>
            </select>
            <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--gold)", color:"var(--gold)" }} onClick={addP}>+ 추가</button>
          </div>
        </div>
      )}

      {/* ── 종목 배정 ── */}
      {tab === "assign" && (
        <div style={{ display:"flex", flexDirection:"column", gap:"14px" }}>
          <div className="card" style={{ padding:"12px 14px" }}>
            <p style={{ fontSize:"12px", fontWeight:700, color:"var(--gold)", marginBottom:"8px" }}>⚡ 번호 범위 일괄 배정</p>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
              <select value={rangeCat} onChange={e => setRangeCat(e.target.value)} style={{ width:"160px", padding:"7px 10px" }}>
                {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <input type="number" value={rangeFrom} onChange={e => setRangeFrom(e.target.value)} placeholder="시작" style={{ width:"80px" }} />
              <span style={{ color:"var(--muted)" }}>~</span>
              <input type="number" value={rangeTo} onChange={e => setRangeTo(e.target.value)} placeholder="끝" style={{ width:"80px" }} />
              <select value={rangeAction} onChange={e => setRangeAction(e.target.value)} style={{ width:"auto", padding:"7px 10px" }}>
                <option value="add">배정 추가</option>
                <option value="remove">배정 제거</option>
              </select>
              <button className="btn btn-gold btn-sm" onClick={applyRangeAssign}
                disabled={!rangeFrom||!rangeTo||!rangeCat}>적용</button>
            </div>
          </div>

          {categories.map(cat => {
            const assigned = new Set(cat.participantIds||[]);
            const catPs    = getCatParticipants(tournament, cat.id);
            const toggleP  = (pid) => {
              setTournament(prev => ({
                ...prev,
                categories: (prev.categories||[]).map(c => {
                  if (c.id !== cat.id) return c;
                  const ids = new Set(c.participantIds||[]);
                  ids.has(pid) ? ids.delete(pid) : ids.add(pid);
                  return { ...c, participantIds: [...ids] };
                })
              }));
            };
            return (
              <div key={cat.id} className="card">
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"10px" }}>
                  <h3 style={{ fontSize:"14px", fontWeight:700 }}>{cat.name}</h3>
                  <span className="tag tag-muted">{catPs.length}명</span>
                  <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px", marginLeft:"auto" }}
                    onClick={() => setTournament(prev=>({...prev,categories:(prev.categories||[]).map(c=>c.id===cat.id?{...c,participantIds:participants.map(p=>p.id)}:c)}))}>
                    전원배정
                  </button>
                  <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px", color:"var(--red2)" }}
                    onClick={() => setTournament(prev=>({...prev,categories:(prev.categories||[]).map(c=>c.id===cat.id?{...c,participantIds:[]}:c)}))}>
                    전원해제
                  </button>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"5px" }}>
                  {participants.map(p => {
                    const isAssigned = assigned.has(p.id);
                    return (
                      <label key={p.id} style={{
                        display:"flex", alignItems:"center", gap:"4px", padding:"4px 8px",
                        background: isAssigned ? "rgba(201,168,76,.12)" : "var(--bg3)",
                        border:"1px solid "+(isAssigned?"var(--gold)":"var(--border)"),
                        borderRadius:"6px", cursor:"pointer", fontSize:"11px"
                      }}>
                        <input type="checkbox" checked={isAssigned} onChange={() => toggleP(p.id)} />
                        <span style={{ color: isAssigned ? "var(--gold)" : "var(--muted)", fontWeight:700 }}>{p.number}</span>
                        {p.nickname && <span>{p.nickname}</span>}
                      </label>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════════════════
   JUDGE SCORING PANEL
════════════════════════════════════════════ */
function JudgeScoringPanel({ tournament, scores, setScores, currentUser, users, judgeLocks, setJudgeLocks, directorLocks, broadcast, t }) {
  const [selCat, setSelCat]         = useState(((tournament.categories||[])[0]||{}).id || "");
  const [selRound, setSelRound]     = useState("");
  const [localScores, setLocalScores] = useState({});
  const [submitted, setSubmitted]   = useState(false);
  const [blurOpposite, setBlurOpposite] = useState(false);

  const judgeId    = currentUser.id;
  const judgeUsers = (users||[]).filter(u => u.role === "judge");
  const roundKey   = selRound;

  const isJudgeLocked    = !!(judgeLocks?.[roundKey]?.[judgeId]);
  const isDirectorLocked = !!(directorLocks?.[roundKey]);

  const cat      = (tournament.categories||[]).find(c => c.id === selCat);
  const round    = (cat?.rounds||[]).find(r => r.id === selRound);
  const catPs    = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples  = round ? catPs.filter(p => (round.coupleIds||[]).includes(p.id)) : [];
  const isJJ     = cat?.type === "jacknjill";
  const criteria = cat?.scoringType === "detailed" ? (cat.criteria||[]) : [];
  const avgMode  = cat?.scoringAvgMode || "normal";

  const getEntry = (coupleId) => {
    const saved = scores?.[roundKey]?.[judgeId]?.[coupleId] || {};
    const local = localScores[coupleId] || {};
    return { ...saved, ...local };
  };

  const setSimple = (cid, v) =>
    setLocalScores(p => ({ ...p, [cid]: { ...(p[cid]||{}), simple: v===""?null:Number(v) } }));

  const setCrit = (cid, key, v) =>
    setLocalScores(p => ({
      ...p, [cid]: { ...(p[cid]||{}), criteria: { ...(p[cid]?.criteria||{}), [key]: v===""?null:Number(v) } }
    }));

  const setMemo = (cid, v) =>
    setLocalScores(p => ({ ...p, [cid]: { ...(p[cid]||{}), memo: v } }));

  const handleSubmit = () => {
    if (isDirectorLocked || isJudgeLocked) return;
    setScores(sc => ({
      ...sc,
      [roundKey]: { ...(sc[roundKey]||{}), [judgeId]: { ...(sc[roundKey]?.[judgeId]||{}), ...localScores } }
    }));
    setLocalScores({});
    setSubmitted(true);
    setTimeout(() => setSubmitted(false), 3000);
  };

  const toggleLock = () => {
    if (isDirectorLocked) return;
    setJudgeLocks(prev => ({
      ...prev,
      [roundKey]: { ...(prev[roundKey]||{}), [judgeId]: !isJudgeLocked }
    }));
  };

  return (
    <div style={{ padding:"20px", maxWidth:"1100px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"12px" }}>

      {/* 종목 탭 */}
      <div style={{ display:"flex", gap:"7px", flexWrap:"wrap" }}>
        {(tournament.categories||[]).map(c => (
          <button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`}
            onClick={() => { setSelCat(c.id); setSelRound(""); setLocalScores({}); }}>
            {c.name}
          </button>
        ))}
      </div>

      {/* 론다 선택 */}
      {cat && (
        <div style={{ display:"flex", gap:"7px", flexWrap:"wrap", alignItems:"center" }}>
          <span style={{ color:"var(--gold)", fontSize:"12px", fontWeight:700, borderLeft:"3px solid var(--gold)", paddingLeft:"7px" }}>론다</span>
          {(cat.rounds||[]).map(r => (
            <button key={r.id} className={`pill-tab ${selRound===r.id?"active":""}`}
              onClick={() => { setSelRound(r.id); setLocalScores({}); }}>
              {r.title}
            </button>
          ))}
          {isJJ && (
            <label style={{ display:"flex", alignItems:"center", gap:"6px", fontSize:"12px", color:"var(--muted)", cursor:"pointer", marginLeft:"10px" }}>
              <input type="checkbox" checked={blurOpposite} onChange={e => setBlurOpposite(e.target.checked)} />
              {t("blurOpposite")}
            </label>
          )}
        </div>
      )}

      {/* 감독관 공지 */}
      {broadcast && broadcast.roundId === selRound && (
        <div style={{ background:"rgba(230,126,34,.1)", border:"2px solid var(--warn)", borderRadius:"10px", padding:"12px 16px", display:"flex", alignItems:"center", gap:"10px" }}>
          <span style={{ fontSize:"20px" }}>📢</span>
          <div>
            <p style={{ fontWeight:700, color:"var(--warn)", fontSize:"12px", marginBottom:"3px" }}>감독관 공지</p>
            <p style={{ fontSize:"14px" }}>{broadcast.message}</p>
          </div>
        </div>
      )}

      {/* 채점 테이블 */}
      {round && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          {/* 헤더 바 */}
          <div style={{ padding:"10px 14px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
            <span className="serif" style={{ color:"var(--gold)", fontWeight:700 }}>{round.title}</span>
            {avgMode==="trimmed" && <span className="tag tag-blue" style={{ fontSize:"10px" }}>절사평균</span>}
            {isDirectorLocked && <span className="tag tag-green">🔒 감독관 확정</span>}
            {isJudgeLocked && !isDirectorLocked && <span className="tag tag-green">📌 최종제출됨</span>}
            <div style={{ marginLeft:"auto", display:"flex", gap:"7px" }}>
              <button className="btn btn-gold btn-sm" onClick={handleSubmit}
                disabled={!!submitted || isDirectorLocked || isJudgeLocked}>
                {submitted ? "✓ "+t("submitted") : isDirectorLocked ? "🔒 확정됨" : isJudgeLocked ? "🔒 최종제출됨" : t("submitAll")}
              </button>
              <button className={`btn btn-sm ${isJudgeLocked ? "btn-green" : "btn-ghost"}`}
                onClick={toggleLock} disabled={isDirectorLocked}
                style={{ borderColor: isJudgeLocked?"var(--green)":"var(--warn)", color: isJudgeLocked?"var(--green)":"var(--warn)" }}>
                {isJudgeLocked ? "✓ 최종제출 (취소)" : "📌 최종점수제출"}
              </button>
            </div>
          </div>

          <div style={{ overflowX:"auto" }}>
            <table>
              <thead>
                <tr>
                  <th style={{ minWidth:"50px" }}>{t("entryNo")}</th>
                  <th style={{ minWidth:"130px" }}>{t("nickname")}</th>
                  {isJJ && <th>{t("gender")}</th>}
                  <th style={{ minWidth:"170px" }}>{t("memo")}</th>
                  {criteria.length > 0
                    ? criteria.map(k => <th key={k} style={{ minWidth:"75px" }}>{k}</th>)
                    : <th style={{ minWidth:"80px" }}>{t("score")}</th>
                  }
                  {tournament.showAvgToJudge !== false && (
                    <>
                      <th style={{ minWidth:"80px" }}>{t("avgScore")}</th>
                      <th style={{ minWidth:"65px" }}>{t("diff")}</th>
                    </>
                  )}
                </tr>
              </thead>
              <tbody>
                {couples.map(p => {
                  const entry    = getEntry(p.id);
                  const myScore  = calcEntryScore(entry, cat.scoringType, criteria);
                  const avgScore = calcCoupleAvg(scores, roundKey, p.id, judgeUsers, cat.scoringType, criteria, avgMode);
                  const outlier  = tournament.outlierEnabled !== false && tournament.showAvgToJudge !== false &&
                    isOutlierScore(myScore, judgeId, scores, roundKey, p.id, judgeUsers, cat.scoringType, criteria, tournament.outlierThreshold);
                  const blur     = isJJ && blurOpposite && (
                    (currentUser.jIdx % 2 === 0 && p.gender === "female") ||
                    (currentUser.jIdx % 2 === 1 && p.gender === "male")
                  );
                  const disabled = isDirectorLocked || isJudgeLocked;

                  return (
                    <tr key={p.id} className={blur?"blurred":""}>
                      <td style={{ fontWeight:700, color:"var(--gold)", fontSize:"15px" }}>{p.number}</td>
                      <td>
                        <div style={{ fontWeight:500 }}>{p.nickname}</div>
                        {outlier && <div className="warn-box">⚠ 평균 이탈</div>}
                      </td>
                      {isJJ && (
                        <td>
                          <span className={`tag ${p.gender==="male"?"tag-muted":"tag-red"}`}>
                            {p.gender==="male" ? t("maleShort") : t("femaleShort")}
                          </span>
                        </td>
                      )}
                      <td>
                        <textarea value={entry.memo||""} onChange={e => setMemo(p.id, e.target.value)}
                          placeholder={t("memoPlaceholder")} rows={2} disabled={disabled}
                          style={{ width:"100%", minWidth:"150px", resize:"vertical", fontSize:"12px" }} />
                      </td>
                      {criteria.length > 0
                        ? criteria.map(k => (
                            <td key={k}>
                              <input type="number" min={0} max={10} step={0.5}
                                value={entry.criteria?.[k] ?? ""} disabled={disabled}
                                onChange={e => setCrit(p.id, k, e.target.value)}
                                className="score-input" placeholder="–" />
                            </td>
                          ))
                        : (
                          <td>
                            <input type="number" min={0} max={10} step={0.5}
                              value={entry.simple ?? ""} disabled={disabled}
                              onChange={e => setSimple(p.id, e.target.value)}
                              className="score-input" placeholder="–" />
                          </td>
                        )
                      }
                      {tournament.showAvgToJudge !== false && (
                        <>
                          <td style={{ textAlign:"center", fontWeight:600, color: avgScore!=null?"var(--gold)":"var(--muted)" }}>
                            {avgScore != null ? avgScore.toFixed(2) : "–"}
                          </td>
                          <td style={{ textAlign:"center", color: outlier?"var(--warn)":myScore!=null&&avgScore!=null?"var(--text)":"var(--muted)" }}>
                            {myScore!=null&&avgScore!=null ? (myScore-avgScore>=0?"+":"")+(myScore-avgScore).toFixed(2) : "–"}
                          </td>
                        </>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════════════════
   DIRECTOR PANEL
════════════════════════════════════════════ */
function DirectorPanel({ tournament, scores, setTournament, users, judgeLocks, setJudgeLocks, directorLocks, setDirectorLocks, setBroadcast, broadcast, currentUser, t }) {
  const [selCat, setSelCat]               = useState(((tournament.categories||[])[0]||{}).id || "");
  const [selRound, setSelRound]           = useState("");
  const [showBroadcast, setShowBroadcast] = useState(false);
  const [broadcastMsg, setBroadcastMsg]   = useState("");
  const [showLockConfirm, setShowLockConfirm] = useState(false);
  const [selectedAdv, setSelectedAdv]     = useState([]);
  const [showStageAdv, setShowStageAdv]   = useState(null);

  const judgeUsers = (users||[]).filter(u => u.role === "judge");
  const cat  = (tournament.categories||[]).find(c => c.id === selCat);
  const round = (cat?.rounds||[]).find(r => r.id === selRound);

  const judgeLocksForRound = judgeLocks?.[selRound] || {};
  const isDirectorLocked   = !!(directorLocks?.[selRound]);
  const allJudgesLocked    = judgeUsers.length > 0 && judgeUsers.every(j => judgeLocksForRound[j.id]);
  const lockedJudges       = judgeUsers.filter(j => judgeLocksForRound[j.id]);

  const catPs  = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples = round ? catPs.filter(p => (round.coupleIds||[]).includes(p.id)) : [];
  const avgMode = cat?.scoringAvgMode || "normal";

  const getAvg = (cid) => calcCoupleAvg(scores, selRound, cid, judgeUsers, cat?.scoringType, cat?.criteria, avgMode);
  const getJScore = (jid, cid) => calcEntryScore(scores?.[selRound]?.[jid]?.[cid], cat?.scoringType, cat?.criteria);

  const ranked = useMemo(() => {
    return [...couples].sort((a, b) => {
      const av = getAvg(a.id), bv = getAvg(b.id);
      if (av==null&&bv==null) return 0;
      if (av==null) return 1; if (bv==null) return -1;
      return bv - av;
    });
  }, [couples, scores, selRound, judgeUsers, cat]);

  // 현재 스테이지 라운드들 모두 확정됐는지 → 진출 배너 표시
  const curStageKey    = round?.stageKey;
  const curStage       = curStageKey ? (cat?.stages||[]).find(s => s.stageKey === curStageKey) : null;
  const curStageRounds = (cat?.rounds||[]).filter(r => r.stageKey === curStageKey);
  // 모든 론다가 감독관 확정됐고 아직 스테이지 자체는 확정 전
  const allStageLocked = curStageRounds.length > 0 &&
    curStageRounds.every(r => directorLocks?.[r.id] || r.finalized) && !curStage?.finalized;

  // 스테이지 어드밴스 모달 계산
  const advStage      = (cat?.stages||[]).find(s => s.stageKey === showStageAdv);
  const nextStageKey  = cat ? getNextStageKey(cat, showStageAdv || "") : null;
  const nextStageLabel = nextStageKey ? ((cat?.stages||[]).find(s => s.stageKey === nextStageKey) || {}).label || "" : null;
  const nextStageRounds = nextStageKey ? (cat?.rounds||[]).filter(r => r.stageKey === nextStageKey) : [];

  // Firebase는 배열을 객체로 반환하는 경우가 있어서 양쪽 처리
  const toArr = (v) => {
    if (!v) return [];
    if (Array.isArray(v)) return v;
    if (typeof v === "object") return Object.values(v);
    return [];
  };
  // 라운드 확정 여부: r.finalized 또는 directorLocks 중 하나라도 true
  const isRFin = (r) => !!(r && (r.finalized || directorLocks?.[r.id]));

  const stageAdvancers = useMemo(() => {
    if (!showStageAdv || !cat) return [];
    try {
      const ids = new Set(
        (cat.rounds||[])
          .filter(r => r.stageKey === showStageAdv && isRFin(r))
          .flatMap(r => toArr(r.advancedIds))
          .filter(Boolean)
      );
