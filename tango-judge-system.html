function calcEntryScore(entry, scoringType, criteriaKeys) {
  if (!entry) return null;
  if (scoringType === "simple") return entry.simple != null ? Number(entry.simple) : null;
  if (!criteriaKeys || !criteriaKeys.length) return null;
  const vals = criteriaKeys.map(k=>entry.criteria?.[k]).filter(v=>v!=null&&v!=="");
  if (!vals.length) return null;
  return vals.reduce((a,b)=>a+Number(b),0)/vals.length;
}

function calcCoupleAvg(scores, roundId, coupleId, judgeUsers, scoringType, criteriaKeys) {
  if (!scores?.[roundId]) return null;
  const vals = judgeUsers
    .map(j=>calcEntryScore(scores[roundId]?.[j.id]?.[coupleId], scoringType, criteriaKeys))
    .filter(v=>v!=null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

function isOutlierScore(myScore, myJudgeId, scores, roundId, coupleId, judgeUsers, scoringType, criteriaKeys, threshold) {
  if (myScore==null || !threshold) return false;
  const others = judgeUsers
    .filter(j=>j.id!==myJudgeId)
    .map(j=>calcEntryScore(scores?.[roundId]?.[j.id]?.[coupleId], scoringType, criteriaKeys))
    .filter(v=>v!=null);
  if (!others.length) return false;
  const dev = others.filter(v=>Math.abs(myScore-v)>=threshold).length;
  return dev >= Math.ceil(others.length*0.6);
}

function getCatParticipants(tournament, catId) {
  const cat = tournament.categories.find(c=>c.id===catId);
  if (!cat) return [];
  return (cat.participantIds||[]).map(id=>tournament.participants.find(p=>p.id===id)).filter(Boolean);
}

function LoginScreen({ users, onLogin, lang, setLang, t }) {
  const [selId, setSelId]   = useState(users[0]?.id || "");
  const [pw, setPw]         = useState("");
  const [err, setErr]       = useState("");

  const handleLogin = () => {
    const user = users.find(u=>u.id===selId);
    if (!user) return;
    if (user.password !== pw) { setErr(t("wrongPw")); return; }
    setErr("");
    onLogin(user);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px" }}>
      <style>{STYLE}</style>

  // 관리자 비밀번호 변경
  const [newAdminPw, setNewAdminPw]     = useState("");
  const [newAdminPw2, setNewAdminPw2]   = useState("");
  const [adminPwMsg, setAdminPwMsg]     = useState("");
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [newJName, setNewJName] = useState("");
  const [newJPw, setNewJPw]     = useState("");
  const [newDName, setNewDName] = useState("");
  const [newDPw, setNewDPw]     = useState("");
  const [newRTitle, setNewRTitle] = useState("");
  const [assigningRound, setAssigningRound] = useState(null);

  const cat = tournament.categories.find(c=>c.id===selCat);
  const judgeUsers    = users.filter(u=>u.role==="judge");
  const directorUsers = users.filter(u=>u.role==="director");
  const visibility = tournament.roundVisibility || {};

  const updateTmt = (patch) => setTournament(prev=>({...prev,...patch}));

  const updateCat = (id, patch) => setTournament(prev=>({
    ...prev,
    categories: prev.categories.map(c=>c.id===id?{...c,...patch}:c)
  }));

  const moveCat = (id, dir) => {
    const cats = [...tournament.categories];
    const idx  = cats.findIndex(c=>c.id===id);
    const to   = idx+dir;
    if (to<0||to>=cats.length) return;
    [cats[idx],cats[to]] = [cats[to],cats[idx]];
    setTournament(prev=>({...prev,categories:cats}));
  };

  const addCat = () => {
    if (!newCatName.trim()) return;
    const newC = {
      id:uid(), name:newCatName.trim(), type:newCatType, scoringType:newCatScoring,
      criteria:["음악성","예술성","커넥션","테크닉"],
      participantIds:[],
      stages:STAGES_DEF.map(s=>({...s,finalized:false,advancedIds:[]})),
      rounds:[],
    };
    setTournament(prev=>({...prev,categories:[...prev.categories,newC]}));
    setSelCat(newC.id);
    setNewCatName(""); setShowAddCat(false);
  };

  const delCat = (cid) => {
    if (!window.confirm("이 종목을 삭제하시겠습니까? 모든 채점 데이터가 함께 삭제됩니다.")) return;
    setTournament(prev=>({...prev,categories:prev.categories.filter(c=>c.id!==cid)}));
    setSelCat(tournament.categories.find(c=>c.id!==cid)?.id||"");
  };

  const addJudge = () => {
    if (!newJName.trim()||!newJPw.trim()) return;
    const jIdx = judgeUsers.length;
    const newJ = { id:uid(), name:newJName.trim(), role:"judge", password:newJPw.trim(), jIdx };
    setUsers(prev=>[...prev,newJ]);
    setNewJName(""); setNewJPw("");
  };

  const delJudge = (jid) => setUsers(prev=>prev.filter(u=>u.id!==jid));

  const addDirector = () => {
    if (!newDName.trim()||!newDPw.trim()) return;
    const newD = { id:uid(), name:newDName.trim(), role:"director", password:newDPw.trim() };
    setUsers(prev=>[...prev,newD]);
    setNewDName(""); setNewDPw("");
  };

  const delDirector = (did) => setUsers(prev=>prev.filter(u=>u.id!==did));

  const toggleVisibility = (rid) => updateTmt({
    roundVisibility:{ ...visibility, [rid]: !visibility[rid] }
  });

  const addRoundToStage = (catId, stageKey, stageLabel) => {
    const c = tournament.categories.find(x=>x.id===catId);
    if (!c) return;
    const stageRounds = c.rounds.filter(r=>r.stageKey===stageKey);
    const rIdx = stageRounds.length+1;
    const autoTitle = newRTitle.trim() || `${stageLabel} ${rIdx}론다`;
    const newR = { id:uid(), stageKey, stageName:stageLabel, rondaIndex:rIdx, title:autoTitle, coupleIds:[], targetSize:null, finalized:false, advancedIds:[] };
    updateCat(catId, { rounds:[...c.rounds, newR] });
    setNewRTitle("");
  };

  const delRound = (catId, rid) => {
    if (!window.confirm("이 론다를 삭제하시겠습니까?")) return;
    const c = tournament.categories.find(x=>x.id===catId);
    updateCat(catId, { rounds:c.rounds.filter(r=>r.id!==rid) });
    const dl = {...directorLocks}; delete dl[rid]; setDirectorLocks(dl);
  };

  const toggleCoupleInRound = (catId, roundId, coupleId) => {
    const c = tournament.categories.find(x=>x.id===catId);
    const r = c.rounds.find(x=>x.id===roundId);
    const has = r.coupleIds.includes(coupleId);
    const newIds = has ? r.coupleIds.filter(id=>id!==coupleId) : [...r.coupleIds,coupleId];
    updateCat(catId, { rounds:c.rounds.map(x=>x.id===roundId?{...x,coupleIds:newIds}:x) });
  };

  const autoDistribute = (catId, stageKey, mode) => {
    const c = tournament.categories.find(x=>x.id===catId);
    if (!c) return;
    const stageRounds = c.rounds.filter(r=>r.stageKey===stageKey);
    if (!stageRounds.length) return;
    let pool = getCatParticipants(tournament, catId);
    if (mode==="random") {
      for (let i=pool.length-1;i>0;i--) {
        const j=Math.floor(Math.random()*(i+1));
        [pool[i],pool[j]]=[pool[j],pool[i]];
      }
    } else {
      pool.sort((a,b)=>parseInt(a.number)-parseInt(b.number));
    }
    const n = stageRounds.length;
    const distributed = stageRounds.map((r,i)=>{
      const size = r.targetSize || Math.ceil(pool.length/n);
      const start = stageRounds.slice(0,i).reduce((s,x)=>s+(x.targetSize||Math.ceil(pool.length/n)),0);
      return {...r, coupleIds:pool.slice(start,start+size).map(p=>p.id)};
    });
    updateCat(catId, { rounds:c.rounds.map(r=>{
      const d=distributed.find(x=>x.id===r.id); return d||r;
    })});
  };

  const resetCatData = (catId) => {
    if (!window.confirm("이 종목의 모든 채점/확정 데이터를 초기화하시겠습니까?")) return;
    const c = tournament.categories.find(x=>x.id===catId);
    updateCat(catId, {
      rounds: c.rounds.map(r=>({...r,finalized:false,advancedIds:[],coupleIds:[]})),
      stages: c.stages.map(s=>({...s,finalized:false,advancedIds:[]}))
    });
    const dl = {...directorLocks};
    c.rounds.forEach(r=>{ delete dl[r.id]; });
    setDirectorLocks(dl);
    setScores(prev=>{ const n={...prev}; c.rounds.forEach(r=>{ delete n[r.id]; }); return n; });
    setJudgeLocks(prev=>{ const n={...prev}; c.rounds.forEach(r=>{ delete n[r.id]; }); return n; });
  };

  return (
    <div style={{ padding:"20px", maxWidth:"900px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"16px" }}>

      {/* ── 대회 기본설정 ── */}
      <div className="card">
        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"14px" }}>🏆 대회 기본설정</h3>
        <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
            <label style={{ fontSize:"12px", color:"var(--muted)", whiteSpace:"nowrap", minWidth:"60px" }}>대회명</label>
            <input value={tournament.name} onChange={e=>updateTmt({name:e.target.value})} style={{ maxWidth:"300px" }} />
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" }}>
            <label style={{ display:"flex", alignItems:"center", gap:"8px", cursor:"pointer" }}>
              <input type="checkbox" checked={tournament.outlierEnabled!==false}
                onChange={e=>updateTmt({outlierEnabled:e.target.checked})} />
              <span style={{ fontSize:"13px" }}>이탈경고 활성화</span>
            </label>
            {tournament.outlierEnabled!==false && (
              <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                <label style={{ fontSize:"12px", color:"var(--muted)" }}>기준</label>
                <input type="number" min={0.5} max={5} step={0.5}
                  value={tournament.outlierThreshold}
                  onChange={e=>updateTmt({outlierThreshold:Number(e.target.value)})}
                  style={{ width:"70px" }} />
                <label style={{ fontSize:"12px", color:"var(--muted)" }}>점 이상 차이</label>
              </div>
            )}
          </div>
          <div>
            <label style={{ display:"flex", alignItems:"center", gap:"8px", cursor:"pointer" }}>
              <input type="checkbox" checked={tournament.showAvgToJudge!==false}
                onChange={e=>updateTmt({showAvgToJudge:e.target.checked})} />
              <span style={{ fontSize:"13px" }}>심판에게 실시간 평균점수 표시</span>
            </label>
            <p style={{ fontSize:"11px", color:"var(--muted)", marginTop:"4px", marginLeft:"20px" }}>
              {tournament.showAvgToJudge!==false
                ? "심판 화면에 평균·차이 열이 표시됩니다"
                : "심판은 자신의 점수만 볼 수 있습니다 (독립 채점 모드)"}
            </p>
          </div>
        </div>
      </div>

      {/* ── 관리자 보안 설정 ── */}

        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"14px" }}>🔐 관리자 보안 설정</h3>
        <div style={{ display:"flex", flexDirection:"column", gap:"16px" }}>

          {/* 비밀번호 변경 */}
          <div>
            <p style={{ fontSize:"13px", fontWeight:600, marginBottom:"10px" }}>비밀번호 변경</p>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"flex-start" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:"6px", flex:1, minWidth:"160px" }}>
                <input type="password" value={newAdminPw} onChange={e=>{ setNewAdminPw(e.target.value); setAdminPwMsg(""); }}
                  placeholder="새 비밀번호" />
                <input type="password" value={newAdminPw2} onChange={e=>{ setNewAdminPw2(e.target.value); setAdminPwMsg(""); }}
                  placeholder="새 비밀번호 확인" />
              </div>
              <button className="btn btn-gold btn-sm" style={{ alignSelf:"flex-end" }}
                onClick={()=>{
                  if (!newAdminPw.trim()) { setAdminPwMsg("비밀번호를 입력하세요"); return; }
                  if (newAdminPw !== newAdminPw2) { setAdminPwMsg("비밀번호가 일치하지 않습니다"); return; }
                  if (newAdminPw.length < 4) { setAdminPwMsg("비밀번호는 4자 이상이어야 합니다"); return; }
                  setUsers(prev=>prev.map(u=>u.role==="admin"?{...u,password:newAdminPw.trim()}:u));
                  setNewAdminPw(""); setNewAdminPw2("");
                  setAdminPwMsg("✓ 비밀번호가 변경됐습니다");
                }}>
                변경
              </button>
            </div>
            {adminPwMsg && (
              <p style={{ fontSize:"12px", marginTop:"6px", color:adminPwMsg.startsWith("✓")?"var(--green)":"var(--red2)" }}>

              비밀번호를 잊어버렸을 때 사용하세요. Firebase 콘솔에서 직접 실행해야 합니다.
            </p>
            <div style={{ background:"rgba(192,57,43,.06)", border:"1px solid rgba(192,57,43,.2)", borderRadius:"8px", padding:"12px 14px" }}>
              <p style={{ fontSize:"12px", color:"var(--muted)", lineHeight:1.7 }}>
                <strong style={{ color:"var(--text)" }}>초기화 방법:</strong><br/>
                1. <a href="https://console.firebase.google.com" target="_blank" rel="noreferrer" style={{ color:"var(--gold)" }}>Firebase 콘솔</a> 접속<br/>
                2. Realtime Database → 데이터 탭<br/>
                3. <code style={{ background:"var(--bg3)", padding:"1px 6px", borderRadius:"3px", fontSize:"11px" }}>users</code> 항목에서 admin 계정의 <code style={{ background:"var(--bg3)", padding:"1px 6px", borderRadius:"3px", fontSize:"11px" }}>password</code> 값을 <code style={{ background:"var(--bg3)", padding:"1px 6px", borderRadius:"3px", fontSize:"11px" }}>0000</code> 으로 수정
              </p>
            </div>
            <div style={{ marginTop:"10px" }}>
              <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"8px" }}>
                또는 아래 버튼으로 admin 비밀번호를 <strong>0000</strong>으로 즉시 초기화:
              </p>
              {!showResetConfirm ? (
                <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--red2)", color:"var(--red2)" }}
                  onClick={()=>setShowResetConfirm(true)}>
                  ⚠ admin 비밀번호 0000으로 초기화
                </button>
              ) : (
                <div style={{ display:"flex", gap:"8px", alignItems:"center", flexWrap:"wrap" }}>
                  <span style={{ fontSize:"12px", color:"var(--warn)" }}>정말 초기화하시겠습니까?</span>
                  <button className="btn btn-red btn-sm"
                    onClick={()=>{
                      setUsers(prev=>prev.map(u=>u.role==="admin"?{...u,password:"0000"}:u));
                      setShowResetConfirm(false);
                      setAdminPwMsg("✓ admin 비밀번호가 0000으로 초기화됐습니다");
                    }}>
                    확인, 초기화
                  </button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setShowResetConfirm(false)}>취소</button>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* ── 관객 라이브 공개 관리 ── */}
      <div className="card">
        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"10px" }}>📡 관객 라이브 공개 관리</h3>
        <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"14px" }}>
          관객이 <code style={{ background:"var(--bg3)", padding:"1px 6px", borderRadius:"4px", fontSize:"11px" }}>URL?public</code>으로 접속 시 볼 수 있는 론다를 설정합니다.
          준결승·결승은 비공개 유지 후 발표 직전에 공개하세요.
        </p>
        {tournament.categories.map(c=>(
          <div key={c.id} style={{ marginBottom:"12px" }}>
            <p style={{ fontSize:"12px", fontWeight:700, marginBottom:"6px" }}>{c.name}</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
              {c.rounds.length===0 && <span style={{ fontSize:"11px", color:"var(--muted)" }}>론다 없음</span>}
              {c.rounds.map(r=>{
                const pub = visibility[r.id];
                const stColor = r.stageKey==="prelim"?"var(--gold)":r.stageKey==="semi"?"#3498db":"var(--green)";
                return (
                  <button key={r.id} onClick={()=>toggleVisibility(r.id)}
                    style={{ padding:"4px 12px", borderRadius:"20px", fontSize:"11px", fontWeight:600, cursor:"pointer",
                      border:"1px solid "+(pub?stColor:"var(--border)"),
                      background:pub?"rgba(39,174,96,.1)":"var(--bg3)",
                      color:pub?"var(--green)":"var(--muted)", transition:"all .15s" }}>
                    {pub?"🟢":"⚫"} {r.title}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
        <div style={{ marginTop:"12px", padding:"10px 14px", background:"var(--bg3)", borderRadius:"8px", display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" }}>
          <code style={{ fontSize:"12px", color:"var(--gold)" }}>
            {typeof window!=="undefined"?window.location.href.split("?")[0]:"[URL]"}?public
          </code>
          <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px" }}
            onClick={()=>{
              const url=(typeof window!=="undefined"?window.location.href.split("?")[0]:"")+`?public`;
              navigator.clipboard?.writeText(url)
                .then(()=>alert("관객 URL 복사됨!"))
                .catch(()=>alert(url));
            }}>
            🔗 URL 복사
          </button>
        </div>
      </div>

      {/* ── 계정 관리 (감독관 + 심판) ── */}
      <div className="card">
        <h3 style={{ fontSize:"11px", textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", marginBottom:"16px" }}>👤 계정 관리</h3>

        {/* 감독관 섹션 */}
        <div style={{ marginBottom:"20px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px" }}>
            <span style={{ fontSize:"13px", fontWeight:700, color:"#3498db" }}>🎯 감독관</span>
            <span className="tag tag-muted" style={{ fontSize:"10px" }}>{directorUsers.length}명</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"6px", marginBottom:"10px" }}>
            {directorUsers.length===0 && (
              <p style={{ fontSize:"12px", color:"var(--muted)", fontStyle:"italic" }}>등록된 감독관이 없습니다</p>
            )}
            {directorUsers.map(d=>(
              <div key={d.id} style={{ display:"flex", alignItems:"center", gap:"8px", padding:"8px 12px", background:"rgba(52,152,219,.07)", border:"1px solid rgba(52,152,219,.2)", borderRadius:"8px" }}>
                <span style={{ fontWeight:600, flex:1 }}>{d.name}</span>
                <span style={{ fontSize:"11px", color:"var(--muted)", background:"var(--bg3)", padding:"2px 8px", borderRadius:"4px" }}>ID: {d.id}</span>
                <span style={{ fontSize:"11px", color:"var(--muted)", background:"var(--bg3)", padding:"2px 8px", borderRadius:"4px" }}>PW: {d.password}</span>
                <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }}
                  onClick={()=>delDirector(d.id)}>×</button>

          </div>
          <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
            <input value={newDName} onChange={e=>setNewDName(e.target.value)} placeholder="감독관 이름"

            <input value={newDPw} onChange={e=>setNewDPw(e.target.value)} placeholder="비밀번호"
              style={{ width:"100px" }} onKeyDown={e=>e.key==="Enter"&&addDirector()} />
            <button className="btn btn-ghost btn-sm" onClick={addDirector}
              style={{ borderColor:"#3498db", color:"#3498db" }}>
              + 감독관 추가
            </button>
          </div>
        </div>

        <div style={{ borderTop:"1px solid var(--border)", paddingTop:"18px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px" }}>
            <span style={{ fontSize:"13px", fontWeight:700, color:"var(--gold)" }}>⚖ 심판</span>
            <span className="tag tag-muted" style={{ fontSize:"10px" }}>{judgeUsers.length}명</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"6px", marginBottom:"10px" }}>
            {judgeUsers.length===0 && (

                <span style={{ fontWeight:600, flex:1 }}>{j.name}</span>

                <span style={{ fontSize:"11px", color:"var(--muted)", background:"var(--bg3)", padding:"2px 8px", borderRadius:"4px" }}>PW: {j.password}</span>
                <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }}

          <span className="tag tag-muted" style={{ fontSize:"10px" }}>{tournament.categories.length}개</span>

          <div style={{ background:"rgba(39,174,96,.06)", border:"1px solid rgba(39,174,96,.2)", borderRadius:"8px", padding:"14px", marginBottom:"14px", display:"flex", flexDirection:"column", gap:"10px" }}>
            <p style={{ fontSize:"12px", color:"var(--green)", fontWeight:700 }}>＋ 새 종목 추가</p>
            <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"center" }}>
              <input value={newCatName} onChange={e=>setNewCatName(e.target.value)}

              <select value={newCatType} onChange={e=>setNewCatType(e.target.value)}

              </select>
              <select value={newCatScoring} onChange={e=>setNewCatScoring(e.target.value)}

          {tournament.categories.map((c,idx)=>(
            <div key={c.id} style={{ display:"flex", alignItems:"center", gap:"2px" }}>
              <button className={`pill-tab ${selCat===c.id?"active":""}`} onClick={()=>{ setSelCat(c.id); setCatTab("basic"); }}>
                {c.name}
              </button>
              <button className="btn btn-ghost" style={{ padding:"2px 4px", fontSize:"10px" }} onClick={()=>moveCat(c.id,-1)} disabled={idx===0}>▲</button>
              <button className="btn btn-ghost" style={{ padding:"2px 4px", fontSize:"10px" }} onClick={()=>moveCat(c.id,1)} disabled={idx===tournament.categories.length-1}>▼</button>
            </div>
          ))}
        </div>

        {cat && (
          <div>
            {/* 서브탭 */}
            <div style={{ display:"flex", gap:"6px", marginBottom:"16px", borderBottom:"1px solid var(--border)", paddingBottom:"12px" }}>
              {[["basic","⚙ 기본"], ["rounds","📋 론다"]].map(([id,label])=>(
                <button key={id} className={`pill-tab ${catTab===id?"gold":""}`} onClick={()=>setCatTab(id)}
                  style={{ fontSize:"11px" }}>
                  {label}
                </button>
              ))}
              <div style={{ marginLeft:"auto", display:"flex", gap:"6px" }}>
                <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px", color:"var(--red2)" }}
                  onClick={()=>resetCatData(cat.id)}>
                  ⚠ 데이터 초기화
                </button>
                <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px", color:"var(--red2)", borderColor:"var(--red2)" }}
                  onClick={()=>delCat(cat.id)}>
                  🗑 종목 삭제
                </button>
              </div>
            </div>

            {/* 기본설정 탭 */}
            {catTab==="basic" && (
              <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"center" }}>
                  <div style={{ flex:1, minWidth:"160px" }}>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"4px" }}>종목명</label>
                    <input value={cat.name} onChange={e=>updateCat(cat.id,{name:e.target.value})} />
                  </div>
                  <div>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"4px" }}>유형</label>
                    <select value={cat.type} onChange={e=>updateCat(cat.id,{type:e.target.value})} style={{ width:"130px" }}>
                      <option value="couple">커플</option>
                      <option value="jacknjill">잭앤질</option>
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"4px" }}>채점방식</label>
                    <select value={cat.scoringType} onChange={e=>updateCat(cat.id,{scoringType:e.target.value})} style={{ width:"130px" }}>
                      <option value="detailed">항목별</option>
                      <option value="simple">단순점수</option>
                    </select>
                  </div>
                </div>
                {cat.scoringType==="detailed" && (
                  <div>
                    <label style={{ fontSize:"12px", color:"var(--muted)", display:"block", marginBottom:"6px" }}>채점 항목</label>
                    <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                      {(cat.criteria||[]).map((k,i)=>(
                        <div key={i} style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                          <input value={k} style={{ width:"90px" }}
                            onChange={e=>{
                              const c2=[...cat.criteria];
                              c2[i]=e.target.value;
                              updateCat(cat.id,{criteria:c2});
                            }} />
                          <button className="btn btn-ghost" style={{ padding:"4px 6px", fontSize:"11px", color:"var(--red2)" }}
                            onClick={()=>updateCat(cat.id,{criteria:cat.criteria.filter((_,j)=>j!==i)})}>×</button>
                        </div>
                      ))}
                      <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px" }}
                        onClick={()=>updateCat(cat.id,{criteria:[...(cat.criteria||[]),"항목"]})}>
                        + 항목 추가
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* 론다 탭 */}
            {catTab==="rounds" && (
              <div style={{ display:"flex", flexDirection:"column", gap:"20px" }}>
                {cat.stages.map(stage=>{
                  const stageRounds = cat.rounds.filter(r=>r.stageKey===stage.stageKey);
                  const prevStageIdx = STAGES_DEF.findIndex(s=>s.stageKey===stage.stageKey)-1;
                  const prevStage = prevStageIdx>=0 ? cat.stages[prevStageIdx] : null;
                  const unlocked = !prevStage || prevStage.finalized;
                  const stageColor = stage.stageKey==="prelim"?"var(--gold)":stage.stageKey==="semi"?"#3498db":"var(--green)";

                  return (
                    <div key={stage.stageKey}>
                      <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px" }}>
                        <span style={{ fontWeight:700, color:stageColor, fontSize:"14px" }}>{stage.label}</span>
                        {stage.finalized && <span className="tag tag-green" style={{ fontSize:"10px" }}>✓ 확정</span>}
                        {!unlocked && <span style={{ fontSize:"11px", color:"var(--muted)" }}>🔒 이전 스테이지 미확정</span>}
                        {unlocked && !stage.finalized && stageRounds.length>0 && (
                          <div style={{ marginLeft:"auto", display:"flex", gap:"6px" }}>
                            <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px" }}
                              onClick={()=>autoDistribute(cat.id, stage.stageKey, "order")}>
                              🔢 번호순 배분
                            </button>
                            <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px" }}
                              onClick={()=>autoDistribute(cat.id, stage.stageKey, "random")}>
                              🔀 랜덤 배분
                            </button>
                          </div>
                        )}
                      </div>

                      {stageRounds.map(r=>{
                        const isLocked = directorLocks?.[r.id];
                        const catPs = getCatParticipants(tournament, cat.id);
                        const otherRoundsInStage = stageRounds.filter(x=>x.id!==r.id);
                        const otherAssigned = new Set(otherRoundsInStage.flatMap(x=>x.coupleIds));

                        return (
                          <div key={r.id} style={{ background:"var(--bg3)", borderRadius:"8px", padding:"12px 14px", marginBottom:"8px", border:"1px solid var(--border)" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
                              <span style={{ fontWeight:600 }}>{r.title}</span>
                              <span className="tag tag-muted">{r.coupleIds.length}팀</span>
                              {isLocked && <span className="tag tag-green" style={{ fontSize:"10px" }}>🔒 확정</span>}
                              <div style={{ display:"flex", alignItems:"center", gap:"6px", marginLeft:"auto" }}>
                                <label style={{ fontSize:"11px", color:"var(--muted)" }}>목표</label>
                                <input type="number" min={1} max={99} value={r.targetSize||""}
                                  placeholder="명" style={{ width:"55px", padding:"3px 6px", fontSize:"11px" }}
                                  onChange={e=>updateCat(cat.id,{rounds:cat.rounds.map(x=>x.id===r.id?{...x,targetSize:parseInt(e.target.value)||null}:x)})} />
                                {unlocked && !isLocked && !stage.finalized && (
                                  <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px" }}
                                    onClick={()=>setAssigningRound(assigningRound===r.id?null:r.id)}>
                                    {assigningRound===r.id?"닫기":"수동배정"}
                                  </button>
                                )}
                                {unlocked && !isLocked && !stage.finalized && (
                                  <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)", fontSize:"11px" }}
                                    onClick={()=>delRound(cat.id,r.id)}>×</button>
                                )}
                              </div>
                            </div>

                            {r.coupleIds.length>0 && (
                              <div style={{ marginTop:"8px", display:"flex", flexWrap:"wrap", gap:"4px" }}>
                                {r.coupleIds.map(pid=>{
                                  const p=tournament.participants.find(x=>x.id===pid);
                                  if (!p) return null;
                                  return (
                                    <span key={pid} style={{ display:"inline-flex", alignItems:"center", gap:"3px", background:"rgba(201,168,76,.1)", border:"1px solid rgba(201,168,76,.25)", borderRadius:"4px", padding:"2px 7px", fontSize:"11px" }}>
                                      <span style={{ color:"var(--gold)", fontWeight:700 }}>{p.number}</span>
                                      {p.nickname && <span style={{ color:"var(--muted)" }}>{p.nickname}</span>}
                                    </span>
                                  );
                                })}
                              </div>
                            )}

                            {assigningRound===r.id && unlocked && !isLocked && (
                              <div style={{ marginTop:"10px" }}>
                                <p style={{ fontSize:"11px", color:"var(--muted)", marginBottom:"6px" }}>
                                  클릭으로 배정/해제 | 🔒 = 같은 스테이지 다른 론다에 배정됨
                                </p>
                                <div style={{ display:"flex", flexWrap:"wrap", gap:"5px" }}>
                                  {catPs.map(p=>{
                                    const inThis = r.coupleIds.includes(p.id);
                                    const inOther = !inThis && otherAssigned.has(p.id);
                                    return (
                                      <label key={p.id} style={{
                                        display:"flex", alignItems:"center", gap:"4px", padding:"4px 9px",
                                        background:inThis?"rgba(201,168,76,.15)":inOther?"rgba(192,57,43,.07)":"var(--bg2)",
                                        borderRadius:"6px", cursor:inOther?"not-allowed":"pointer", fontSize:"11px",
                                        border:"1px solid "+(inThis?"var(--gold)":inOther?"rgba(192,57,43,.35)":"var(--border)"),
                                        opacity:inOther?0.5:1, pointerEvents:inOther?"none":"auto"
                                      }}>
                                        <input type="checkbox" checked={inThis} onChange={()=>!inOther&&toggleCoupleInRound(cat.id,r.id,p.id)} />
                                        <span style={{ color:inOther?"var(--red2)":"var(--gold)", fontWeight:700 }}>{p.number}</span>
                                        <span>{p.nickname||"–"}</span>
                                        {inOther && <span style={{ fontSize:"9px", color:"var(--red2)" }}>🔒</span>}
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}

                      {unlocked && !stage.finalized && (
                        <div style={{ display:"flex", gap:"6px" }}>
                          <input value={newRTitle} onChange={e=>setNewRTitle(e.target.value)}
                            placeholder={`${stage.label} 론다 제목 (비우면 자동)`}
                            style={{ flex:1, fontSize:"12px" }} />
                          <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--gold)", color:"var(--gold)", whiteSpace:"nowrap" }}
                            onClick={()=>addRoundToStage(cat.id, stage.stageKey, stage.label)}>
                            + 론다 추가
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════
   PARTICIPANT MANAGEMENT PANEL
════════════════════════════════════════════ */
function ParticipantMgmtPanel({ tournament, setTournament, t }) {
  const [filter, setFilter]       = useState("");
  const [tab, setTab]             = useState("list");
  const [editingId, setEditingId] = useState(null);
  const [editNo, setEditNo]       = useState("");
  const [editNick, setEditNick]   = useState("");
  const [editGender, setEditGender] = useState("couple");
  const [newNo, setNewNo]         = useState("");
  const [newNick, setNewNick]     = useState("");
  const [newGender, setNewGender] = useState("couple");
  const [showBulk, setShowBulk]   = useState(false);
  const [bulkFrom, setBulkFrom]   = useState("");
  const [bulkTo, setBulkTo]       = useState("");
  const [bulkPrefix, setBulkPrefix] = useState("");
  const [bulkGender, setBulkGender] = useState("couple");
  const [selected, setSelected]   = useState(new Set());
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState(null);
  const dragMode = React.useRef("add");
  const [rangeFrom, setRangeFrom] = useState("");
  const [rangeTo, setRangeTo]     = useState("");
  const [rangeCat, setRangeCat]   = useState(tournament.categories[0]?.id||"");
  const [rangeAction, setRangeAction] = useState("add");

  const participants = tournament.participants || [];
  const categories   = tournament.categories   || [];

  const filtered = participants.filter(p=>{
    if (!filter) return true;
    return p.number.includes(filter) || (p.nickname||"").toLowerCase().includes(filter.toLowerCase());
  });

  const deleteP = (pids) => {
    const idSet = new Set(Array.isArray(pids)?pids:[pids]);
    setTournament(prev=>({
      ...prev,
      participants: prev.participants.filter(p=>!idSet.has(p.id)),
      categories: prev.categories.map(c=>({
        ...c,
        participantIds:(c.participantIds||[]).filter(id=>!idSet.has(id)),
        rounds:c.rounds.map(r=>({...r,coupleIds:r.coupleIds.filter(id=>!idSet.has(id))}))
      }))
    }));
    setSelected(new Set());
  };

  const addP = () => {
    if (!newNo.trim()||!newNick.trim()) return;
    const p={ id:uid(), number:newNo.trim(), nickname:newNick.trim(), gender:newGender };
    setTournament(prev=>({...prev,participants:[...prev.participants,p]}));
    setNewNo(""); setNewNick("");
  };

  const bulkGenerate = () => {
    const from=parseInt(bulkFrom), to=parseInt(bulkTo);
    if (isNaN(from)||isNaN(to)||from>to) return;
    if (to-from>499) { alert("최대 500명까지 가능합니다"); return; }
    const existing=new Set(participants.map(p=>p.number));
    const newOnes=[];
    for (let n=from;n<=to;n++) {
      const num=String(n);
      if (!existing.has(num)) {
        newOnes.push({ id:uid(), number:num, nickname:bulkPrefix?`${bulkPrefix}${n}`:"", gender:bulkGender });
      }
    }
    if (!newOnes.length) { alert("이미 모두 등록된 번호입니다"); return; }
    setTournament(prev=>({...prev,participants:[...prev.participants,...newOnes]}));
    setShowBulk(false); setBulkFrom(""); setBulkTo(""); setBulkPrefix("");
    alert(`${newOnes.length}명 생성 완료!`);
  };

  const saveEdit = () => {
    setTournament(prev=>({
      ...prev,
      participants:prev.participants.map(p=>p.id===editingId?{...p,number:editNo.trim(),nickname:editNick.trim(),gender:editGender}:p)
    }));
    setEditingId(null);
  };

  const handleRowMouseDown = (pid, idx, e) => {
    if (e.target.tagName==="BUTTON"||e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
    e.preventDefault();
    setIsDragging(true);
    setDragStart(idx);
    dragMode.current = selected.has(pid)?"remove":"add";
    setSelected(prev=>{
      const n=new Set(prev);
      dragMode.current==="add"?n.add(pid):n.delete(pid);
      return n;
    });
  };

  const handleRowMouseEnter = (pid, idx) => {
    if (!isDragging||dragStart===null) return;
    const lo=Math.min(dragStart,idx), hi=Math.max(dragStart,idx);
    setSelected(prev=>{
      const n=new Set(prev);
      filtered.forEach((p,i)=>{
        if (i>=lo&&i<=hi) { dragMode.current==="add"?n.add(p.id):n.delete(p.id); }
      });
      return n;
    });
  };

  const handleMouseUp = () => { setIsDragging(false); setDragStart(null); };

  const applyRangeAssign = () => {
    const from=parseInt(rangeFrom), to=parseInt(rangeTo);
    if (isNaN(from)||isNaN(to)||!rangeCat) return;
    const inRange = participants.filter(p=>{ const n=parseInt(p.number); return n>=from&&n<=to; });
    setTournament(prev=>({
      ...prev,
      categories:prev.categories.map(c=>{
        if (c.id!==rangeCat) return c;
        let ids=new Set(c.participantIds||[]);
        inRange.forEach(p=>{ rangeAction==="add"?ids.add(p.id):ids.delete(p.id); });
        return {...c,participantIds:[...ids]};
      })
    }));
  };

  return (
    <div style={{ padding:"20px", maxWidth:"900px", margin:"0 auto" }}>
      <div style={{ display:"flex", gap:"8px", marginBottom:"16px" }}>
        {[["list","📋 전체 목록"],["assign","🎯 종목 배정"]].map(([id,label])=>(
          <button key={id} className={`pill-tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}>
            {label}
          </button>
        ))}
      </div>

      {/* ── 전체 목록 탭 ── */}
      {tab==="list" && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          {/* 툴바 */}
          <div style={{ padding:"12px 16px", borderBottom:"1px solid var(--border)", display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
            <input value={filter} onChange={e=>setFilter(e.target.value)}
              placeholder="🔍 번호 또는 닉네임" style={{ flex:1, minWidth:"140px" }} />
            <span style={{ fontSize:"12px", color:"var(--muted)" }}>{filtered.length}명</span>
            {selected.size>0 ? (
              <>
                <span style={{ fontSize:"12px", color:"var(--warn)", fontWeight:600 }}>{selected.size}명 선택</span>
                <button className="btn btn-red btn-sm" onClick={()=>deleteP([...selected])}>
                  🗑 삭제({selected.size})
                </button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setSelected(new Set())}>해제</button>
              </>
            ) : (
              <button className="btn btn-ghost btn-sm" style={{ fontSize:"11px", color:"var(--muted)" }}
                onClick={()=>setSelected(new Set(filtered.map(p=>p.id)))}>
                전체선택
              </button>
            )}
            <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--gold)", color:"var(--gold)" }}
              onClick={()=>setShowBulk(s=>!s)}>
              ⚡ 일괄생성 {showBulk?"▲":"▼"}
            </button>
          </div>

          {/* 일괄생성 패널 */}
          {showBulk && (
            <div style={{ padding:"14px 16px", borderBottom:"1px solid var(--border)", background:"rgba(201,168,76,.04)" }}>
              <p style={{ fontSize:"12px", color:"var(--gold)", fontWeight:600, marginBottom:"10px" }}>⚡ 참가자 일괄 생성</p>
              <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                  <label style={{ fontSize:"12px", color:"var(--muted)" }}>등번호</label>
                  <input type="number" value={bulkFrom} onChange={e=>setBulkFrom(e.target.value)} placeholder="시작" style={{ width:"90px" }} />
                  <span style={{ color:"var(--muted)" }}>~</span>
                  <input type="number" value={bulkTo} onChange={e=>setBulkTo(e.target.value)} placeholder="끝" style={{ width:"90px" }} />
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                  <label style={{ fontSize:"12px", color:"var(--muted)" }}>접두사</label>
                  <input value={bulkPrefix} onChange={e=>setBulkPrefix(e.target.value)} placeholder="선택" style={{ width:"100px" }} />
                </div>
                <select value={bulkGender} onChange={e=>setBulkGender(e.target.value)} style={{ padding:"6px 10px", width:"auto" }}>
                  <option value="couple">커플</option>
                  <option value="male">남(리더)</option>
                  <option value="female">여(팔로워)</option>
                </select>
                <button className="btn btn-gold btn-sm" onClick={bulkGenerate}
                  disabled={!bulkFrom||!bulkTo}>
                  ⚡ {bulkFrom&&bulkTo?`${bulkFrom}~${bulkTo} 생성`:"생성"}
                </button>
              </div>
            </div>
          )}

          {/* 테이블 */}
          <div style={{ overflowX:"auto", userSelect:"none" }}
            onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
            <table>
              <thead>
                <tr>
                  <th style={{ width:"32px" }}>
                    <input type="checkbox"
                      checked={filtered.length>0&&filtered.every(p=>selected.has(p.id))}
                      onChange={e=>setSelected(e.target.checked?new Set(filtered.map(p=>p.id)):new Set())} />
                  </th>
                  <th style={{ width:"80px" }}>등번호</th>
                  <th>닉네임</th>
                  <th style={{ width:"80px" }}>성별</th>
                  <th>참가 종목</th>
                  <th style={{ width:"90px" }}></th>
                </tr>
              </thead>
              <tbody>
                {filtered.length===0 && (
                  <tr><td colSpan={6} style={{ textAlign:"center", color:"var(--muted)", padding:"30px" }}>
                    참가자가 없습니다
                  </td></tr>
                )}
                {filtered.map((p,rowIdx)=>{
                  const assignedCats=categories.filter(c=>(c.participantIds||[]).includes(p.id));
                  const isEditing=editingId===p.id;
                  const isSel=selected.has(p.id);
                  return (
                    <tr key={p.id}
                      onMouseDown={e=>handleRowMouseDown(p.id,rowIdx,e)}
                      onMouseEnter={()=>handleRowMouseEnter(p.id,rowIdx)}
                      style={{
                        background:isSel?"rgba(192,57,43,.1)":"",
                        borderLeft:isSel?"3px solid var(--red2)":"3px solid transparent",
                        cursor:isDragging?"crosshair":"default", transition:"background .1s"
                      }}>
                      <td onClick={e=>e.stopPropagation()}>
                        <input type="checkbox" checked={isSel}
                          onChange={()=>setSelected(prev=>{const n=new Set(prev);isSel?n.delete(p.id):n.add(p.id);return n;})} />
                      </td>
                      <td>
                        {isEditing
                          ? <input value={editNo} onChange={e=>setEditNo(e.target.value)} style={{ width:"70px" }} />
                          : <span style={{ color:isSel?"var(--red2)":"var(--gold)", fontWeight:700, fontSize:"16px" }}>{p.number}</span>
                        }
                      </td>
                      <td>
                        {isEditing
                          ? <input value={editNick} onChange={e=>setEditNick(e.target.value)} style={{ width:"160px" }} />
                          : <span style={{ fontWeight:500 }}>{p.nickname}</span>
                        }
                      </td>
                      <td>
                        {isEditing
                          ? <select value={editGender} onChange={e=>setEditGender(e.target.value)} style={{ padding:"4px 6px", fontSize:"12px", width:"auto" }}>
                              <option value="couple">커플</option>
                              <option value="male">남</option>
                              <option value="female">여</option>
                            </select>
                          : <span className={`tag ${p.gender==="male"?"tag-muted":p.gender==="female"?"tag-red":"tag-gold"}`} style={{ fontSize:"10px" }}>
                              {p.gender==="male"?"남":p.gender==="female"?"여":"커플"}
                            </span>
                        }
                      </td>
                      <td>
                        <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                          {assignedCats.length===0
                            ? <span style={{ fontSize:"11px", color:"var(--muted)" }}>미배정</span>
                            : assignedCats.map(c=><span key={c.id} className="tag tag-gold" style={{ fontSize:"10px" }}>{c.name}</span>)
                          }
