function getInheritedMemo(scores, judgeId, participantId, cat, currentRoundId) {
  if (!scores||!cat||!currentRoundId) return "";
  const currentRound=(cat.rounds||[]).find(r=>r.id===currentRoundId);
  if (!currentRound) return "";
  const stages=cat.stages||[];
  const currentStageIdx=stages.findIndex(s=>s.stageKey===currentRound.stageKey);
  const prevRounds=(cat.rounds||[]).filter(r=>{
    if(r.id===currentRoundId) return false;
    const si=stages.findIndex(s=>s.stageKey===r.stageKey);
    return si<=currentStageIdx;
  });
  for (let i=prevRounds.length-1;i>=0;i--) {
    const memo=scores?.[prevRounds[i].id]?.[judgeId]?.[participantId]?.memo;

  }

function calcEntryScore(entry,scoringType,criteriaKeys,calcMode) {
  if(!entry) return null;
  if(scoringType==="simple") return entry.simple!=null?Number(entry.simple):null;
  if(!criteriaKeys||!criteriaKeys.length) return null;
  const vals=criteriaKeys.map(k=>entry.criteria?.[k]).filter(v=>v!=null&&v!=="").map(Number);
  if(!vals.length) return null;
  const sum=vals.reduce((a,b)=>a+b,0);
  return calcMode==="sum"?sum:sum/vals.length;
}
function calcCoupleAvg(scores,roundId,coupleId,judgeUsers,scoringType,criteriaKeys,avgMode,calcMode) {
  if(!scores||!scores[roundId]) return null;
  const vals=judgeUsers.map(j=>calcEntryScore(scores[roundId]?.[j.id]?.[coupleId],scoringType,criteriaKeys,calcMode)).filter(v=>v!=null);
  if(!vals.length) return null;
  if(avgMode==="trimmed"&&vals.length>=3) {
    const sorted=[...vals].sort((a,b)=>a-b);
    const trimmed=sorted.slice(1,sorted.length-1);
    return trimmed.reduce((a,b)=>a+b,0)/trimmed.length;
  }
  return vals.reduce((a,b)=>a+b,0)/vals.length;

function isOutlierScore(myScore,myJudgeId,scores,roundId,coupleId,judgeUsers,scoringType,criteriaKeys,threshold) {

function fixArrays(obj) {
  if(obj===null||obj===undefined) return obj;
  if(Array.isArray(obj)) return obj.map(fixArrays);

  const keys=Object.keys(obj);
  if(keys.length>0&&keys.every((k,i)=>k===String(i))) return keys.map(k=>fixArrays(obj[k]));

/* ══ ScoreCell [기능3] 소수점 2자리 직접 입력, ±버튼 포커스 유지 ══ */
function ScoreCell({value,onChange,disabled,step}) {
  const s=step||0.5,ref=React.useRef(null);
  React.useEffect(()=>{if(ref.current&&document.activeElement!==ref.current){ref.current.value=value!=null&&value!==""?String(value):"";}},[value]);
  const clampFree=(v)=>Math.round(Math.min(10,Math.max(0,v))*100)/100;
  const clampStep=(v)=>Math.min(10,Math.max(0,Math.round(v/s)*s));
  const adjust=(delta)=>{const cur=parseFloat(ref.current?.value)||0;const next=clampStep(cur+delta);if(ref.current)ref.current.value=String(next);onChange(next);};
  return(
    <div style={{display:"flex",alignItems:"center",gap:"2px",justifyContent:"center"}}>
      <button disabled={disabled} onMouseDown={e=>{e.preventDefault();adjust(-s);}}
        style={{width:"24px",height:"26px",borderRadius:"4px",border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--muted)",cursor:disabled?"not-allowed":"pointer",fontSize:"15px",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
      <input ref={ref} type="text" inputMode="decimal"
        defaultValue={value!=null&&value!==""?String(value):""}
        disabled={disabled} placeholder="–" className="score-input" style={{width:"62px"}}
        onBlur={e=>{const v=e.target.value.trim();if(v===""||v==="–"){onChange(null);return;}const n=parseFloat(v);if(!isNaN(n)){const c=clampFree(n);e.target.value=String(c);onChange(c);}else{e.target.value="";onChange(null);}}}
        onChange={()=>{}} />
      <button disabled={disabled} onMouseDown={e=>{e.preventDefault();adjust(+s);}}
        style={{width:"24px",height:"26px",borderRadius:"4px",border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--muted)",cursor:disabled?"not-allowed":"pointer",fontSize:"15px",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>＋</button>
    </div>
  );
}

/* ══ MemoCell [기능4] imeActive → 골드 테두리 ══ */
function MemoCell({value,onChange,disabled,placeholder,lang,imeActive}) {
  const ref=React.useRef(null),focused=React.useRef(false),composing=React.useRef(false),lastVal=React.useRef(value||"");
  React.useEffect(()=>{if(ref.current){ref.current.value=value||"";lastVal.current=value||"";}},[]);
  React.useEffect(()=>{if(ref.current&&!focused.current){const incoming=value||"";if(incoming!==lastVal.current){ref.current.value=incoming;lastVal.current=incoming;}}},[value]);
  const commit=(v)=>{if(v!==lastVal.current){lastVal.current=v;onChange(v);}};
  return(
    <textarea ref={ref} rows={2} disabled={disabled} placeholder={placeholder} lang={lang} inputMode="text" autoCorrect="off" autoCapitalize="off" spellCheck={false}
      style={{width:"100%",minWidth:"150px",resize:"vertical",fontSize:"12px",...(imeActive?{border:"2px solid var(--gold)",background:"rgba(201,168,76,.04)",boxShadow:"0 0 0 1px rgba(201,168,76,.2)"}:{})}}
      onFocus={()=>{focused.current=true;}}
      onBlur={e=>{focused.current=false;composing.current=false;commit(e.target.value);}}
      onCompositionStart={()=>{composing.current=true;}}
      onCompositionEnd={e=>{composing.current=false;commit(e.target.value);}}
      onChange={e=>{if(!composing.current)commit(e.target.value);}} />
  );
}

  // [기능5] 메모 승계 포함 getEntry
  const getEntry=(coupleId)=>{
    const saved=scores?.[roundKey]?.[judgeId]?.[coupleId]||{},local=localScores[coupleId]||{},merged={...saved,...local};
    if(!merged.memo&&cat){const inherited=getInheritedMemo(scores,judgeId,coupleId,cat,roundKey);if(inherited)merged.memo=inherited;}

  const toggleLock=()=>{if(isDirectorLocked)return;setJudgeLocks(prev=>({...prev,[roundKey]:{...(prev[roundKey]||{}),[judgeId]:!isJudgeLocked}}));};
  return(
    <div style={{padding:"20px",maxWidth:"1100px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>

      </div>

            </table>

        </div>
      )}
    </div>
  );
}
/* ══ DirectorPanel [기능7] JJ 확정 모달 리더/팔로워 2열 ══ */
function DirectorPanel({tournament,scores,setTournament,users,judgeLocks,setJudgeLocks,directorLocks,setDirectorLocks,setBroadcast,broadcast,currentUser,fbUpdate,t}) {

  const round=(cat?.rounds||[]).find(r=>r.id===selRound);

  const isJJCat=cat?.type==="jacknjill";
  const getAvg=(cid)=>calcCoupleAvg(scores,selRound,cid,judgeUsers,cat?.scoringType,cat?.criteria,avgMode,calcMode);
  const getJScore=(jid,cid)=>calcEntryScore(scores?.[selRound]?.[jid]?.[cid],cat?.scoringType,cat?.criteria,calcMode);
  const ranked=useMemo(()=>[...couples].sort((a,b)=>{const av=getAvg(a.id),bv=getAvg(b.id);if(av==null&&bv==null)return 0;if(av==null)return 1;if(bv==null)return-1;return bv-av;}),[couples,scores,selRound,judgeUsers,cat]);
  // [기능7] JJ 분리 순위
  const rankedLeaders=isJJCat?ranked.filter(p=>p.gender==="male"||p.gender==="couple"):[];
  const rankedFollowers=isJJCat?ranked.filter(p=>p.gender==="female"):[];
  const curStageKey=round?.stageKey;
  const curStage=curStageKey?(cat?.stages||[]).find(s=>s.stageKey===curStageKey):null;
  const curStageRounds=(cat?.rounds||[]).filter(r=>r.stageKey===curStageKey);
  const allStageLocked=curStageRounds.length>0&&curStageRounds.every(r=>directorLocks?.[r.id]||r.finalized)&&!curStage?.finalized;
  const advStage=(cat?.stages||[]).find(s=>s.stageKey===showStageAdv);
  const nextStageKey=cat?getNextStageKey(cat,showStageAdv||""):null;
  const nextStageLabel=nextStageKey?((cat?.stages||[]).find(s=>s.stageKey===nextStageKey)||{}).label||"":null;
  const nextStageRounds=nextStageKey?(cat?.rounds||[]).filter(r=>r.stageKey===nextStageKey):[];
  const isRFin=(r)=>!!(r&&(r.finalized||directorLocks?.[r.id]));
  const stageAdvancers=useMemo(()=>{
    if(!showStageAdv||!cat) return[];
    try{const ids=new Set((cat.rounds||[]).filter(r=>r.stageKey===showStageAdv&&isRFin(r)).flatMap(r=>toArr(r.advancedIds)).filter(Boolean));const ps=[...ids].map(id=>(tournament.participants||[]).find(p=>p.id===id)).filter(Boolean);return ps.sort((a,b)=>{try{const rsA=(cat.rounds||[]).filter(r=>r.stageKey===showStageAdv&&isRFin(r)&&toArr(r.coupleIds).includes(a.id));const rsB=(cat.rounds||[]).filter(r=>r.stageKey===showStageAdv&&isRFin(r)&&toArr(r.coupleIds).includes(b.id));const avA=rsA.length?rsA.map(r=>calcCoupleAvg(scores,r.id,a.id,judgeUsers,cat.scoringType,cat.criteria,avgMode,calcMode)||0).reduce((x,y)=>x+y,0)/rsA.length:0;const avB=rsB.length?rsB.map(r=>calcCoupleAvg(scores,r.id,b.id,judgeUsers,cat.scoringType,cat.criteria,avgMode,calcMode)||0).reduce((x,y)=>x+y,0)/rsB.length:0;return avB-avA;}catch(e){return 0;}});}catch(e){console.error(e);return[];}
  },[showStageAdv,cat,tournament.participants,scores,directorLocks]);
  const lockRound=()=>{if(!selectedAdv.length)return;const newTmt={...tournament,categories:(tournament.categories||[]).map(c=>c.id!==selCat?c:{...c,rounds:(c.rounds||[]).map(r=>r.id===selRound?{...r,finalized:true,advancedIds:selectedAdv}:r)})};const newDL={...directorLocks,[selRound]:true};fbUpdate({tournament:newTmt,directorLocks:newDL});setTournament(newTmt);setDirectorLocks(newDL);setShowLockConfirm(false);setSelectedAdv([]);};
  const unlockRound=()=>{if(currentUser?.role!=="admin")return;const dl={...directorLocks};delete dl[selRound];setDirectorLocks(dl);const jl={...judgeLocks};delete jl[selRound];setJudgeLocks(jl);setTournament(prev=>({...prev,categories:(prev.categories||[]).map(c=>c.id!==selCat?c:{...c,rounds:(c.rounds||[]).map(r=>r.id===selRound?{...r,finalized:false,advancedIds:[]}:r)})}));};

  const confirmStageAdv=(stageKey,distMode)=>{
    const cat2=(tournament.categories||[]).find(c=>c.id===selCat);
    const advIds=[...new Set((cat2?.rounds||[]).filter(r=>r.stageKey===stageKey&&(r.finalized||directorLocks?.[r.id])).flatMap(r=>toArr(r.advancedIds)).filter(Boolean))];

    if(nsk&&advIds.length>0&&distMode!=="none"){const nextRs=newRounds.filter(r=>r.stageKey===nsk);if(nextRs.length>0){const pool=advIds.map(id=>(tournament.participants||[]).find(p=>p.id===id)).filter(Boolean);if(!pool.length){setShowStageAdv(null);return;}if(cat2?.type==="jacknjill"){const{distributed,warning}=distributeJJ(pool,nextRs,distMode);newRounds=newRounds.map(r=>{const d=distributed.find(x=>x.roundId===r.id);return d?{...r,coupleIds:d.coupleIds}:r;});if(warning)setTimeout(()=>alert(warning),300);}else{let sorted=[...pool];if(distMode==="random"){for(let i=sorted.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sorted[i],sorted[j]]=[sorted[j],sorted[i]];}}else sorted.sort((a,b)=>parseInt(a.number)-parseInt(b.number));let idx=0;const dist=nextRs.map(r=>{const sz=r.targetSize||Math.ceil(sorted.length/nextRs.length);const chunk=sorted.slice(idx,idx+sz).map(p=>p.id);idx+=sz;return{...r,coupleIds:chunk};});newRounds=newRounds.map(r=>{const d=dist.find(x=>x.id===r.id);return d||r;});}}}
    const isFinal=!nsk;
    let finalRankings=[];
    if(isFinal){const finalRs=(cat2?.rounds||[]).filter(r=>r.stageKey===stageKey&&(r.finalized||directorLocks?.[r.id]));const finalIds=[...new Set(finalRs.flatMap(r=>toArr(r.advancedIds)).filter(Boolean))];finalRankings=finalIds.map(pid=>{const p=(tournament.participants||[]).find(x=>x.id===pid);const rs=finalRs.filter(r=>toArr(r.coupleIds).includes(pid));const avgs=rs.map(r=>calcCoupleAvg(scores,r.id,pid,judgeUsers,cat2?.scoringType,cat2?.criteria,avgMode,calcMode)).filter(v=>v!=null);const avg=avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:null;return{pid,number:p?.number||"?",nickname:p?.nickname||"",avg};}).sort((a,b)=>b.avg!=null&&a.avg!=null?b.avg-a.avg:b.avg!=null?1:-1).map((r,i)=>({...r,rank:i+1}));}
    const newTmt={...tournament,finalResults:isFinal?{...(tournament.finalResults||{}),[selCat]:{confirmed:true,confirmedAt:Date.now(),rankings:finalRankings,catName:cat2?.name||selCat}}:(tournament.finalResults||{}),categories:(tournament.categories||[]).map(c=>c.id!==selCat?c:{...c,stages:(c.stages||[]).map(s=>s.stageKey===stageKey?{...s,finalized:true,advancedIds:advIds}:s),rounds:newRounds})};

  };
  return(
    <div style={{padding:"20px",maxWidth:"1100px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
        {(tournament.categories||[]).map(c=><button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`} onClick={()=>{setSelCat(c.id);setSelRound("");}}>{c.name}</button>)}

        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>

                    🔒 론다 확정{!allJudgesLocked?` (${lockedJudges.length}/${judgeUsers.length})`:hasU?" (미배치 있음)":""}

function LivePanel({tournament,scores,users,t}) {
  const [selCat,setSelCat]=useState(((tournament.categories||[])[0]||{}).id||"");
  const [selRound,setSelRound]=useState(""),[mode,setMode]=useState("final");
  // [SYNC FIX] Firebase 업데이트 시 selCat 자동 보정
  React.useEffect(()=>{const cats=tournament.categories||[];if(cats.length>0&&!cats.find(c=>c.id===selCat)){setSelCat(cats[0].id);setSelRound("");}}, [tournament]);
  const cat=(tournament.categories||[]).find(c=>c.id===selCat);
  const round=(cat?.rounds||[]).find(r=>r.id===selRound);
  const judgeUsers=(users||[]).filter(u=>u.role==="judge");
  const catPs=cat?getCatParticipants(tournament,cat.id):[];
  const couples=round?catPs.filter(p=>(round.coupleIds||[]).includes(p.id)):[];
  const finalRes=(tournament.finalResults||{})[selCat];
  const medals=["🥇","🥈","🥉"];
  const avgMode=cat?.scoringAvgMode||"normal",calcMode=cat?.scoringCalcMode||"average";
  const getAvg=(cid)=>calcCoupleAvg(scores,selRound,cid,judgeUsers,cat?.scoringType,cat?.criteria,avgMode,calcMode);
  const ranked=useMemo(()=>[...couples].sort((a,b)=>{const av=getAvg(a.id),bv=getAvg(b.id);if(av==null&&bv==null)return 0;if(av==null)return 1;if(bv==null)return-1;return bv-av;}),[couples,scores,selRound]);
  const pageUrl=typeof window!=="undefined"?window.location.href.split("?")[0]:"";

    <div style={{padding:"24px",maxWidth:"820px",margin:"0 auto"}}>

      </div>
      <div style={{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"18px"}}>
        {finalRes?.confirmed&&<button className={`pill-tab ${mode==="final"?"active":""}`} onClick={()=>setMode("final")}>🏆 최종 순위</button>}
        <button className={`pill-tab ${mode==="round"?"active":""}`} onClick={()=>setMode("round")}>📋 론다별 결과</button>
      </div>
      {mode==="final"&&finalRes?.confirmed&&(
        <div>
          <div style={{background:"rgba(39,174,96,.08)",border:"1px solid rgba(39,174,96,.3)",borderRadius:"10px",padding:"10px 16px",marginBottom:"14px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
            <span style={{color:"var(--green)",fontWeight:700}}>🏆 최종 순위 확정</span>

                    {isAdv&&<span className="tag tag-green" style={{marginLeft:"8px",fontSize:"10px"}}>↑진출</span>}

                  </div>

                </div>
              );})}
            </div>
          )}
        </>
      )}
    </div>
  );

  const publicRounds=cat?(cat.rounds||[]).filter(r=>visibility[r.id]):[];
  const finalRes=(tournament.finalResults||{})[selCat];
  const avgMode=cat?.scoringAvgMode||"normal",calcMode=cat?.scoringCalcMode||"average";
  const getAvg=(rid,cid)=>calcCoupleAvg(scores,rid,cid,judgeUsers,cat?.scoringType,cat?.criteria,avgMode,calcMode);
  const isJJCat=cat?.type==="jacknjill";
  React.useEffect(()=>{document.title=`🌹 ${tournament.name||"Tango"} — 라이브`;},[tournament.name]);
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <style>{STYLE}</style>
      <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"10px 18px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
        <span style={{fontSize:"22px"}}>🌹</span>
        <div><h1 className="serif" style={{fontSize:"1.2rem",color:"var(--gold)"}}>{tournament.name}</h1><p style={{fontSize:"11px",color:"var(--muted)"}}>🔴 LIVE</p></div>
        <div style={{marginLeft:"auto",display:"flex",gap:"5px"}}>
          {[["ko","한"],["en","EN"],["es","ES"],["ja","日"],["zh","中"]].map(([l,lbl])=><button key={l} className={`pill-tab ${lang===l?"active":""}`} onClick={()=>setLang(l)} style={{fontSize:"11px",padding:"3px 7px"}}>{lbl}</button>)}
        </div>
      </div>
      <div style={{padding:"18px",maxWidth:"800px",margin:"0 auto"}}>
        <div style={{display:"flex",gap:"7px",flexWrap:"wrap",marginBottom:"18px"}}>
          {(tournament.categories||[]).map(c=>{const hf=!!(tournament.finalResults||{})[c.id]?.confirmed,pc=(c.rounds||[]).filter(r=>visibility[r.id]).length;return<button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`} onClick={()=>setSelCat(c.id)}>{c.name}{hf?" 🏆":pc>0?` (${pc})`:""}</button>;})}
        </div>
        {finalRes?.confirmed&&(
          <div style={{marginBottom:"22px"}}>
            <div style={{background:"rgba(39,174,96,.08)",border:"1px solid rgba(39,174,96,.3)",borderRadius:"10px",padding:"10px 16px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"18px"}}>🏆</span>
              <div><p style={{fontWeight:700,color:"var(--green)",fontSize:"13px"}}>최종 순위 확정</p><p style={{fontSize:"11px",color:"var(--muted)"}}>{new Date(finalRes.confirmedAt).toLocaleString("ko-KR")}</p></div>
            </div>
            <div className="card" style={{padding:0,overflow:"hidden"}}>
              <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",background:"rgba(201,168,76,.06)"}}><h2 className="serif" style={{fontSize:"1.2rem",color:"var(--gold)"}}>{finalRes.catName} 최종 순위</h2></div>
              {(finalRes.rankings||[]).map((r,idx)=>(
                <div key={r.pid} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 18px",borderBottom:"1px solid rgba(42,42,42,.4)",background:idx===0?"rgba(201,168,76,.08)":idx===1?"rgba(201,168,76,.05)":idx===2?"rgba(201,168,76,.03)":""}}>
                  <span style={{fontSize:"26px",minWidth:"36px",textAlign:"center"}}>{idx<3?medals[idx]:<span className="serif" style={{fontSize:"17px",color:"var(--muted)",fontWeight:700}}>{idx+1}</span>}</span>
                  <div style={{flex:1}}><span style={{color:"var(--gold)",fontWeight:700,fontSize:"17px",marginRight:"9px"}}>{r.number}</span><span style={{fontWeight:600,fontSize:"15px"}}>{r.nickname||"–"}</span></div>
                  <span className="live-rank" style={{fontSize:"1.7rem"}}>{r.avg!=null?r.avg.toFixed(2):"–"}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {publicRounds.length===0&&!finalRes?.confirmed&&(
          <div className="card" style={{textAlign:"center",padding:"50px 20px"}}>
            <div style={{fontSize:"44px",marginBottom:"10px"}}>🔒</div>
            <p style={{color:"var(--muted)",fontSize:"15px",fontWeight:500}}>채점 결과 공개 전입니다</p>
            <p style={{color:"var(--muted)",fontSize:"13px",marginTop:"6px"}}>잠시 후 발표됩니다</p>
          </div>
        )}
        {publicRounds.map(round=>{const rPs=catPs.filter(p=>(round.coupleIds||[]).includes(p.id));const rankd=[...rPs].sort((a,b)=>{const av=getAvg(round.id,a.id),bv=getAvg(round.id,b.id);if(av==null&&bv==null)return 0;if(av==null)return 1;if(bv==null)return-1;return bv-av;});return(
          <div key={round.id} style={{marginBottom:"18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"7px"}}>
              <span style={{fontWeight:700,color:"var(--gold)",fontSize:"14px"}}>{round.title}</span>
              {round.finalized&&<span className="tag tag-green">✓ 확정</span>}
              <span style={{fontSize:"11px",color:"var(--muted)",marginLeft:"auto"}}>{rPs.length}팀</span>
            </div>
            <div className="card" style={{padding:0,overflow:"hidden"}}>
              {rankd.length===0?<div style={{padding:"18px",textAlign:"center",color:"var(--muted)"}}>채점 진행 중</div>
                :rankd.map((p,idx)=>{const avg=getAvg(round.id,p.id),isAdv=round.finalized&&(round.advancedIds||[]).includes(p.id),isElim=round.finalized&&!isAdv;return(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"11px 16px",borderBottom:"1px solid rgba(42,42,42,.35)",background:isAdv?"rgba(39,174,96,.06)":isElim?"rgba(192,57,43,.04)":idx<3?"rgba(201,168,76,.03)":""}}>
                    <span style={{fontSize:"20px",minWidth:"32px",textAlign:"center"}}>{idx<3?medals[idx]:<span className="serif" style={{fontSize:"14px",color:"var(--muted)"}}>{idx+1}</span>}</span>
                    <div style={{flex:1}}><span style={{color:isAdv?"var(--green)":isElim?"var(--muted)":"var(--gold)",fontWeight:700,fontSize:"15px",marginRight:"7px"}}>{p.number}</span><span style={{fontSize:"14px",color:isElim?"var(--muted)":"var(--text)"}}>{getDisplayName(p,isJJCat)||"–"}</span>{isAdv&&<span className="tag tag-green" style={{marginLeft:"7px",fontSize:"10px"}}>↑진출</span>}</div>
                    <span className="live-rank" style={{fontSize:"1.5rem",color:isElim?"var(--muted)":"var(--gold)"}}>{avg!=null?avg.toFixed(2):"–"}</span>
                  </div>
                );})}
            </div>
          </div>
        );})}
        <p style={{textAlign:"center",fontSize:"11px",color:"var(--border)",marginTop:"28px"}}>© {tournament.name} · Tango Judge System by 김동욱 / 김토끼</p>
      </div>
    </div>
  );
}

/* ══ ExportPanel ══ */
function ExportPanel({tournament,scores,users,t}) {
  const [selCat,setSelCat]=useState(((tournament.categories||[])[0]||{}).id||"");
  const [selRound,setSelRound]=useState("");
  const cat=(tournament.categories||[]).find(c=>c.id===selCat);
  const round=(cat?.rounds||[]).find(r=>r.id===selRound);
  const judgeUsers=(users||[]).filter(u=>u.role==="judge");
  const catPs=cat?getCatParticipants(tournament,cat.id):[];
  const couples=round?catPs.filter(p=>(round.coupleIds||[]).includes(p.id)):[];
  const avgMode=cat?.scoringAvgMode||"normal",calcMode=cat?.scoringCalcMode||"average";
  const isJJCat=cat?.type==="jacknjill";
  const getAvg=(cid)=>calcCoupleAvg(scores,selRound,cid,judgeUsers,cat?.scoringType,cat?.criteria,avgMode,calcMode);
  const ranked=useMemo(()=>[...couples].sort((a,b)=>{const av=getAvg(a.id),bv=getAvg(b.id);if(av==null&&bv==null)return 0;if(av==null)return 1;if(bv==null)return-1;return bv-av;}),[couples,scores,selRound]);
  const downloadCSV=()=>{if(!round)return;const crit=cat.scoringType==="detailed"?cat.criteria||[]:[];const headers=["순위","등번호","닉네임",...judgeUsers.map(j=>j.name),"평균",`평균방식(${avgMode})`];const rows=ranked.map((p,idx)=>{const avg=getAvg(p.id);const jScores=judgeUsers.map(j=>{const e=scores?.[selRound]?.[j.id]?.[p.id];const sc=calcEntryScore(e,cat.scoringType,crit);return sc!=null?sc.toFixed(2):"";});return[idx+1,p.number,getDisplayName(p,isJJCat)||"–",...jScores,avg!=null?avg.toFixed(2):""];});const csv="\uFEFF"+[headers,...rows].map(r=>r.join(",")).join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${round.title}_채점결과.csv`;a.click();URL.revokeObjectURL(url);};
  return(
    <div style={{padding:"24px",maxWidth:"900px",margin:"0 auto"}}>
      <h1 className="serif" style={{fontSize:"1.7rem",color:"var(--gold)",marginBottom:"18px"}}>📤 {t("export")}</h1>
      <div style={{display:"flex",gap:"7px",flexWrap:"wrap",marginBottom:"10px"}}>{(tournament.categories||[]).map(c=><button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`} onClick={()=>{setSelCat(c.id);setSelRound("");}}>{c.name}</button>)}</div>
      {cat&&<div style={{display:"flex",gap:"7px",flexWrap:"wrap",marginBottom:"18px"}}>{(cat.rounds||[]).map(r=><button key={r.id} className={`pill-tab ${selRound===r.id?"active":""}`} onClick={()=>setSelRound(r.id)}>{r.title}</button>)}</div>}
      {round&&(
        <div className="card" style={{padding:0,overflow:"hidden"}}>
          <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:"8px"}}>
            <span className="serif" style={{color:"var(--gold)",fontWeight:700}}>{round.title}</span>
            {avgMode==="trimmed"&&<span className="tag tag-blue" style={{fontSize:"10px"}}>절사평균</span>}
            <div style={{marginLeft:"auto",display:"flex",gap:"7px"}}><button className="btn btn-green btn-sm" onClick={downloadCSV}>⬇ CSV</button><button className="btn btn-ghost btn-sm" onClick={()=>window.print()}>🖨 인쇄</button></div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>순위</th><th>등번호</th><th>닉네임</th>{judgeUsers.map(j=><th key={j.id} style={{textAlign:"center"}}>{j.name}</th>)}<th style={{textAlign:"center"}}>평균</th></tr></thead>
              <tbody>
                {ranked.map((p,idx)=>{const avg=getAvg(p.id),isAdv=(round.advancedIds||[]).includes(p.id);return(
                  <tr key={p.id} style={{background:isAdv?"rgba(39,174,96,.06)":""}}>
                    <td><span className="serif" style={{fontWeight:700,color:idx<3?"var(--gold)":"var(--muted)"}}>{idx+1}</span>{isAdv&&<span style={{fontSize:"10px",color:"var(--green)",marginLeft:"4px"}}>↑진출</span>}</td>
                    <td style={{color:"var(--gold)",fontWeight:700}}>{p.number}</td>
                    <td>{getDisplayName(p,isJJCat)||"–"}</td>
                    {judgeUsers.map(j=>{const e=scores?.[selRound]?.[j.id]?.[p.id];const sc=calcEntryScore(e,cat.scoringType,cat.criteria||[],calcMode);return<td key={j.id} style={{textAlign:"center",color:sc!=null?"var(--text)":"var(--muted)"}}>{sc!=null?sc.toFixed(2):"–"}</td>;})}
                    <td style={{textAlign:"center",fontWeight:700,color:avg!=null?"var(--gold)":"var(--muted)"}}>{avg!=null?avg.toFixed(2):"–"}</td>
                  </tr>
                );})}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}
/* ══ MAIN APP ══ */
function App() {
  const isPublicMode=typeof window!=="undefined"&&(window.location.search.includes("public")||window.location.hash.includes("public"));
  const [lang,setLang]=useState("ko");
  const t=(key)=>TR[lang]?.[key]??key;
  const [users,setUsers]=useState(INIT_USERS);
  const [tournament,setTournament]=useState(INIT_TOURNAMENT);
  const [scores,setScores]=useState({});
  const [judgeLocks,setJudgeLocks]=useState({});
  const [directorLocks,setDirectorLocks]=useState({});
  const [broadcast,setBroadcast]=useState(null);
  const [fbReady,setFbReady]=useState(false);
  const [currentUser,setCurrentUser]=useState(null);
  const [pendingUser,setPendingUser]=useState(null);
  const [view,setView]=useState("scoring");
  const [editingName,setEditingName]=useState(false),[editNameVal,setEditNameVal]=useState("");
  const dbRef=React.useRef(null);
  const fbSet=React.useRef((path,value)=>{if(!dbRef.current)return;dbRef.current.ref(path).set(value);}).current;
  const fbUpdate=React.useRef((updates)=>{if(!dbRef.current)return;dbRef.current.ref("/").update(updates);}).current;

  React.useEffect(()=>{
    const db=window.__firebaseDB;if(!db){setFbReady(true);return;}dbRef.current=db;
    let readyCount=0;const TOTAL=6;const markReady=()=>{readyCount++;if(readyCount>=TOTAL)setFbReady(true);};
    const safeset=(setter,defaultVal)=>(snap)=>{const raw=snap.val();const v=raw!=null?fixArrays(raw):defaultVal;setter(v);markReady();};
    const refs=[];const sub=(path,setter,def)=>{const r=db.ref(path);refs.push(r);r.on("value",safeset(setter,def));};
    sub("tournament",setTournament,INIT_TOURNAMENT);sub("users",setUsers,INIT_USERS);sub("scores",setScores,{});
    sub("judgeLocks",setJudgeLocks,{});sub("directorLocks",setDirectorLocks,{});sub("broadcast",setBroadcast,null);
    db.ref("tournament").once("value").then(snap=>{if(!snap.exists()){db.ref("tournament").set(INIT_TOURNAMENT);db.ref("users").set(INIT_USERS);}});
    const timer=setTimeout(()=>setFbReady(true),5000);
    return()=>{refs.forEach(r=>r.off("value"));clearTimeout(timer);};
  },[]);

  const mkSynced=(setter,path)=>(updater)=>{let next;setter(prev=>{next=typeof updater==="function"?updater(prev):updater;return next;});Promise.resolve().then(()=>{if(next!==undefined)fbSet(path,next);});};
  const syncedSetTournament=mkSynced(setTournament,"tournament");
  const syncedSetUsers=mkSynced(setUsers,"users");
  const syncedSetScores=mkSynced(setScores,"scores");
  const syncedSetJudgeLocks=mkSynced(setJudgeLocks,"judgeLocks");
  const syncedSetDirectorLocks=mkSynced(setDirectorLocks,"directorLocks");
  const syncedSetBroadcast=(val)=>{setBroadcast(val);fbSet("broadcast",val);};

  const handleLogin=(u)=>setPendingUser(u);
  const handleNameConfirm=(u)=>{syncedSetUsers(prev=>(prev||[]).map(x=>x.id===u.id?{...x,name:u.name}:x));setCurrentUser(u);setPendingUser(null);if(u.role==="admin")setView("setup");else if(u.role==="director")setView("director");else setView("scoring");};
  const handleNameEdit=()=>{setEditNameVal(currentUser.name);setEditingName(true);};
  const saveNameEdit=()=>{if(!editNameVal.trim())return;syncedSetUsers(prev=>(prev||[]).map(u=>u.id===currentUser.id?{...u,name:editNameVal.trim()}:u));setCurrentUser(prev=>({...prev,name:editNameVal.trim()}));setEditingName(false);};

  if(!fbReady) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"14px"}}>
      <style>{STYLE}</style>
      <div style={{fontSize:"44px"}}>🌹</div>
      <p style={{color:"var(--gold)",fontSize:"15px"}}>Firebase 연결 중…</p>
      <p style={{color:"var(--muted)",fontSize:"12px"}}>잠시만 기다려 주세요</p>
    </div>
  );
  if(isPublicMode) return<PublicObserverPanel tournament={tournament} scores={scores} users={users} lang={lang} setLang={setLang} t={t} />;

  return(
    <div className="app">
      <style>{STYLE}</style>
      {!currentUser&&!pendingUser&&<LoginScreen users={users||INIT_USERS} onLogin={handleLogin} lang={lang} setLang={setLang} t={t} />}
      {pendingUser&&!currentUser&&<SetNameScreen user={pendingUser} onConfirm={handleNameConfirm} t={t} />}
      {currentUser&&(
        <>
          <Navbar user={currentUser} view={view} setView={setView} onLogout={()=>{setCurrentUser(null);setPendingUser(null);}} lang={lang} setLang={setLang} onNameClick={handleNameEdit} t={t} />
          {editingName&&(
            <div className="modal-overlay" onClick={()=>setEditingName(false)}>
              <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:"360px"}}>
                <h3 style={{fontSize:"15px",fontWeight:700,marginBottom:"14px"}}>✏️ 표시 이름 변경</h3>
                <input value={editNameVal} onChange={e=>setEditNameVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveNameEdit()} style={{marginBottom:"14px",fontSize:"15px"}} autoFocus />
                <div style={{display:"flex",gap:"8px",justifyContent:"flex-end"}}><button className="btn btn-ghost" onClick={()=>setEditingName(false)}>{t("cancel")}</button><button className="btn btn-gold" onClick={saveNameEdit} disabled={!editNameVal.trim()}>저장</button></div>
              </div>
            </div>
          )}
          <div style={{paddingBottom:"64px"}}>
            {view==="setup"    &&<SetupPanel tournament={tournament} setTournament={syncedSetTournament} users={users} setUsers={syncedSetUsers} directorLocks={directorLocks} setDirectorLocks={syncedSetDirectorLocks} setJudgeLocks={syncedSetJudgeLocks} setScores={syncedSetScores} fbUpdate={fbUpdate} t={t} />}
            {view==="pmgmt"    &&<ParticipantMgmtPanel tournament={tournament} setTournament={syncedSetTournament} t={t} />}
            {view==="scoring"  &&<JudgeScoringPanel tournament={tournament} scores={scores} setScores={syncedSetScores} currentUser={currentUser} users={users} judgeLocks={judgeLocks} setJudgeLocks={syncedSetJudgeLocks} directorLocks={directorLocks} broadcast={broadcast} lang={lang} t={t} />}
            {view==="director" &&<DirectorPanel tournament={tournament} scores={scores} setTournament={syncedSetTournament} users={users} judgeLocks={judgeLocks} setJudgeLocks={syncedSetJudgeLocks} directorLocks={directorLocks} setDirectorLocks={syncedSetDirectorLocks} setBroadcast={syncedSetBroadcast} broadcast={broadcast} currentUser={currentUser} fbUpdate={fbUpdate} t={t} />}
            {view==="live"     &&<LivePanel tournament={tournament} scores={scores} users={users} t={t} />}
            {view==="export"   &&<ExportPanel tournament={tournament} scores={scores} users={users} t={t} />}
          </div>
          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(13,13,13,.97)",borderTop:"1px solid var(--border)",padding:"5px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:40,backdropFilter:"blur(8px)"}}>
            <span style={{fontSize:"10px",color:"var(--muted)"}}>🌹 <strong style={{color:"var(--gold)"}}>Tango Judge System</strong> &nbsp;·&nbsp; <strong style={{color:"var(--text)"}}>김동욱 / 김토끼</strong></span>
            <span style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"10px",display:"inline-flex",alignItems:"center",gap:"4px"}}><span style={{width:"6px",height:"6px",borderRadius:"50%",background:"var(--green)",display:"inline-block",boxShadow:"0 0 5px var(--green)"}}></span><span style={{color:"var(--green)"}}>Firebase 연결됨</span></span>
              <span style={{fontSize:"10px",color:"var(--border)"}}>© 2026 · {APP_VERSION}</span>
            </span>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
