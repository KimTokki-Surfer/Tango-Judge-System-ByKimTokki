      const ps = [...ids].map(id => (tournament.participants||[]).find(p => p.id===id)).filter(Boolean);
      return ps.sort((a, b) => {
        try {
          const rsA = (cat.rounds||[]).filter(r => r.stageKey===showStageAdv && isRFin(r) && toArr(r.coupleIds).includes(a.id));
          const rsB = (cat.rounds||[]).filter(r => r.stageKey===showStageAdv && isRFin(r) && toArr(r.coupleIds).includes(b.id));
          const avA = rsA.length ? rsA.map(r => calcCoupleAvg(scores,r.id,a.id,judgeUsers,cat.scoringType,cat.criteria,avgMode)||0).reduce((x,y)=>x+y,0)/rsA.length : 0;
          const avB = rsB.length ? rsB.map(r => calcCoupleAvg(scores,r.id,b.id,judgeUsers,cat.scoringType,cat.criteria,avgMode)||0).reduce((x,y)=>x+y,0)/rsB.length : 0;
          return avB - avA;
        } catch(e) { return 0; }
      });
    } catch(e) {
      console.error("stageAdvancers error:", e);
      return [];
    }
  }, [showStageAdv, cat, tournament.participants, scores, directorLocks]);

  const lockRound = () => {
    if (!selectedAdv.length) return;
    setDirectorLocks(prev => ({ ...prev, [selRound]: true }));
    setTournament(prev => ({
      ...prev,
      categories: (prev.categories||[]).map(c => c.id!==selCat ? c : {
        ...c,
        rounds: (c.rounds||[]).map(r => r.id===selRound ? { ...r, finalized:true, advancedIds:selectedAdv } : r)
      })
    }));
    setShowLockConfirm(false); setSelectedAdv([]);
  };

  const unlockRound = () => {
    if (currentUser?.role !== "admin") return;
    const dl = { ...directorLocks }; delete dl[selRound]; setDirectorLocks(dl);
    const jl = { ...judgeLocks }; delete jl[selRound]; setJudgeLocks(jl);
    setTournament(prev => ({
      ...prev,
      categories: (prev.categories||[]).map(c => c.id!==selCat ? c : {
        ...c,
        rounds: (c.rounds||[]).map(r => r.id===selRound ? { ...r, finalized:false, advancedIds:[] } : r)
      })
    }));
  };

  const sendBroadcast = () => {
    if (!broadcastMsg.trim() || !selRound) return;
    setBroadcast({ roundId: selRound, message: broadcastMsg.trim(), ts: Date.now() });
    setBroadcastMsg(""); setShowBroadcast(false);
  };

  const confirmStageAdv = (stageKey, distMode) => {
    const cat2 = (tournament.categories||[]).find(c => c.id===selCat);
    const toArrL = (v) => {
      if (!v) return [];
      if (Array.isArray(v)) return v;
      if (typeof v === "object") return Object.values(v);
      return [];
    };
    const advIds = [...new Set(
      (cat2?.rounds||[])
        .filter(r => r.stageKey===stageKey && (r.finalized || directorLocks?.[r.id]))
        .flatMap(r => toArrL(r.advancedIds))
        .filter(Boolean)
    )];
    if (!advIds.length) {
      alert("진출자가 없습니다. 각 론다 확정 시 진출자를 선택해야 합니다.");
      setShowStageAdv(null);
      return;
    }

    const nsk = cat2 ? getNextStageKey(cat2, stageKey) : null;
    let newRounds = cat2?.rounds||[];

    // 다음 스테이지에 배분
    if (nsk && advIds.length > 0 && distMode !== "none") {
      const nextRs = newRounds.filter(r => r.stageKey === nsk);
      if (nextRs.length > 0) {
        let pool = advIds.map(id => (tournament.participants||[]).find(p => p.id===id)).filter(Boolean);
        if (distMode === "random") {
          for (let i=pool.length-1;i>0;i--) {
            const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]];
          }
        } else {
          pool.sort((a,b) => parseInt(a.number)-parseInt(b.number));
        }
        let idx=0;
        const dist = nextRs.map(r => {
          const sz = r.targetSize || Math.ceil(pool.length/nextRs.length);
          const chunk = pool.slice(idx,idx+sz).map(p=>p.id); idx+=sz;
          return { ...r, coupleIds: chunk };
        });
        newRounds = newRounds.map(r => { const d=dist.find(x=>x.id===r.id); return d||r; });
      }
    }

    // 결승 확정 시 최종순위 계산
    const isFinal = !nsk;
    let finalRankings = [];
    if (isFinal) {
      const finalRs = (cat2?.rounds||[]).filter(r => r.stageKey===stageKey && (r.finalized || directorLocks?.[r.id]));
      const finalIds = [...new Set(finalRs.flatMap(r => toArrL(r.advancedIds)).filter(Boolean))];
      finalRankings = finalIds.map(pid => {
        const p = (tournament.participants||[]).find(x => x.id===pid);
        const rs = finalRs.filter(r => toArrL(r.coupleIds).includes(pid));
        const avgs = rs.map(r => calcCoupleAvg(scores,r.id,pid,judgeUsers,cat2?.scoringType,cat2?.criteria,avgMode)).filter(v=>v!=null);
        const avg = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : null;
        return { pid, number:p?.number||"?", nickname:p?.nickname||"", avg };
      }).sort((a,b) => b.avg!=null&&a.avg!=null ? b.avg-a.avg : b.avg!=null?1:-1)
        .map((r,i) => ({ ...r, rank:i+1 }));
    }

    setTournament(prev => ({
      ...prev,
      finalResults: isFinal ? {
        ...(prev.finalResults||{}),
        [selCat]: { confirmed:true, confirmedAt:Date.now(), rankings:finalRankings, catName:cat2?.name||selCat }
      } : prev.finalResults,
      categories: (prev.categories||[]).map(c => c.id!==selCat ? c : {
        ...c,
        stages: (c.stages||[]).map(s => s.stageKey===stageKey ? { ...s, finalized:true, advancedIds:advIds } : s),
        rounds: newRounds
      })
    }));
    setShowStageAdv(null);
  };

  return (
    <div style={{ padding:"20px", maxWidth:"1100px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"12px" }}>

      {/* 종목 탭 */}
      <div style={{ display:"flex", gap:"7px", flexWrap:"wrap" }}>
        {(tournament.categories||[]).map(c => (
          <button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`}
            onClick={() => { setSelCat(c.id); setSelRound(""); }}>
            {c.name}
          </button>
        ))}
      </div>

      {/* 론다 탭 (스테이지 구분선) */}
      {cat && (
        <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", alignItems:"center" }}>
          {(cat.stages||[]).map((stage, si) => {
            const stageRs = (cat.rounds||[]).filter(r => r.stageKey===stage.stageKey);
            const stageColor = si===0?"var(--gold)":si===(cat.stages||[]).length-1?"var(--green)":"var(--blue)";
            return (
              <React.Fragment key={stage.stageKey}>
                {si > 0 && <span style={{ color:"var(--border)" }}>│</span>}
                <span style={{ fontSize:"11px", color:stageColor, fontWeight:700 }}>{stage.label}</span>
                {stageRs.map(r => (
                  <button key={r.id} className={`pill-tab ${selRound===r.id?"active":""}`}
                    onClick={() => setSelRound(r.id)} style={{ fontSize:"11px" }}>
                    {r.title}{directorLocks?.[r.id]?" 🔒":""}
                  </button>
                ))}
              </React.Fragment>
            );
          })}
        </div>
      )}

      {/* 론다 제어 카드 */}
      {round && (
        <div className="card" style={{ padding:"12px 16px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
            <span className="serif" style={{ fontSize:"15px", color:"var(--gold)", fontWeight:700 }}>{round.title}</span>
            {(cat?.scoringAvgMode==="trimmed") && <span className="tag tag-blue" style={{ fontSize:"10px" }}>절사평균</span>}
            {isDirectorLocked && <span className="tag tag-green">🔒 확정</span>}
            <div style={{ marginLeft:"auto", display:"flex", gap:"7px" }}>
              <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--warn)", color:"var(--warn)" }}
                onClick={() => { setBroadcastMsg(""); setShowBroadcast(true); }}>
                📢 공지
              </button>
              {!isDirectorLocked && (
                <button className="btn btn-red btn-sm"
                  onClick={() => { setSelectedAdv([]); setShowLockConfirm(true); }}
                  disabled={!allJudgesLocked}
                  style={{ opacity: allJudgesLocked?1:0.45 }}
                  title={!allJudgesLocked?"모든 심판 최종제출 필요":""}>
                  🔒 론다 확정{!allJudgesLocked?` (${lockedJudges.length}/${judgeUsers.length})`:""}
                </button>
              )}
              {isDirectorLocked && currentUser?.role==="admin" && (
                <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }} onClick={unlockRound}>
                  ⚠ 잠금해제
                </button>
              )}
            </div>
          </div>
          <div style={{ marginTop:"8px", display:"flex", gap:"7px", flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:"12px", color:"var(--muted)" }}>심판 최종제출:</span>
            {judgeUsers.map(j => (
              <span key={j.id} className={`tag ${judgeLocksForRound[j.id]?"tag-green":"tag-muted"}`} style={{ fontSize:"11px" }}>
                {judgeLocksForRound[j.id]?"✓ ":"○ "}{j.name}
              </span>
            ))}
            {allJudgesLocked && <span style={{ fontSize:"12px", color:"var(--green)", fontWeight:700 }}>— 전원 완료 ✓</span>}
          </div>
        </div>
      )}

      {/* 스테이지 진출 배너 */}
      {allStageLocked && round && (
        <div style={{ background:"rgba(39,174,96,.08)", border:"1px solid var(--green)", borderRadius:"10px", padding:"10px 16px", display:"flex", alignItems:"center", gap:"12px", flexWrap:"wrap" }}>
          <span style={{ color:"var(--green)", fontWeight:700 }}>✅ {curStage?.label} 전체 론다 확정 완료</span>
          <button className="btn btn-green btn-sm" onClick={() => setShowStageAdv(curStageKey)}>
            진출자 확정 →
          </button>
        </div>
      )}

      {/* 채점 테이블 */}
      {round && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          <div style={{ overflowX:"auto" }}>
            <table>
              <thead>
                <tr>
                  <th>{t("rank")}</th>
                  <th>{t("entryNo")}</th>
                  <th>{t("nickname")}</th>
                  {judgeUsers.map(j => (
                    <th key={j.id} style={{ textAlign:"center", minWidth:"80px" }}>
                      <div>{j.name}</div>
                      <div style={{ fontSize:"10px", color: judgeLocksForRound[j.id]?"var(--green)":"var(--warn)", fontWeight:400 }}>
                        {judgeLocksForRound[j.id]?"✓최종":"미확정"}
                      </div>
                    </th>
                  ))}
                  <th style={{ textAlign:"center" }}>{t("avg")}</th>
                  <th>메모</th>
                </tr>
              </thead>
              <tbody>
                {ranked.map((p, idx) => {
                  const avg    = getAvg(p.id);
                  const isAdv  = round.finalized && (round.advancedIds||[]).includes(p.id);
                  const isElim = round.finalized && !isAdv;
                  const memo   = judgeUsers.map(j => scores?.[selRound]?.[j.id]?.[p.id]?.memo).filter(Boolean).join(" | ");
                  return (
                    <tr key={p.id} style={{
                      background: isAdv?"rgba(39,174,96,.08)":isElim?"rgba(192,57,43,.05)":"",
                      borderLeft: isAdv?"3px solid var(--green)":isElim?"3px solid rgba(192,57,43,.3)":"3px solid transparent"
                    }}>
                      <td>
                        <span className="serif" style={{ fontSize:"17px", color:idx<3?"var(--gold)":"var(--muted)", fontWeight:700 }}>{idx+1}</span>
                        {isAdv && <span style={{ fontSize:"10px", color:"var(--green)", marginLeft:"4px" }}>↑진출</span>}
                        {isElim && <span style={{ fontSize:"10px", color:"var(--muted)", marginLeft:"4px" }}>탈락</span>}
                      </td>
                      <td style={{ fontWeight:700, color:isAdv?"var(--green)":isElim?"var(--muted)":"var(--gold)" }}>{p.number}</td>
                      <td style={{ color:isElim?"var(--muted)":"var(--text)" }}>{p.nickname||"–"}</td>
                      {judgeUsers.map(j => {
                        const sc = getJScore(j.id, p.id);
                        const others = judgeUsers.filter(x=>x.id!==j.id).map(x=>getJScore(x.id,p.id)).filter(v=>v!=null);
                        const isOut = sc!=null && others.length>0 && tournament.outlierEnabled!==false &&
                          others.filter(v=>Math.abs(sc-v)>=tournament.outlierThreshold).length >= Math.ceil(others.length*0.6);
                        return (
                          <td key={j.id} style={{ textAlign:"center", color:isOut?"var(--warn)":sc!=null?"var(--text)":"var(--muted)", fontWeight:isOut?700:400 }}>
                            {sc!=null?sc.toFixed(2):"–"}
                            {isOut && <span style={{ fontSize:"9px", display:"block" }}>⚠</span>}
                          </td>
                        );
                      })}
                      <td style={{ textAlign:"center", fontWeight:700, color:avg!=null?"var(--gold)":"var(--muted)" }}>
                        {avg!=null?avg.toFixed(2):"–"}
                      </td>
                      <td style={{ fontSize:"11px", color:"var(--muted)", maxWidth:"180px" }}>{memo}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ padding:"10px 16px", borderTop:"1px solid var(--border)", display:"flex", gap:"16px", flexWrap:"wrap", alignItems:"center" }}>
            {tournament.outlierEnabled!==false && (
              <span style={{ fontSize:"12px", color:"var(--muted)" }}>⚠ 이탈기준: ±{tournament.outlierThreshold}점</span>
            )}
            {round.finalized && (
              <>
                <span style={{ fontSize:"12px", display:"flex", alignItems:"center", gap:"4px" }}>
                  <span style={{ width:"9px", height:"9px", background:"rgba(39,174,96,.4)", display:"inline-block", borderRadius:"2px" }}></span>
                  <span style={{ color:"var(--green)" }}>진출</span>
                </span>
                <span style={{ fontSize:"12px", display:"flex", alignItems:"center", gap:"4px" }}>
                  <span style={{ width:"9px", height:"9px", background:"rgba(192,57,43,.25)", display:"inline-block", borderRadius:"2px" }}></span>
                  <span style={{ color:"var(--muted)" }}>탈락</span>
                </span>
                <span style={{ fontSize:"12px", color:"var(--green)", fontWeight:600 }}>
                  진출 {(round.advancedIds||[]).length}명 / 전체 {couples.length}명
                </span>
              </>
            )}
          </div>
        </div>
      )}

      {/* ── 공지 발송 모달 ── */}
      {showBroadcast && (
        <div className="modal-overlay" onClick={() => setShowBroadcast(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth:"440px" }}>
            <h3 style={{ fontSize:"15px", fontWeight:700, marginBottom:"10px" }}>📢 심판에게 공지</h3>
            <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"10px" }}>선택된 론다의 심판 채점 화면에 즉시 표시됩니다.</p>
            <textarea value={broadcastMsg} onChange={e => setBroadcastMsg(e.target.value)}
              placeholder="공지 내용 입력…"
              style={{ width:"100%", height:"90px", resize:"vertical", marginBottom:"10px" }} />
            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button className="btn btn-ghost" onClick={() => setShowBroadcast(false)}>{t("cancel")}</button>
              <button className="btn btn-gold" onClick={sendBroadcast} disabled={!broadcastMsg.trim()}>발송</button>
            </div>
          </div>
        </div>
      )}

      {/* ── 론다 확정 모달 ── */}
      {showLockConfirm && (
        <div className="modal-overlay" onClick={() => setShowLockConfirm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth:"500px" }}>
            <h3 style={{ fontSize:"15px", fontWeight:700, marginBottom:"10px" }}>🔒 론다 점수 확정</h3>
            {!allJudgesLocked && (
              <div style={{ background:"rgba(192,57,43,.1)", border:"1px solid var(--red2)", borderRadius:"8px", padding:"10px 12px", marginBottom:"12px" }}>
                <p style={{ color:"var(--red2)", fontSize:"12px" }}>
                  🚫 미제출 심판: {judgeUsers.filter(j=>!judgeLocksForRound[j.id]).map(j=>j.name).join(", ")}
                </p>
              </div>
            )}
            {allJudgesLocked && !selectedAdv.length && (
              <div style={{ background:"rgba(230,126,34,.1)", border:"1px solid var(--warn)", borderRadius:"8px", padding:"10px 12px", marginBottom:"12px" }}>
                <p style={{ color:"var(--warn)", fontSize:"12px" }}>⚠ 진출자를 최소 1명 이상 선택해야 합니다.</p>
              </div>
            )}
            <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"8px" }}>
              진출자를 클릭으로 선택하세요. 확정 후 관리자 외 수정 불가.
            </p>
            <div style={{ marginBottom:"10px", maxHeight:"280px", overflowY:"auto" }}>
              <table>
                <thead><tr><th>순위</th><th>번호</th><th>닉네임</th><th>평균</th><th>진출</th></tr></thead>
                <tbody>
                  {ranked.map((p, idx) => {
                    const avg = getAvg(p.id);
                    const sel = selectedAdv.includes(p.id);
                    return (
                      <tr key={p.id} style={{ background:sel?"rgba(39,174,96,.08)":"", cursor:"pointer" }}
                        onClick={() => setSelectedAdv(prev => sel?prev.filter(id=>id!==p.id):[...prev,p.id])}>
                        <td><span className="serif" style={{ color:idx<3?"var(--gold)":"var(--muted)", fontWeight:700 }}>{idx+1}</span></td>
                        <td style={{ color:"var(--gold)", fontWeight:700 }}>{p.number}</td>
                        <td>{p.nickname||"–"}</td>
                        <td style={{ color:"var(--gold)", fontWeight:700 }}>{avg!=null?avg.toFixed(2):"–"}</td>
                        <td style={{ textAlign:"center" }}><input type="checkbox" checked={sel} readOnly /></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <p style={{ fontSize:"12px", color:"var(--green)", marginBottom:"10px" }}>{selectedAdv.length}명 선택</p>
            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button className="btn btn-ghost" onClick={() => setShowLockConfirm(false)}>{t("cancel")}</button>
              <button className="btn btn-red" onClick={lockRound}
                disabled={!selectedAdv.length} style={{ opacity:selectedAdv.length?1:0.45 }}>
                🔒 확정 ({selectedAdv.length}명 진출)
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── 스테이지 진출 확정 + 배분 모달 ── */}
      {showStageAdv && (
        <div className="modal-overlay" onClick={() => setShowStageAdv(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth:"520px" }}>
            <h3 style={{ fontSize:"15px", fontWeight:700, marginBottom:"6px" }}>
              🏆 {advStage?.label} 진출자 확정{nextStageLabel ? ` 및 ${nextStageLabel} 배분` : ""}
            </h3>
            <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"12px" }}>
              각 론다 확정 시 결정된 진출자입니다.
            </p>

            {/* 진출자 목록 */}
            <div style={{ background:"var(--bg3)", borderRadius:"8px", padding:"10px 12px", marginBottom:"12px", maxHeight:"220px", overflowY:"auto" }}>
              <p style={{ fontSize:"12px", color:"var(--green)", fontWeight:700, marginBottom:"7px" }}>
                ✅ 진출 {stageAdvancers.length}명
              </p>
              {stageAdvancers.length === 0
                ? <p style={{ fontSize:"12px", color:"var(--red2)" }}>⚠ 론다 확정 시 진출자를 선택해야 합니다.</p>
                : stageAdvancers.map((p, idx) => {
                    const rs = (cat?.rounds||[]).filter(r => r.stageKey===showStageAdv && isRFin(r) && toArr(r.coupleIds).includes(p.id));
                    const avgs = rs.map(r => calcCoupleAvg(scores,r.id,p.id,judgeUsers,cat?.scoringType,cat?.criteria,avgMode)).filter(v=>v!=null);
                    const av = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : null;
                    const fromR = (cat?.rounds||[]).find(r => r.stageKey===showStageAdv && (r.advancedIds||[]).includes(p.id));
                    return (
                      <div key={p.id} style={{ display:"flex", alignItems:"center", gap:"8px", padding:"3px 6px", marginBottom:"3px" }}>
                        <span className="serif" style={{ color:"var(--gold)", fontWeight:700, minWidth:"20px" }}>{idx+1}</span>
                        <span style={{ color:"var(--gold)", fontWeight:700, minWidth:"32px" }}>{p.number}</span>
                        <span style={{ flex:1, fontSize:"13px" }}>{p.nickname||"–"}</span>
                        {fromR && <span style={{ fontSize:"10px", color:"var(--muted)" }}>{fromR.title}</span>}
                        <span style={{ color:"var(--green)", fontWeight:700 }}>{av!=null?av.toFixed(2):"–"}</span>
                      </div>
                    );
                  })
              }
            </div>

            {/* 결승 확정 안내 */}
            {!nextStageKey && stageAdvancers.length > 0 && (
              <div style={{ background:"rgba(39,174,96,.08)", border:"1px solid var(--green)", borderRadius:"8px", padding:"10px 12px", marginBottom:"12px" }}>
                <p style={{ color:"var(--green)", fontWeight:700, fontSize:"13px" }}>🏆 결승 — 이 순위로 최종 결과를 확정하시겠습니까?</p>
                <p style={{ fontSize:"12px", color:"var(--muted)", marginTop:"4px" }}>확정 후 라이브 화면에서 URL로 즉시 공유할 수 있습니다.</p>
              </div>
            )}

            {/* 다음 스테이지 배분 선택 */}
            {nextStageKey && nextStageRounds.length > 0 && stageAdvancers.length > 0 && (
              <div style={{ background:"rgba(201,168,76,.06)", border:"1px solid rgba(201,168,76,.2)", borderRadius:"8px", padding:"10px 12px", marginBottom:"12px" }}>
                <p style={{ fontSize:"12px", color:"var(--gold)", fontWeight:700, marginBottom:"8px" }}>
                  📋 {nextStageLabel} 배분 방식 ({nextStageRounds.length}개 론다)
                </p>
                <div style={{ display:"flex", gap:"7px", flexWrap:"wrap" }}>
                  <button className="btn btn-gold btn-sm" onClick={() => confirmStageAdv(showStageAdv,"order")}>🔢 등번호순</button>
                  <button className="btn btn-red btn-sm" onClick={() => confirmStageAdv(showStageAdv,"random")}>🔀 랜덤</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => confirmStageAdv(showStageAdv,"none")} title="배분 없이 진출만 확정">확정만</button>
                </div>
              </div>
            )}

            {nextStageKey && nextStageRounds.length === 0 && (
              <p style={{ fontSize:"12px", color:"var(--warn)", marginBottom:"12px" }}>
                ⚠ {nextStageLabel}에 론다가 없습니다. 대회설정에서 먼저 추가하세요.
              </p>
            )}

            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button className="btn btn-ghost" onClick={() => setShowStageAdv(null)}>{t("cancel")}</button>
              {(!nextStageKey || nextStageRounds.length === 0) && (
                <button className="btn btn-green"
                  disabled={!stageAdvancers.length} style={{ opacity:stageAdvancers.length?1:0.5 }}
                  onClick={() => confirmStageAdv(showStageAdv,"order")}>
                  {!nextStageKey ? `🏆 최종 순위 확정 (${stageAdvancers.length}명)` : `진출 확정 (${stageAdvancers.length}명)`}
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function LivePanel({ tournament, scores, users, t }) {
  const [selCat, setSelCat]     = useState(((tournament.categories||[])[0]||{}).id || "");
  const [selRound, setSelRound] = useState("");
  const [mode, setMode]         = useState("final");

  const cat        = (tournament.categories||[]).find(c => c.id===selCat);
  const round      = (cat?.rounds||[]).find(r => r.id===selRound);
  const judgeUsers = (users||[]).filter(u => u.role==="judge");
  const catPs      = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples    = round ? catPs.filter(p => (round.coupleIds||[]).includes(p.id)) : [];

  const getAvg = (cid) => calcCoupleAvg(scores, selRound, cid, judgeUsers, cat?.scoringType, cat?.criteria, avgMode);

  const ranked = useMemo(() => {
    return [...couples].sort((a,b) => {
      const av=getAvg(a.id), bv=getAvg(b.id);
      if(av==null&&bv==null) return 0; if(av==null) return 1; if(bv==null) return -1; return bv-av;
    });

/* ════════════════════════════════════════════
   EXPORT PANEL
════════════════════════════════════════════ */
function ExportPanel({ tournament, scores, users, t }) {
  const [selCat, setSelCat]     = useState(((tournament.categories||[])[0]||{}).id || "");
  const [selRound, setSelRound] = useState("");

  const cat        = (tournament.categories||[]).find(c => c.id===selCat);
  const round      = (cat?.rounds||[]).find(r => r.id===selRound);
  const judgeUsers = (users||[]).filter(u => u.role==="judge");
  const catPs      = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples    = round ? catPs.filter(p => (round.coupleIds||[]).includes(p.id)) : [];
  const avgMode    = cat?.scoringAvgMode || "normal";

  const getAvg = (cid) => calcCoupleAvg(scores, selRound, cid, judgeUsers, cat?.scoringType, cat?.criteria, avgMode);

  const ranked = useMemo(() => {
    return [...couples].sort((a,b) => {
      const av=getAvg(a.id), bv=getAvg(b.id);
      if(av==null&&bv==null) return 0; if(av==null) return 1; if(bv==null) return -1; return bv-av;
    });
  }, [couples, scores, selRound]);

  const downloadCSV = () => {
    if (!round) return;
    const crit = cat.scoringType==="detailed" ? cat.criteria||[] : [];
    const headers = ["순위","등번호","닉네임",...judgeUsers.map(j=>j.name),"평균",`평균방식(${avgMode})`];
    const rows = ranked.map((p,idx) => {
      const avg = getAvg(p.id);
      const jScores = judgeUsers.map(j => {
        const e = scores?.[selRound]?.[j.id]?.[p.id];
        const sc = calcEntryScore(e, cat.scoringType, crit);
        return sc!=null?sc.toFixed(2):"";
      });
      return [idx+1, p.number, p.nickname||"", ...jScores, avg!=null?avg.toFixed(2):""];
    });
    const csv = "\uFEFF" + [headers,...rows].map(r=>r.join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`${round.title}_채점결과.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ padding:"24px", maxWidth:"900px", margin:"0 auto" }}>
      <h1 className="serif" style={{ fontSize:"1.7rem", color:"var(--gold)", marginBottom:"18px" }}>📤 {t("export")}</h1>
      <div style={{ display:"flex", gap:"7px", flexWrap:"wrap", marginBottom:"10px" }}>
        {(tournament.categories||[]).map(c => (
          <button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`}
            onClick={() => { setSelCat(c.id); setSelRound(""); }}>{c.name}</button>
        ))}
      </div>
      {cat && (
        <div style={{ display:"flex", gap:"7px", flexWrap:"wrap", marginBottom:"18px" }}>
          {(cat.rounds||[]).map(r => (
            <button key={r.id} className={`pill-tab ${selRound===r.id?"active":""}`} onClick={() => setSelRound(r.id)}>
              {r.title}
            </button>
          ))}
        </div>
      )}
      {round && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          <div style={{ padding:"12px 18px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:"8px" }}>
            <span className="serif" style={{ color:"var(--gold)", fontWeight:700 }}>{round.title}</span>
            {avgMode==="trimmed" && <span className="tag tag-blue" style={{ fontSize:"10px" }}>절사평균</span>}
            <div style={{ marginLeft:"auto", display:"flex", gap:"7px" }}>
              <button className="btn btn-green btn-sm" onClick={downloadCSV}>⬇ CSV</button>
              <button className="btn btn-ghost btn-sm" onClick={() => window.print()}>🖨 인쇄</button>
            </div>
          </div>
          <div style={{ overflowX:"auto" }}>
            <table>
              <thead>
                <tr>
                  <th>순위</th><th>등번호</th><th>닉네임</th>
                  {judgeUsers.map(j => <th key={j.id} style={{ textAlign:"center" }}>{j.name}</th>)}
                  <th style={{ textAlign:"center" }}>평균</th>
                </tr>
              </thead>
              <tbody>
                {ranked.map((p,idx) => {
                  const avg    = getAvg(p.id);
                  const isAdv  = (round.advancedIds||[]).includes(p.id);
                  return (
                    <tr key={p.id} style={{ background:isAdv?"rgba(39,174,96,.06)":"" }}>
                      <td>
                        <span className="serif" style={{ fontWeight:700, color:idx<3?"var(--gold)":"var(--muted)" }}>{idx+1}</span>
                        {isAdv && <span style={{ fontSize:"10px", color:"var(--green)", marginLeft:"4px" }}>↑진출</span>}
                      </td>
                      <td style={{ color:"var(--gold)", fontWeight:700 }}>{p.number}</td>
                      <td>{p.nickname||"–"}</td>
                      {judgeUsers.map(j => {
                        const e  = scores?.[selRound]?.[j.id]?.[p.id];
                        const sc = calcEntryScore(e, cat.scoringType, cat.criteria||[]);
                        return <td key={j.id} style={{ textAlign:"center", color:sc!=null?"var(--text)":"var(--muted)" }}>{sc!=null?sc.toFixed(2):"–"}</td>;
                      })}
                      <td style={{ textAlign:"center", fontWeight:700, color:avg!=null?"var(--gold)":"var(--muted)" }}>
                        {avg!=null?avg.toFixed(2):"–"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════
   MAIN APP  (Firebase compat)
════════════════════════════════════════════ */
function App() {
  const isPublicMode = typeof window !== "undefined" &&
    (window.location.search.includes("public") || window.location.hash.includes("public"));

  const [lang, setLang]         = useState("ko");
  const t = (key) => TR[lang]?.[key] ?? key;

  // ── 로컬 상태 (Firebase 데이터로 덮어쓰여짐) ──
  const [users, setUsers]               = useState(INIT_USERS);
  const [tournament, setTournament]     = useState(INIT_TOURNAMENT);
  const [scores, setScores]             = useState({});
  const [judgeLocks, setJudgeLocks]     = useState({});
  const [directorLocks, setDirectorLocks] = useState({});
  const [broadcast, setBroadcast]       = useState(null);
  const [fbReady, setFbReady]           = useState(false);
  const [fbError, setFbError]           = useState(false);

  // ── 앱 UI 상태 ──
  const [currentUser, setCurrentUser]   = useState(null);
  const [pendingUser, setPendingUser]   = useState(null);
  const [view, setView]                 = useState("scoring");
  const [editingName, setEditingName]   = useState(false);
  const [editNameVal, setEditNameVal]   = useState("");

  const isSyncing = React.useRef(false);
  const dbRef     = React.useRef(null);

  // ── Firebase 구독 ──
  React.useEffect(() => {
    const db = window.__firebaseDB;
    if (!db) { setFbError(true); return; }
    dbRef.current = db;

    let readyCount = 0;
    const TOTAL = 6;
    const markReady = () => { readyCount++; if (readyCount >= TOTAL) setFbReady(true); };

    const safeset = (setter, defaultVal) => (snap) => {
      isSyncing.current = true;
      const v = snap.val();
      setter(v != null ? v : defaultVal);
      setTimeout(() => { isSyncing.current = false; }, 60);
      markReady();
    };

    const refs = [];
    const sub  = (path, setter, def) => {
      const r = db.ref(path);
      refs.push(r);
      r.on("value", safeset(setter, def));
    };

    sub("tournament",    setTournament,   INIT_TOURNAMENT);
    sub("users",         setUsers,        INIT_USERS);
    sub("scores",        setScores,       {});
    sub("judgeLocks",    setJudgeLocks,   {});
    sub("directorLocks", setDirectorLocks,{});
    sub("broadcast",     setBroadcast,    null);

    // 처음 접속이면 기본값 업로드
    db.ref("tournament").once("value").then(snap => {
      if (!snap.exists()) {
        db.ref("tournament").set(INIT_TOURNAMENT);
        db.ref("users").set(INIT_USERS);
      }
    });

    // 5초 타임아웃
    const timer = setTimeout(() => { if (!fbReady) setFbReady(true); }, 5000);

    return () => {
      refs.forEach(r => r.off("value"));
      clearTimeout(timer);
    };
  }, []);

  // ── Firebase write ──
  const fbSet = (path, value) => {
    if (!dbRef.current) return;
    dbRef.current.ref(path).set(value);
  };

  const mkSynced = (setter, path) => (updater) => {
    setter(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (!isSyncing.current) fbSet(path, next);
      return next;
    });
  };

  const syncedSetTournament    = mkSynced(setTournament,   "tournament");
  const syncedSetUsers         = mkSynced(setUsers,        "users");
  const syncedSetScores        = mkSynced(setScores,       "scores");
  const syncedSetJudgeLocks    = mkSynced(setJudgeLocks,   "judgeLocks");
  const syncedSetDirectorLocks = mkSynced(setDirectorLocks,"directorLocks");

  const syncedSetBroadcast = (val) => {
    setBroadcast(val);
    if (!isSyncing.current) fbSet("broadcast", val);
  };

  // ── 로그인 ──
  const handleLogin = (u) => setPendingUser(u);

  const handleNameConfirm = (u) => {
    syncedSetUsers(prev => (prev||[]).map(x => x.id===u.id ? {...x, name:u.name} : x));
    setCurrentUser(u); setPendingUser(null);
    if (u.role==="admin")    setView("setup");
    else if (u.role==="director") setView("director");
    else setView("scoring");
  };

  const handleNameEdit = () => { setEditNameVal(currentUser.name); setEditingName(true); };

  const saveNameEdit = () => {
    if (!editNameVal.trim()) return;
    syncedSetUsers(prev => (prev||[]).map(u => u.id===currentUser.id ? {...u, name:editNameVal.trim()} : u));
    setCurrentUser(prev => ({ ...prev, name: editNameVal.trim() }));
    setEditingName(false);
  };

  // ── 로딩 화면 ──
  if (!fbReady) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:"14px" }}>
        <style>{STYLE}</style>
        <div style={{ fontSize:"44px" }}>🌹</div>
        <p style={{ color:"var(--gold)", fontSize:"15px" }}>Firebase 연결 중…</p>
        <p style={{ color:"var(--muted)", fontSize:"12px" }}>잠시만 기다려 주세요</p>
      </div>
    );
  }

  // ── 관객 모드 ──
  if (isPublicMode) {
    return (
      <PublicObserverPanel tournament={tournament} scores={scores} users={users}
        lang={lang} setLang={setLang} t={t} />
    );
  }

  // ── 일반 앱 ──
  return (
    <div className="app">
      <style>{STYLE}</style>

      {!currentUser && !pendingUser && (
        <LoginScreen users={users||INIT_USERS} onLogin={handleLogin} lang={lang} setLang={setLang} t={t} />
      )}

      {pendingUser && !currentUser && (
        <SetNameScreen user={pendingUser} onConfirm={handleNameConfirm} t={t} />
      )}

      {currentUser && (
        <>
          <Navbar user={currentUser} view={view} setView={setView}
            onLogout={() => { setCurrentUser(null); setPendingUser(null); }}
            lang={lang} setLang={setLang} onNameClick={handleNameEdit} t={t} />

          {editingName && (
            <div className="modal-overlay" onClick={() => setEditingName(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth:"360px" }}>
                <h3 style={{ fontSize:"15px", fontWeight:700, marginBottom:"14px" }}>✏️ 표시 이름 변경</h3>
                <input value={editNameVal} onChange={e => setEditNameVal(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && saveNameEdit()}
                  style={{ marginBottom:"14px", fontSize:"15px" }} autoFocus />
                <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
                  <button className="btn btn-ghost" onClick={() => setEditingName(false)}>{t("cancel")}</button>
                  <button className="btn btn-gold" onClick={saveNameEdit} disabled={!editNameVal.trim()}>저장</button>
                </div>
              </div>
            </div>
          )}

          <div style={{ paddingBottom:"64px" }}>
            {view==="setup"    && <SetupPanel tournament={tournament} setTournament={syncedSetTournament} users={users} setUsers={syncedSetUsers} directorLocks={directorLocks} setDirectorLocks={syncedSetDirectorLocks} setJudgeLocks={syncedSetJudgeLocks} setScores={syncedSetScores} t={t} />}
            {view==="pmgmt"    && <ParticipantMgmtPanel tournament={tournament} setTournament={syncedSetTournament} t={t} />}
            {view==="scoring"  && <JudgeScoringPanel tournament={tournament} scores={scores} setScores={syncedSetScores} currentUser={currentUser} users={users} judgeLocks={judgeLocks} setJudgeLocks={syncedSetJudgeLocks} directorLocks={directorLocks} broadcast={broadcast} t={t} />}
            {view==="director" && <DirectorPanel tournament={tournament} scores={scores} setTournament={syncedSetTournament} users={users} judgeLocks={judgeLocks} setJudgeLocks={syncedSetJudgeLocks} directorLocks={directorLocks} setDirectorLocks={syncedSetDirectorLocks} setBroadcast={syncedSetBroadcast} broadcast={broadcast} currentUser={currentUser} t={t} />}
            {view==="live"     && <LivePanel tournament={tournament} scores={scores} users={users} t={t} />}
            {view==="export"   && <ExportPanel tournament={tournament} scores={scores} users={users} t={t} />}
          </div>

          <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"rgba(13,13,13,.97)", borderTop:"1px solid var(--border)", padding:"5px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", zIndex:40, backdropFilter:"blur(8px)" }}>
            <span style={{ fontSize:"10px", color:"var(--muted)" }}>
              🌹 <strong style={{ color:"var(--gold)" }}>Tango Judge System</strong>
              &nbsp;·&nbsp; <strong style={{ color:"var(--text)" }}>김동욱 / 김토끼</strong>
            </span>
            <span style={{ display:"flex", alignItems:"center", gap:"8px" }}>
              <span style={{ fontSize:"10px", display:"inline-flex", alignItems:"center", gap:"4px" }}>
                <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:"var(--green)", display:"inline-block", boxShadow:"0 0 5px var(--green)" }}></span>
                <span style={{ color:"var(--green)" }}>Firebase 연결됨</span>
              </span>
              <span style={{ fontSize:"10px", color:"var(--border)" }}>© 2026</span>
            </span>
          </div>
        </>
      )}
    </div>
  );
}



    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(ErrorBoundary, null, React.createElement(App))
    );
  </script>
</body>
</html>
