                      </td>
                      <td>
                        <div style={{ display:"flex", gap:"4px" }}>
                          {isEditing ? (
                            <>
                              <button className="btn btn-gold btn-sm" onClick={saveEdit}>저장</button>
                              <button className="btn btn-ghost btn-sm" onClick={()=>setEditingId(null)}>취소</button>
                            </>
                          ) : (
                            <>
                              <button className="btn btn-ghost btn-sm"
                                onClick={e=>{ e.stopPropagation(); setEditingId(p.id); setEditNo(p.number); setEditNick(p.nickname||""); setEditGender(p.gender||"couple"); }}>
                                ✏
                              </button>
                              <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }}
                                onClick={e=>{ e.stopPropagation(); deleteP([p.id]); }}>
                                ×
                              </button>
                            </>
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* 새 참가자 추가 */}
          <div style={{ padding:"12px 16px", borderTop:"1px solid var(--border)", display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center", background:"var(--bg3)" }}>
            <span style={{ fontSize:"12px", color:"var(--muted)", minWidth:"60px" }}>새 참가자</span>
            <input value={newNo} onChange={e=>setNewNo(e.target.value)} placeholder="등번호" style={{ width:"90px" }}
              onKeyDown={e=>e.key==="Enter"&&addP()} />
            <input value={newNick} onChange={e=>setNewNick(e.target.value)} placeholder="닉네임" style={{ flex:1, minWidth:"120px" }}
              onKeyDown={e=>e.key==="Enter"&&addP()} />
            <select value={newGender} onChange={e=>setNewGender(e.target.value)} style={{ padding:"6px 10px", width:"auto" }}>
              <option value="couple">커플</option>
              <option value="male">남</option>
              <option value="female">여</option>
            </select>
            <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--gold)", color:"var(--gold)" }} onClick={addP}>+ 추가</button>
          </div>
        </div>
      )}

      {/* ── 종목 배정 탭 ── */}
      {tab==="assign" && (
        <div style={{ display:"flex", flexDirection:"column", gap:"16px" }}>
          {/* 범위 배정 도구 */}
          <div className="card" style={{ padding:"14px 16px" }}>
            <p style={{ fontSize:"12px", fontWeight:700, color:"var(--gold)", marginBottom:"10px" }}>⚡ 번호 범위 일괄 배정</p>
            <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"center" }}>
              <select value={rangeCat} onChange={e=>setRangeCat(e.target.value)} style={{ width:"160px", padding:"6px 10px" }}>
                {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                <input type="number" value={rangeFrom} onChange={e=>setRangeFrom(e.target.value)} placeholder="시작번호" style={{ width:"90px" }} />
                <span style={{ color:"var(--muted)" }}>~</span>
                <input type="number" value={rangeTo} onChange={e=>setRangeTo(e.target.value)} placeholder="끝번호" style={{ width:"90px" }} />
              </div>
              <select value={rangeAction} onChange={e=>setRangeAction(e.target.value)} style={{ width:"auto", padding:"6px 10px" }}>
                <option value="add">배정 추가</option>
                <option value="remove">배정 제거</option>
              </select>
              <button className="btn btn-gold btn-sm" onClick={applyRangeAssign}
                disabled={!rangeFrom||!rangeTo||!rangeCat}>
                적용
              </button>
            </div>
          </div>

          {/* 종목별 체크박스 그리드 */}
          {categories.map(cat=>{
            const assignedIds=new Set(cat.participantIds||[]);
            const catPs=getCatParticipants(tournament,cat.id);
            const toggleP=(pid)=>{
              setTournament(prev=>({
                ...prev,
                categories:prev.categories.map(c=>{
                  if (c.id!==cat.id) return c;
                  const ids=new Set(c.participantIds||[]);
                  ids.has(pid)?ids.delete(pid):ids.add(pid);
                  return {...c,participantIds:[...ids]};
                })
              }));
            };
            const assignAll=()=>{
              setTournament(prev=>({
                ...prev,
                categories:prev.categories.map(c=>c.id===cat.id?{...c,participantIds:participants.map(p=>p.id)}:c)
              }));
            };
            const clearAll=()=>{
              setTournament(prev=>({
                ...prev,
                categories:prev.categories.map(c=>c.id===cat.id?{...c,participantIds:[]}:c)
              }));
            };

            return (
              <div key={cat.id} className="card">
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"12px" }}>
                  <h3 style={{ fontSize:"14px", fontWeight:700 }}>{cat.name}</h3>
                  <span className="tag tag-muted">{catPs.length}명</span>
                  <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px", marginLeft:"auto" }} onClick={assignAll}>전원배정</button>
                  <button className="btn btn-ghost btn-sm" style={{ fontSize:"10px", color:"var(--red2)" }} onClick={clearAll}>전원해제</button>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"5px" }}>
                  {participants.map(p=>{
                    const assigned=assignedIds.has(p.id);
                    return (
                      <label key={p.id} style={{
                        display:"flex", alignItems:"center", gap:"4px", padding:"4px 8px",
                        background:assigned?"rgba(201,168,76,.12)":"var(--bg3)",
                        border:"1px solid "+(assigned?"var(--gold)":"var(--border)"),
                        borderRadius:"6px", cursor:"pointer", fontSize:"11px"
                      }}>
                        <input type="checkbox" checked={assigned} onChange={()=>toggleP(p.id)} />
                        <span style={{ color:assigned?"var(--gold)":"var(--muted)", fontWeight:700 }}>{p.number}</span>
                        {p.nickname&&<span>{p.nickname}</span>}
                      </label>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════════════════
   JUDGE SCORING PANEL
════════════════════════════════════════════ */
function JudgeScoringPanel({ tournament, scores, setScores, currentUser, users, judgeLocks, setJudgeLocks, directorLocks, broadcast, t }) {
  const [selCat, setSelCat]       = useState(tournament.categories[0]?.id||"");
  const [selRound, setSelRound]   = useState("");
  const [localScores, setLocalScores] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [blurOpposite, setBlurOpposite] = useState(false);

  const judgeId    = currentUser.id;
  const judgeUsers = users.filter(u=>u.role==="judge");
  const roundKey   = selRound;

  const isJudgeLocked    = judgeLocks?.[roundKey]?.[judgeId] || false;
  const isDirectorLocked = directorLocks?.[roundKey] || false;

  const cat = tournament.categories.find(c=>c.id===selCat);
  const round = cat?.rounds.find(r=>r.id===selRound);
  const catPs = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples = round ? catPs.filter(p=>round.coupleIds.includes(p.id)) : [];
  const isJJ = cat?.type==="jacknjill";
  const criteriaKeys = cat?.scoringType==="detailed" ? (cat.criteria||[]) : [];

  const getMyEntry = (coupleId) => {
    const saved = scores?.[roundKey]?.[judgeId]?.[coupleId] || {};
    const local = localScores[coupleId] || {};
    return { ...saved, ...local };
  };

  const updateSimple = (coupleId, val) => {
    setLocalScores(prev=>({ ...prev, [coupleId]:{ ...(prev[coupleId]||{}), simple:val===""?null:Number(val) } }));
  };

  const updateCriteria = (coupleId, key, val) => {
    setLocalScores(prev=>({
      ...prev,
      [coupleId]:{ ...(prev[coupleId]||{}), criteria:{ ...(prev[coupleId]?.criteria||{}), [key]:val===""?null:Number(val) } }
    }));
  };

  const updateMemo = (coupleId, val) => {
    setLocalScores(prev=>({ ...prev, [coupleId]:{ ...(prev[coupleId]||{}), memo:val } }));
  };

  const handleSubmit = () => {
    if (isDirectorLocked||isJudgeLocked) return;
    setScores(sc=>({
      ...sc,
      [roundKey]:{
        ...sc[roundKey],
        [judgeId]:{ ...(sc[roundKey]?.[judgeId]||{}), ...localScores }
      }
    }));
    setLocalScores({});
    setSubmitted(true);
    setTimeout(()=>setSubmitted(false),3000);
  };

  const toggleJudgeLock = () => {
    if (isDirectorLocked) return;
    setJudgeLocks(prev=>({
      ...prev,
      [roundKey]:{ ...(prev[roundKey]||{}), [judgeId]:!isJudgeLocked }
    }));
  };

  return (
    <div style={{ padding:"20px", maxWidth:"1100px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"14px" }}>

      {/* 종목 선택 */}
      <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
        {tournament.categories.map(c=>(
          <button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`}
            onClick={()=>{ setSelCat(c.id); setSelRound(""); setLocalScores({}); }}>
            {c.name}
          </button>
        ))}
      </div>

      {/* 론다 선택 */}
      {cat && (
        <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
          <span style={{ color:"var(--gold)", fontSize:"13px", fontWeight:700, borderLeft:"3px solid var(--gold)", paddingLeft:"8px", letterSpacing:".5px" }}>
            론다
          </span>
          {cat.rounds.map(r=>(
            <button key={r.id} className={`pill-tab ${selRound===r.id?"active":""}`}
              onClick={()=>{ setSelRound(r.id); setLocalScores({}); }}>
              {r.title}
            </button>
          ))}
          {isJJ && (
            <label style={{ display:"flex", alignItems:"center", gap:"6px", fontSize:"13px", color:"var(--muted)", cursor:"pointer", marginLeft:"12px" }}>
              <input type="checkbox" checked={blurOpposite} onChange={e=>setBlurOpposite(e.target.checked)} />
              {t("blurOpposite")}
            </label>
          )}
        </div>
      )}

      {/* 감독관 공지 */}
      {broadcast && broadcast.roundId===selRound && (
        <div style={{ background:"rgba(230,126,34,.1)", border:"2px solid var(--warn)", borderRadius:"10px", padding:"14px 18px", display:"flex", alignItems:"center", gap:"12px" }}>
          <span style={{ fontSize:"22px" }}>📢</span>
          <div>
            <p style={{ fontWeight:700, color:"var(--warn)", fontSize:"13px", marginBottom:"4px" }}>감독관 공지</p>
            <p style={{ fontSize:"14px" }}>{broadcast.message}</p>
          </div>
        </div>
      )}

      {/* 채점 테이블 */}
      {round && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          <div style={{ padding:"12px 16px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" }}>
            <span className="serif" style={{ color:"var(--gold)", fontWeight:700 }}>{round.title}</span>
            {isDirectorLocked && <span className="tag tag-green">🔒 감독관 확정</span>}
            {isJudgeLocked && !isDirectorLocked && <span className="tag tag-green">📌 최종제출됨</span>}
            <div style={{ marginLeft:"auto", display:"flex", gap:"8px" }}>
              <button className="btn btn-gold btn-sm" onClick={handleSubmit}
                disabled={!!submitted||isDirectorLocked||isJudgeLocked}>
                {submitted?"✓ "+t("submitted"):isDirectorLocked?"🔒 확정됨":isJudgeLocked?"🔒 최종제출됨":t("submitAll")}
              </button>
              <button className={`btn btn-sm ${isJudgeLocked?"btn-green":"btn-ghost"}`}
                onClick={toggleJudgeLock} disabled={isDirectorLocked}
                style={{ borderColor:isJudgeLocked?"var(--green)":"var(--warn)", color:isJudgeLocked?"var(--green)":"var(--warn)" }}>
                {isJudgeLocked?"✓ 최종제출 (클릭=취소)":"📌 최종점수제출"}
              </button>
            </div>
          </div>

          <div style={{ overflowX:"auto" }}>
            <table>
              <thead>
                <tr>
                  <th style={{ minWidth:"50px" }}>{t("entryNo")}</th>
                  <th style={{ minWidth:"140px" }}>{t("nickname")}</th>
                  {isJJ && <th>{t("gender")}</th>}
                  <th style={{ minWidth:"180px" }}>{t("memo")}</th>
                  {criteriaKeys.length>0
                    ? criteriaKeys.map(k=><th key={k} style={{ minWidth:"75px" }}>{k}</th>)
                    : <th style={{ minWidth:"80px" }}>{t("score")}</th>
                  }
                  {tournament.showAvgToJudge!==false && (
                    <>
                      <th style={{ minWidth:"80px" }}>{t("avgScore")}</th>
                      <th style={{ minWidth:"70px" }}>{t("diff")}</th>
                    </>
                  )}
                </tr>
              </thead>
              <tbody>
                {couples.map(p=>{
                  const entry    = getMyEntry(p.id);
                  const myScore  = calcEntryScore(entry, cat.scoringType, criteriaKeys);
                  const avgScore = calcCoupleAvg(scores, roundKey, p.id, judgeUsers, cat.scoringType, criteriaKeys);
                  const isOutlier = tournament.outlierEnabled!==false && tournament.showAvgToJudge!==false &&
                    isOutlierScore(myScore, judgeId, scores, roundKey, p.id, judgeUsers, cat.scoringType, criteriaKeys, tournament.outlierThreshold);
                  const shouldBlur = isJJ && blurOpposite && (
                    (currentUser.jIdx%2===0 && p.gender==="female") ||
                    (currentUser.jIdx%2===1 && p.gender==="male")
                  );
                  const disabled = isDirectorLocked || isJudgeLocked;

                  return (
                    <tr key={p.id} className={shouldBlur?"blurred":""}>
                      <td style={{ fontWeight:700, color:"var(--gold)", fontSize:"16px" }}>{p.number}</td>
                      <td>
                        <div style={{ fontWeight:500 }}>{p.nickname}</div>
                        {isOutlier && <div className="warn-box">⚠ 평균 이탈</div>}
                      </td>
                      {isJJ && (
                        <td>
                          <span className={`tag ${p.gender==="male"?"tag-muted":"tag-red"}`}>
                            {p.gender==="male"?t("maleShort"):t("femaleShort")}
                          </span>
                        </td>
                      )}
                      <td>
                        <textarea value={entry.memo||""} onChange={e=>updateMemo(p.id,e.target.value)}
                          placeholder={t("memoPlaceholder")} rows={2} disabled={disabled}
                          style={{ width:"100%", minWidth:"160px", resize:"vertical", fontSize:"12px" }} />
                      </td>
                      {criteriaKeys.length>0
                        ? criteriaKeys.map(k=>(
                            <td key={k}>
                              <input type="number" min={0} max={10} step={0.5}
                                value={entry.criteria?.[k]??""} disabled={disabled}
                                onChange={e=>updateCriteria(p.id,k,e.target.value)}
                                className="score-input" placeholder="–" />
                            </td>
                          ))
                        : (
                          <td>
                            <input type="number" min={0} max={10} step={0.5}
                              value={entry.simple??""} disabled={disabled}
                              onChange={e=>updateSimple(p.id,e.target.value)}
                              className="score-input" placeholder="–" />
                          </td>
                        )
                      }
                      {tournament.showAvgToJudge!==false && (
                        <>
                          <td style={{ textAlign:"center", fontWeight:600, color:avgScore!=null?"var(--gold)":"var(--muted)" }}>
                            {avgScore!=null?avgScore.toFixed(2):"–"}
                          </td>
                          <td style={{ textAlign:"center", color:isOutlier?"var(--warn)":myScore!=null&&avgScore!=null?"var(--text)":"var(--muted)" }}>
                            {myScore!=null&&avgScore!=null?(myScore-avgScore>=0?"+":"")+(myScore-avgScore).toFixed(2):"–"}
                          </td>
                        </>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════════════════
   DIRECTOR PANEL
════════════════════════════════════════════ */
function DirectorPanel({ tournament, scores, setTournament, users, judgeLocks, setJudgeLocks, directorLocks, setDirectorLocks, setBroadcast, broadcast, currentUser, t }) {
  const [selCat, setSelCat]           = useState(tournament.categories[0]?.id||"");
  const [selRound, setSelRound]       = useState("");
  const [showBroadcast, setShowBroadcast] = useState(false);
  const [broadcastMsg, setBroadcastMsg]   = useState("");
  const [showLockConfirm, setShowLockConfirm] = useState(false);
  const [selectedAdvanced, setSelectedAdvanced] = useState([]);
  const [showStageAdvance, setShowStageAdvance] = useState(null);

  const judgeUsers = users.filter(u=>u.role==="judge");
  const cat  = tournament.categories.find(c=>c.id===selCat);
  const round = cat?.rounds.find(r=>r.id===selRound);

  const judgeLocksForRound  = judgeLocks?.[selRound] || {};
  const isDirectorLocked    = directorLocks?.[selRound] || false;
  const allJudgesLocked     = judgeUsers.length>0 && judgeUsers.every(j=>judgeLocksForRound[j.id]);
  const lockedJudges        = judgeUsers.filter(j=>judgeLocksForRound[j.id]);

  const catPs  = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples = round ? catPs.filter(p=>round.coupleIds.includes(p.id)) : [];

  const getAvg = (cid) => calcCoupleAvg(scores, selRound, cid, judgeUsers, cat?.scoringType, cat?.criteria);
  const getJudgeScore = (jid, cid) => calcEntryScore(scores?.[selRound]?.[jid]?.[cid], cat?.scoringType, cat?.criteria);

  const ranked = useMemo(()=>{
    return [...couples].sort((a,b)=>{
      const av=getAvg(a.id), bv=getAvg(b.id);
      if (av==null&&bv==null) return 0;
      if (av==null) return 1; if (bv==null) return -1;
      return bv-av;
    });
  }, [couples, scores, selRound, judgeUsers, cat]);

  // Stage advance: collect advancers from finalized rounds
  const stageForAdvance = cat?.stages?.find(s=>s.stageKey===showStageAdvance);
  const stageAdvancers = useMemo(()=>{
    if (!showStageAdvance||!cat) return [];
    const ids = new Set(
      cat.rounds.filter(r=>r.stageKey===showStageAdvance&&r.finalized).flatMap(r=>r.advancedIds||[])
    );
    const ps = [...ids].map(id=>tournament.participants.find(p=>p.id===id)).filter(Boolean);
    return ps.sort((a,b)=>{
      const rsA=cat.rounds.filter(r=>r.stageKey===showStageAdvance&&r.coupleIds.includes(a.id)&&r.finalized);
      const rsB=cat.rounds.filter(r=>r.stageKey===showStageAdvance&&r.coupleIds.includes(b.id)&&r.finalized);
      const avA=rsA.length?rsA.map(r=>calcCoupleAvg(scores,r.id,a.id,judgeUsers,cat.scoringType,cat.criteria)||0).reduce((x,y)=>x+y,0)/rsA.length:0;
      const avB=rsB.length?rsB.map(r=>calcCoupleAvg(scores,r.id,b.id,judgeUsers,cat.scoringType,cat.criteria)||0).reduce((x,y)=>x+y,0)/rsB.length:0;
      return avB-avA;
    });
  }, [showStageAdvance, cat, tournament.participants, scores]);

  const nextStageKey    = showStageAdvance==="prelim"?"semi":showStageAdvance==="semi"?"final":null;
  const nextStageRounds = nextStageKey&&cat ? cat.rounds.filter(r=>r.stageKey===nextStageKey) : [];

  // Check if all rounds in current stage are locked → show advance banner
  const currentStage = round ? cat?.stages?.find(s=>s.stageKey===round.stageKey) : null;
  const currentStageKey = round?.stageKey;
  const stageRoundsAll = cat?.rounds.filter(r=>r.stageKey===currentStageKey)||[];
  const allStageRoundsLocked = stageRoundsAll.length>0 && stageRoundsAll.every(r=>directorLocks?.[r.id]) && !currentStage?.finalized;

  const lockRound = () => {
    if (selectedAdvanced.length===0) return;
    setDirectorLocks(prev=>({...prev,[selRound]:true}));
    setTournament(prev=>({
      ...prev,
      categories:prev.categories.map(c=>c.id!==selCat?c:{
        ...c,
        rounds:c.rounds.map(r=>r.id===selRound?{...r,finalized:true,advancedIds:selectedAdvanced}:r)
      })
    }));
    setShowLockConfirm(false);
    setSelectedAdvanced([]);
  };

  const unlockRound = () => {
    if (currentUser?.role!=="admin") return;
    const dl={...directorLocks}; delete dl[selRound]; setDirectorLocks(dl);
    const jl={...judgeLocks}; delete jl[selRound]; setJudgeLocks(jl);
    setTournament(prev=>({
      ...prev,
      categories:prev.categories.map(c=>c.id!==selCat?c:{
        ...c,
        rounds:c.rounds.map(r=>r.id===selRound?{...r,finalized:false,advancedIds:[]}:r)
      })
    }));
  };

  const sendBroadcast = () => {
    if (!broadcastMsg.trim()||!selRound) return;
    setBroadcast({ roundId:selRound, message:broadcastMsg.trim(), ts:Date.now() });
    setBroadcastMsg(""); setShowBroadcast(false);
  };

  const confirmStageAdvancement = (stageKey, distMode) => {
    const cat2 = tournament.categories.find(c=>c.id===selCat);
    const advIds = [...new Set(
      (cat2?.rounds||[]).filter(r=>r.stageKey===stageKey&&r.finalized).flatMap(r=>r.advancedIds||[])
    )];
    const nextSK = stageKey==="prelim"?"semi":stageKey==="semi"?"final":null;
    let newRounds = cat2?.rounds||[];

    if (nextSK && advIds.length>0 && distMode!=="none") {
      const nextRounds = newRounds.filter(r=>r.stageKey===nextSK);
      if (nextRounds.length>0) {
        let pool = advIds.map(id=>tournament.participants.find(p=>p.id===id)).filter(Boolean);
        if (distMode==="random") {
          for (let i=pool.length-1;i>0;i--) {
            const j=Math.floor(Math.random()*(i+1));
            [pool[i],pool[j]]=[pool[j],pool[i]];
          }
        } else {
          pool.sort((a,b)=>parseInt(a.number)-parseInt(b.number));
        }
        let idx=0;
        const distributed = nextRounds.map((r,i)=>{
          const sz = r.targetSize||Math.ceil(pool.length/nextRounds.length);
          const chunk = pool.slice(idx,idx+sz).map(p=>p.id);
          idx += sz;
          return {...r,coupleIds:chunk};
        });
        newRounds = newRounds.map(r=>{ const d=distributed.find(x=>x.id===r.id); return d||r; });
      }
    }

    // Final stage: compute rankings
    const isFinal = stageKey==="final";
    let finalRankings = [];
    if (isFinal) {
      const finalRounds=(cat2?.rounds||[]).filter(r=>r.stageKey==="final"&&r.finalized);
      const finalIds=[...new Set(finalRounds.flatMap(r=>r.advancedIds||[]))];
      finalRankings = finalIds.map(pid=>{
        const p=tournament.participants.find(x=>x.id===pid);
        const rs=finalRounds.filter(r=>r.coupleIds.includes(pid));
        const avgs=rs.map(r=>calcCoupleAvg(scores,r.id,pid,judgeUsers,cat2?.scoringType,cat2?.criteria)).filter(v=>v!=null);
        const avg=avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:null;
        return { pid, number:p?.number||"?", nickname:p?.nickname||"", avg };
      }).sort((a,b)=>b.avg!=null&&a.avg!=null?b.avg-a.avg:b.avg!=null?1:-1)
        .map((r,i)=>({...r,rank:i+1}));
    }

    setTournament(prev=>({
      ...prev,
      finalResults: isFinal ? {
        ...prev.finalResults,
        [selCat]:{ confirmed:true, confirmedAt:Date.now(), rankings:finalRankings, catName:cat2?.name||selCat }
      } : prev.finalResults,
      categories:prev.categories.map(c=>c.id!==selCat?c:{
        ...c,
        stages:c.stages.map(s=>s.stageKey===stageKey?{...s,finalized:true,advancedIds:advIds}:s),
        rounds:newRounds
      })
    }));
    setShowStageAdvance(null);
  };

  return (
    <div style={{ padding:"20px", maxWidth:"1100px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"14px" }}>

      {/* 종목 탭 */}
      <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
        {tournament.categories.map(c=>(
          <button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`}
            onClick={()=>{ setSelCat(c.id); setSelRound(""); }}>
            {c.name}
          </button>
        ))}
      </div>

      {/* 론다 탭 (스테이지 구분선 포함) */}
      {cat && (
        <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", alignItems:"center" }}>
          {cat.stages.map((stage,si)=>{
            const stageRs = cat.rounds.filter(r=>r.stageKey===stage.stageKey);
            const stageColor = stage.stageKey==="prelim"?"var(--gold)":stage.stageKey==="semi"?"#3498db":"var(--green)";
            return (
              <React.Fragment key={stage.stageKey}>
                {si>0 && <span style={{ color:"var(--border)", fontSize:"16px" }}>│</span>}
                <span style={{ fontSize:"11px", color:stageColor, fontWeight:700, marginRight:"2px" }}>{stage.label}</span>
                {stageRs.map(r=>{
                  const locked = directorLocks?.[r.id];
                  return (
                    <button key={r.id} className={`pill-tab ${selRound===r.id?"active":""}`}
                      onClick={()=>setSelRound(r.id)} style={{ fontSize:"11px" }}>
                      {r.title}{locked?" 🔒":""}
                    </button>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
      )}

      {/* 선택된 론다 정보 */}
      {round && (
        <div className="card" style={{ padding:"14px 18px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" }}>
            <span className="serif" style={{ fontSize:"16px", color:"var(--gold)", fontWeight:700 }}>{round.title}</span>
            {isDirectorLocked && <span className="tag tag-green">🔒 확정</span>}
            <div style={{ marginLeft:"auto", display:"flex", gap:"8px" }}>
              <button className="btn btn-ghost btn-sm" style={{ borderColor:"var(--warn)", color:"var(--warn)" }}
                onClick={()=>{ setBroadcastMsg(""); setShowBroadcast(true); }}>
                📢 공지 발송
              </button>
              {!isDirectorLocked && (
                <button className="btn btn-red btn-sm"
                  onClick={()=>{ setSelectedAdvanced([]); setShowLockConfirm(true); }}
                  disabled={!allJudgesLocked}
                  style={{ opacity:allJudgesLocked?1:0.45 }}
                  title={!allJudgesLocked?"모든 심판 최종제출 필요":""}>
                  🔒 론다 확정{!allJudgesLocked?` (${lockedJudges.length}/${judgeUsers.length})`:""}
                </button>
              )}
              {isDirectorLocked && currentUser?.role==="admin" && (
                <button className="btn btn-ghost btn-sm" style={{ color:"var(--red2)" }} onClick={unlockRound}>
                  ⚠ 관리자: 잠금해제
                </button>
              )}
            </div>
          </div>

          {/* 심판 최종제출 현황 */}
          <div style={{ marginTop:"10px", display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:"12px", color:"var(--muted)" }}>심판 최종제출:</span>
            {judgeUsers.map(j=>(
              <span key={j.id} className={`tag ${judgeLocksForRound[j.id]?"tag-green":"tag-muted"}`} style={{ fontSize:"11px" }}>
                {judgeLocksForRound[j.id]?"✓ ":"○ "}{j.name}
              </span>
            ))}
            {allJudgesLocked && <span style={{ fontSize:"12px", color:"var(--green)", fontWeight:700 }}>— 전원 완료 ✓</span>}
          </div>
        </div>
      )}

      {/* 스테이지 진출 배너 */}
      {allStageRoundsLocked && round && (
        <div style={{ background:"rgba(39,174,96,.08)", border:"1px solid var(--green)", borderRadius:"10px", padding:"12px 18px", display:"flex", alignItems:"center", gap:"14px", flexWrap:"wrap" }}>
          <span style={{ color:"var(--green)", fontWeight:700 }}>
            ✅ {currentStage?.label} 전체 론다 확정 완료
          </span>
          <button className="btn btn-green btn-sm"
            onClick={()=>{ setShowStageAdvance(currentStageKey); }}>
            진출자 확정 →
          </button>
        </div>
      )}

      {/* 채점 테이블 */}
      {round && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          <div style={{ overflowX:"auto" }}>
            <table>
              <thead>
                <tr>
                  <th>{t("rank")}</th>
                  <th>{t("entryNo")}</th>
                  <th>{t("nickname")}</th>
                  {judgeUsers.map(j=>(
                    <th key={j.id} style={{ textAlign:"center", minWidth:"80px" }}>
                      <div>{j.name}</div>
                      <div style={{ fontSize:"10px", color:judgeLocksForRound[j.id]?"var(--green)":"var(--warn)", fontWeight:400 }}>
                        {judgeLocksForRound[j.id]?"✓최종":"미확정"}
                      </div>
                    </th>
                  ))}
                  <th style={{ textAlign:"center" }}>{t("avg")}</th>
                  <th>메모</th>
                </tr>
              </thead>
              <tbody>
                {ranked.map((p,idx)=>{
                  const avg=getAvg(p.id);
                  const isAdv  = round.finalized && round.advancedIds?.includes(p.id);
                  const isElim = round.finalized && !round.advancedIds?.includes(p.id);
                  const memo   = judgeUsers.map(j=>scores?.[selRound]?.[j.id]?.[p.id]?.memo).filter(Boolean).join(" | ");
                  return (
                    <tr key={p.id} style={{
                      background:isAdv?"rgba(39,174,96,.08)":isElim?"rgba(192,57,43,.05)":"",
                      borderLeft:isAdv?"3px solid var(--green)":isElim?"3px solid rgba(192,57,43,.3)":"3px solid transparent"
                    }}>
                      <td>
                        <span className="serif" style={{ fontSize:"18px", color:idx<3?"var(--gold)":"var(--muted)", fontWeight:700 }}>{idx+1}</span>
                        {isAdv&&<span style={{ fontSize:"10px", color:"var(--green)", fontWeight:700, marginLeft:"4px" }}>↑진출</span>}
                        {isElim&&<span style={{ fontSize:"10px", color:"var(--muted)", marginLeft:"4px" }}>탈락</span>}
                      </td>
                      <td style={{ fontWeight:700, color:isAdv?"var(--green)":isElim?"var(--muted)":"var(--gold)" }}>{p.number}</td>
                      <td style={{ color:isElim?"var(--muted)":"var(--text)" }}>{p.nickname||"–"}</td>
                      {judgeUsers.map(j=>{
                        const sc=getJudgeScore(j.id,p.id);
                        const others=judgeUsers.filter(x=>x.id!==j.id).map(x=>getJudgeScore(x.id,p.id)).filter(v=>v!=null);
                        const isOut=sc!=null&&others.length>0&&tournament.outlierEnabled!==false&&
                          others.filter(v=>Math.abs(sc-v)>=tournament.outlierThreshold).length>=Math.ceil(others.length*0.6);
                        return (
                          <td key={j.id} style={{ textAlign:"center", color:isOut?"var(--warn)":sc!=null?"var(--text)":"var(--muted)", fontWeight:isOut?700:400 }}>
                            {sc!=null?sc.toFixed(2):"–"}
                            {isOut&&<span style={{ fontSize:"9px", display:"block", color:"var(--warn)" }}>⚠</span>}
                          </td>
                        );
                      })}
                      <td style={{ textAlign:"center", fontWeight:700, color:avg!=null?"var(--gold)":"var(--muted)" }}>
                        {avg!=null?avg.toFixed(2):"–"}
                      </td>
                      <td style={{ fontSize:"11px", color:"var(--muted)", maxWidth:"200px" }}>{memo||""}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ padding:"12px 20px", borderTop:"1px solid var(--border)", display:"flex", gap:"20px", flexWrap:"wrap", alignItems:"center" }}>
            {tournament.outlierEnabled!==false && (
              <span style={{ fontSize:"12px", color:"var(--muted)" }}>⚠ 이탈기준: ±{tournament.outlierThreshold}점</span>
            )}
            {round.finalized && (
              <>
                <span style={{ fontSize:"12px", display:"flex", alignItems:"center", gap:"5px" }}>
                  <span style={{ width:"10px", height:"10px", background:"rgba(39,174,96,.4)", display:"inline-block", borderRadius:"2px" }}></span>
                  <span style={{ color:"var(--green)" }}>진출</span>
                </span>
                <span style={{ fontSize:"12px", display:"flex", alignItems:"center", gap:"5px" }}>
                  <span style={{ width:"10px", height:"10px", background:"rgba(192,57,43,.25)", display:"inline-block", borderRadius:"2px" }}></span>
                  <span style={{ color:"var(--muted)" }}>탈락</span>
                </span>
                <span style={{ fontSize:"12px", color:"var(--green)", fontWeight:600 }}>
                  진출 {round.advancedIds?.length||0}명 / 전체 {couples.length}명
                </span>
              </>
            )}
          </div>
        </div>
      )}

      {/* ── 공지 발송 모달 ── */}
      {showBroadcast && (
        <div className="modal-overlay" onClick={()=>setShowBroadcast(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:"440px" }}>
            <h3 style={{ fontSize:"16px", fontWeight:700, marginBottom:"12px" }}>📢 심판에게 공지</h3>
            <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"12px" }}>
              선택된 론다의 심판 채점 화면에 즉시 표시됩니다.
            </p>
            <textarea value={broadcastMsg} onChange={e=>setBroadcastMsg(e.target.value)}
              placeholder="예) 이제 최종 점수를 제출해주세요."
              style={{ width:"100%", height:"100px", resize:"vertical", marginBottom:"12px" }} />
            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button className="btn btn-ghost" onClick={()=>setShowBroadcast(false)}>{t("cancel")}</button>
              <button className="btn btn-gold" onClick={sendBroadcast} disabled={!broadcastMsg.trim()}>발송</button>
            </div>
          </div>
        </div>
      )}

      {/* ── 론다 확정 모달 ── */}
      {showLockConfirm && (
        <div className="modal-overlay" onClick={()=>setShowLockConfirm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:"500px" }}>
            <h3 style={{ fontSize:"16px", fontWeight:700, marginBottom:"12px" }}>🔒 론다 점수 확정</h3>
            {!allJudgesLocked && (
              <div style={{ background:"rgba(192,57,43,.1)", border:"1px solid var(--red2)", borderRadius:"8px", padding:"10px 14px", marginBottom:"14px" }}>
                <p style={{ color:"var(--red2)", fontSize:"13px", fontWeight:600 }}>
                  🚫 미제출 심판: {judgeUsers.filter(j=>!judgeLocksForRound[j.id]).map(j=>j.name).join(", ")}
                </p>
              </div>
            )}
            {allJudgesLocked && selectedAdvanced.length===0 && (
              <div style={{ background:"rgba(230,126,34,.1)", border:"1px solid var(--warn)", borderRadius:"8px", padding:"10px 14px", marginBottom:"14px" }}>
                <p style={{ color:"var(--warn)", fontSize:"13px" }}>⚠ 진출자를 최소 1명 이상 선택해야 합니다.</p>
              </div>
            )}
            <p style={{ fontSize:"13px", marginBottom:"10px" }}>
              확정 후 관리자 외 수정 불가. 진출자를 클릭으로 선택하세요.
            </p>
            <div style={{ marginBottom:"12px", maxHeight:"300px", overflowY:"auto" }}>
              <table>
                <thead>
                  <tr><th>순위</th><th>번호</th><th>닉네임</th><th>평균</th><th>진출</th></tr>
                </thead>
                <tbody>
                  {ranked.map((p,idx)=>{
                    const avg=getAvg(p.id);
                    const sel=selectedAdvanced.includes(p.id);
                    return (
                      <tr key={p.id} style={{ background:sel?"rgba(39,174,96,.08)":"", cursor:"pointer" }}
                        onClick={()=>setSelectedAdvanced(prev=>sel?prev.filter(id=>id!==p.id):[...prev,p.id])}>
                        <td><span className="serif" style={{ color:idx<3?"var(--gold)":"var(--muted)", fontWeight:700 }}>{idx+1}</span></td>
                        <td style={{ color:"var(--gold)", fontWeight:700 }}>{p.number}</td>
                        <td>{p.nickname||"–"}</td>
                        <td style={{ color:"var(--gold)", fontWeight:700 }}>{avg!=null?avg.toFixed(2):"–"}</td>
                        <td style={{ textAlign:"center" }}>
                          <input type="checkbox" checked={sel} readOnly />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <p style={{ fontSize:"12px", color:"var(--green)", marginBottom:"12px" }}>{selectedAdvanced.length}명 선택</p>
            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button className="btn btn-ghost" onClick={()=>setShowLockConfirm(false)}>{t("cancel")}</button>
              <button className="btn btn-red" onClick={lockRound}
                disabled={selectedAdvanced.length===0}
                style={{ opacity:selectedAdvanced.length>0?1:0.45 }}>
                🔒 확정 ({selectedAdvanced.length}명 진출)
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── 스테이지 진출 확정 + 배분 모달 ── */}
      {showStageAdvance && (
        <div className="modal-overlay" onClick={()=>setShowStageAdvance(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:"520px" }}>
            <h3 style={{ fontSize:"16px", fontWeight:700, marginBottom:"6px" }}>
              🏆 {stageForAdvance?.label} 진출자 확정
              {nextStageKey ? ` 및 ${nextStageKey==="semi"?"준결승":"결승"} 배분` : ""}
            </h3>
            <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"14px" }}>
              각 론다 확정 시 결정된 진출자 목록입니다.
            </p>

            {/* 진출자 목록 */}
            <div style={{ background:"var(--bg3)", borderRadius:"8px", padding:"10px 14px", marginBottom:"14px", maxHeight:"240px", overflowY:"auto" }}>
              <p style={{ fontSize:"12px", color:"var(--green)", fontWeight:700, marginBottom:"8px" }}>
                ✅ 진출 확정 {stageAdvancers.length}명
              </p>
              {stageAdvancers.length===0
                ? <p style={{ fontSize:"12px", color:"var(--red2)" }}>⚠ 론다 확정 시 진출자를 선택해야 합니다.</p>
                : stageAdvancers.map((p,idx)=>{
                    const rs=cat.rounds.filter(r=>r.stageKey===showStageAdvance&&r.coupleIds.includes(p.id)&&r.finalized);
                    const avgs=rs.map(r=>calcCoupleAvg(scores,r.id,p.id,judgeUsers,cat.scoringType,cat.criteria)).filter(v=>v!=null);
                    const av=avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:null;
                    const fromRound=cat.rounds.find(r=>r.stageKey===showStageAdvance&&(r.advancedIds||[]).includes(p.id));
                    return (
                      <div key={p.id} style={{ display:"flex", alignItems:"center", gap:"8px", padding:"4px 6px", marginBottom:"3px" }}>
                        <span className="serif" style={{ color:"var(--gold)", fontWeight:700, minWidth:"20px" }}>{idx+1}</span>
                        <span style={{ color:"var(--gold)", fontWeight:700, minWidth:"34px" }}>{p.number}</span>
                        <span style={{ flex:1, fontSize:"13px" }}>{p.nickname||"–"}</span>
                        {fromRound && <span style={{ fontSize:"10px", color:"var(--muted)" }}>{fromRound.title}</span>}
                        <span style={{ color:"var(--green)", fontWeight:700 }}>{av!=null?av.toFixed(2):"–"}</span>
                      </div>
                    );
                  })
              }
            </div>

            {/* 결승 확정 메시지 */}
            {!nextStageKey && stageAdvancers.length>0 && (
              <div style={{ background:"rgba(39,174,96,.08)", border:"1px solid var(--green)", borderRadius:"8px", padding:"10px 14px", marginBottom:"14px" }}>
                <p style={{ color:"var(--green)", fontWeight:700, fontSize:"13px" }}>
                  🏆 결승 — 이 순위로 최종 결과를 확정하시겠습니까?
                </p>
                <p style={{ fontSize:"12px", color:"var(--muted)", marginTop:"4px" }}>
                  확정 후 라이브 화면에서 URL로 즉시 공유할 수 있습니다.
                </p>
              </div>
            )}

            {/* 다음 스테이지 배분 */}
            {nextStageKey && nextStageRounds.length>0 && stageAdvancers.length>0 && (
              <div style={{ background:"rgba(201,168,76,.06)", border:"1px solid rgba(201,168,76,.2)", borderRadius:"8px", padding:"10px 14px", marginBottom:"14px" }}>
                <p style={{ fontSize:"12px", color:"var(--gold)", fontWeight:700, marginBottom:"8px" }}>
                  📋 {nextStageKey==="semi"?"준결승":"결승"} 배분 방식 ({nextStageRounds.length}개 론다)
                </p>
                <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
                  <button className="btn btn-gold btn-sm"
                    onClick={()=>confirmStageAdvancement(showStageAdvance,"order")}>
                    🔢 등번호순
                  </button>
                  <button className="btn btn-red btn-sm"
                    onClick={()=>confirmStageAdvancement(showStageAdvance,"random")}>
                    🔀 랜덤
                  </button>
                  <button className="btn btn-ghost btn-sm"
                    onClick={()=>confirmStageAdvancement(showStageAdvance,"none")}
                    title="배분 없이 진출만 확정">
                    확정만
                  </button>
                </div>
                <p style={{ fontSize:"11px", color:"var(--muted)", marginTop:"6px" }}>
                  배분 후 대회설정 탭에서 수동 수정 가능합니다.
                </p>
              </div>
            )}

            {nextStageKey && nextStageRounds.length===0 && (
              <p style={{ fontSize:"12px", color:"var(--warn)", marginBottom:"14px" }}>
                ⚠ {nextStageKey==="semi"?"준결승":"결승"}에 론다가 없습니다. 대회설정에서 먼저 추가하세요.
              </p>
            )}

            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button className="btn btn-ghost" onClick={()=>setShowStageAdvance(null)}>{t("cancel")}</button>
              {(!nextStageKey || nextStageRounds.length===0) && (
                <button className="btn btn-green"
                  disabled={stageAdvancers.length===0}
                  style={{ opacity:stageAdvancers.length>0?1:0.5 }}
                  onClick={()=>confirmStageAdvancement(showStageAdvance,"order")}>
                  {!nextStageKey?`🏆 최종 순위 확정 (${stageAdvancers.length}명)`:`진출 확정 (${stageAdvancers.length}명)`}
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════════════════
   LIVE PANEL (for logged-in users)
════════════════════════════════════════════ */
function LivePanel({ tournament, scores, users, t }) {
  const [selCat, setSelCat]     = useState(tournament.categories[0]?.id||"");
  const [selRound, setSelRound] = useState("");
  const [mode, setMode]         = useState("final");

  const cat        = tournament.categories.find(c=>c.id===selCat);
  const round      = cat?.rounds.find(r=>r.id===selRound);
  const judgeUsers = users.filter(u=>u.role==="judge");
  const catPs      = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples    = round ? catPs.filter(p=>round.coupleIds.includes(p.id)) : [];
  const finalRes   = tournament.finalResults?.[selCat];
  const medals     = ["🥇","🥈","🥉"];

  const getAvg = (cid) => calcCoupleAvg(scores, selRound, cid, judgeUsers, cat?.scoringType, cat?.criteria);

  const ranked = useMemo(()=>{
    return [...couples].sort((a,b)=>{
      const av=getAvg(a.id), bv=getAvg(b.id);
      if (av==null&&bv==null) return 0;
      if (av==null) return 1; if (bv==null) return -1;
      return bv-av;
    });
  }, [couples, scores, selRound]);

  const pageUrl = typeof window!=="undefined" ? window.location.href.split("?")[0] : "";

  return (
    <div style={{ padding:"24px", maxWidth:"820px", margin:"0 auto" }}>
      <div style={{ textAlign:"center", marginBottom:"24px" }}>
        <h1 className="serif" style={{ fontSize:"2.4rem", color:"var(--gold)", letterSpacing:"2px" }}>{t("liveTitle")}</h1>
        <p style={{ color:"var(--muted)", marginTop:"4px" }}>{tournament.name}</p>
      </div>

      {/* 종목 탭 */}
      <div style={{ display:"flex", gap:"8px", justifyContent:"center", flexWrap:"wrap", marginBottom:"12px" }}>
        {tournament.categories.map(c=>{
          const hasFinal = !!tournament.finalResults?.[c.id]?.confirmed;
          return (
            <button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`}
              onClick={()=>{ setSelCat(c.id); setSelRound(""); setMode(hasFinal?"final":"round"); }}>
              {c.name}{hasFinal?" 🏆":""}
            </button>
          );
        })}

function ExportPanel({ tournament, scores, users, t }) {
  const [selCat, setSelCat]     = useState(tournament.categories[0]?.id||"");
  const [selRound, setSelRound] = useState("");

  const cat        = tournament.categories.find(c=>c.id===selCat);
  const round      = cat?.rounds.find(r=>r.id===selRound);
  const judgeUsers = users.filter(u=>u.role==="judge");
  const catPs      = cat ? getCatParticipants(tournament, cat.id) : [];
  const couples    = round ? catPs.filter(p=>round.coupleIds.includes(p.id)) : [];

  const getAvg = (cid) => calcCoupleAvg(scores, selRound, cid, judgeUsers, cat?.scoringType, cat?.criteria);
  const ranked = useMemo(()=>[...couples].sort((a,b)=>{
    const av=getAvg(a.id),bv=getAvg(b.id);
    if(av==null&&bv==null)return 0;if(av==null)return 1;if(bv==null)return -1;return bv-av;
  }), [couples, scores, selRound]);

  const downloadCSV = () => {
    if (!round) return;
    const criteriaKeys = cat.scoringType==="detailed"?cat.criteria:[];
    const headers = ["순위","등번호","닉네임",...judgeUsers.map(j=>j.name),"평균"];
    const rows = ranked.map((p,idx)=>{
      const avg=getAvg(p.id);
      const jScores=judgeUsers.map(j=>{
        const e=scores?.[selRound]?.[j.id]?.[p.id];
        const sc=calcEntryScore(e,cat.scoringType,criteriaKeys);
        return sc!=null?sc.toFixed(2):"";
      });
      return [idx+1, p.number, p.nickname||"", ...jScores, avg!=null?avg.toFixed(2):""];
    });
    const csv = "\uFEFF"+[headers,...rows].map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`${round.title}_채점결과.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ padding:"24px", maxWidth:"900px", margin:"0 auto" }}>
      <h1 className="serif" style={{ fontSize:"1.8rem", color:"var(--gold)", marginBottom:"20px" }}>
        📤 {t("export")}
      </h1>

      <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", marginBottom:"12px" }}>
        {tournament.categories.map(c=>(
          <button key={c.id} className={`pill-tab ${selCat===c.id?"active":""}`}
            onClick={()=>{ setSelCat(c.id); setSelRound(""); }}>
            {c.name}
          </button>
        ))}
      </div>

      {cat && (
        <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", marginBottom:"20px" }}>
          {cat.rounds.map(r=>(
            <button key={r.id} className={`pill-tab ${selRound===r.id?"active":""}`} onClick={()=>setSelRound(r.id)}>
              {r.title}
            </button>
          ))}
        </div>
      )}

      {round && (
        <div className="card" style={{ padding:0, overflow:"hidden" }}>
          <div style={{ padding:"14px 20px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:"10px" }}>
            <span className="serif" style={{ color:"var(--gold)", fontWeight:700 }}>{round.title}</span>
            <div style={{ marginLeft:"auto", display:"flex", gap:"8px" }}>
              <button className="btn btn-green btn-sm" onClick={downloadCSV}>⬇ CSV 다운로드</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>window.print()}>🖨 인쇄</button>
            </div>
          </div>
          <div style={{ overflowX:"auto" }}>
            <table>
              <thead>
                <tr>
                  <th>순위</th>
                  <th>등번호</th>
                  <th>닉네임</th>
                  {judgeUsers.map(j=><th key={j.id} style={{ textAlign:"center" }}>{j.name}</th>)}
                  <th style={{ textAlign:"center" }}>평균</th>
                </tr>
              </thead>
              <tbody>
                {ranked.map((p,idx)=>{
                  const avg=getAvg(p.id);
                  const isAdv=round.advancedIds?.includes(p.id);
                  return (
                    <tr key={p.id} style={{ background:isAdv?"rgba(39,174,96,.06)":"" }}>
                      <td>
                        <span className="serif" style={{ fontWeight:700, color:idx<3?"var(--gold)":"var(--muted)" }}>{idx+1}</span>
                        {isAdv&&<span style={{ fontSize:"10px", color:"var(--green)", marginLeft:"4px" }}>↑진출</span>}
                      </td>
                      <td style={{ color:"var(--gold)", fontWeight:700 }}>{p.number}</td>
                      <td>{p.nickname||"–"}</td>
                      {judgeUsers.map(j=>{
                        const e=scores?.[selRound]?.[j.id]?.[p.id];
                        const sc=calcEntryScore(e,cat.scoringType,cat.criteria);
                        return <td key={j.id} style={{ textAlign:"center", color:sc!=null?"var(--text)":"var(--muted)" }}>{sc!=null?sc.toFixed(2):"–"}</td>;
                      })}
                      <td style={{ textAlign:"center", fontWeight:700, color:avg!=null?"var(--gold)":"var(--muted)" }}>
                        {avg!=null?avg.toFixed(2):"–"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

════════════════════════════════════════════ */
function App() {
  const isPublicMode = typeof window!=="undefined" &&
    (window.location.search.includes("public")||window.location.hash.includes("public"));

  const [lang, setLang]               = useState("ko");
  const t = (key) => TR[lang]?.[key] ?? key;

  const [users, setUsers]             = useState(INIT_USERS);
  const [tournament, setTournament]   = useState(INIT_TOURNAMENT);
  const [scores, setScores]           = useState({});
  const [judgeLocks, setJudgeLocks]   = useState({});
  const [directorLocks, setDirectorLocks] = useState({});
  const [broadcast, setBroadcast]     = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [pendingUser, setPendingUser] = useState(null);
  const [view, setView]               = useState("scoring");
  const [editingName, setEditingName] = useState(false);
  const [editNameVal, setEditNameVal] = useState("");
  const [fbStatus, setFbStatus]       = useState("connecting"); // connecting | ok | error

  // ── Firebase refs ──
  const dbRef     = React.useRef(null);
  const isSyncing = React.useRef(false);

  // ── Firebase 초기화 & 실시간 구독 ──
  React.useEffect(()=>{
    const db = window.__firebaseDB;
    if (!db) { setFbStatus("error"); return; }
    dbRef.current = db;

    const paths = {
      scores:        (v)=>{ isSyncing.current=true; setScores(v||{});        setTimeout(()=>isSyncing.current=false,50); },
      judgeLocks:    (v)=>{ isSyncing.current=true; setJudgeLocks(v||{});    setTimeout(()=>isSyncing.current=false,50); },
      directorLocks: (v)=>{ isSyncing.current=true; setDirectorLocks(v||{}); setTimeout(()=>isSyncing.current=false,50); },
      tournament:    (v)=>{ isSyncing.current=true; if(v) setTournament(v);  setTimeout(()=>isSyncing.current=false,50); },
      broadcast:     (v)=>{ isSyncing.current=true; setBroadcast(v||null);   setTimeout(()=>isSyncing.current=false,50); },
      users:         (v)=>{ isSyncing.current=true; if(v) setUsers(v);       setTimeout(()=>isSyncing.current=false,50); },
    };

    const unsubs = [];
    let connected = false;
    Object.entries(paths).forEach(([key, handler])=>{
      const ref = window.__fbRef(db, key);
      const unsub = window.__fbOnValue(ref, (snap)=>{
        if (!connected) { connected=true; setFbStatus("ok"); }
        handler(snap.val());
      });
      unsubs.push(unsub);
    });

    // 초기 데이터 없으면 기본값 업로드
    const initRef = window.__fbRef(db, "tournament");
    window.__fbGet(initRef).then(snap=>{
      if (!snap.exists()) {
        window.__fbSet(initRef, INIT_TOURNAMENT);
        window.__fbSet(window.__fbRef(db,"users"), INIT_USERS);
      }
    });

    return ()=>unsubs.forEach(u=>u());
  }, []);

  // ── Firebase write helpers ──
  const fbWrite = (path, value) => {
    const db = dbRef.current;
    if (!db) return;
    window.__fbSet(window.__fbRef(db, path), value);
  };

  const mkSynced = (setter, path) => (updater) => {
    setter(prev=>{
      const next = typeof updater==="function" ? updater(prev) : updater;
      if (!isSyncing.current) fbWrite(path, next);
      return next;
    });
  };

  const syncedSetScores        = mkSynced(setScores,        "scores");
  const syncedSetJudgeLocks    = mkSynced(setJudgeLocks,    "judgeLocks");
  const syncedSetDirectorLocks = mkSynced(setDirectorLocks, "directorLocks");
  const syncedSetTournament    = mkSynced(setTournament,    "tournament");
  const syncedSetUsers         = mkSynced(setUsers,         "users");

  const syncedSetBroadcast = (val) => {
    setBroadcast(val);
    if (!isSyncing.current) fbWrite("broadcast", val);
  };

  const handleLogin = (u) => { setPendingUser(u); };
  const handleNameConfirm = (u) => {
    syncedSetUsers(prev=>prev.map(x=>x.id===u.id?{...x,name:u.name}:x));
    setCurrentUser(u);
    setPendingUser(null);
    const role = u.role;
    if (role==="admin") setView("setup");
    else if (role==="director") setView("director");
    else setView("scoring");
  };

  const handleNameEdit = () => { setEditNameVal(currentUser.name); setEditingName(true); };
  const saveNameEdit = () => {
    if (!editNameVal.trim()) return;
    const updated = {...currentUser, name:editNameVal.trim()};
    syncedSetUsers(prev=>prev.map(u=>u.id===updated.id?{...u,name:editNameVal.trim()}:u));
    setCurrentUser(updated);
    setEditingName(false);
  };

  // Public observer mode
  if (isPublicMode) {
    return (
      <PublicObserverPanel
        tournament={tournament} scores={scores} users={users}
        lang={lang} setLang={setLang} t={t}
      />
    );
  }

  // Firebase 연결 대기 화면
  if (fbStatus==="connecting") {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:"16px" }}>
        <style>{STYLE}</style>
        <div style={{ fontSize:"48px" }}>🌹</div>
        <p style={{ color:"var(--gold)", fontSize:"16px" }}>Firebase 연결 중...</p>
        <p style={{ color:"var(--muted)", fontSize:"12px" }}>잠시만 기다려 주세요</p>
      </div>
    );
  }

  if (fbStatus==="error") {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:"16px" }}>
        <style>{STYLE}</style>
        <div style={{ fontSize:"48px" }}>⚠️</div>
        <p style={{ color:"var(--red2)", fontSize:"16px" }}>Firebase 연결 실패</p>
        <p style={{ color:"var(--muted)", fontSize:"12px" }}>인터넷 연결을 확인하거나 페이지를 새로고침 해주세요</p>
        <button className="btn btn-gold" onClick={()=>window.location.reload()}>새로고침</button>
      </div>
    );
  }

  return (
    <div className="app">
      <style>{STYLE}</style>

      {!currentUser && !pendingUser && (
        <LoginScreen users={users} onLogin={handleLogin} lang={lang} setLang={setLang} t={t} />
      )}

      {pendingUser && !currentUser && (
        <SetNameScreen user={pendingUser} onConfirm={handleNameConfirm} t={t} />
      )}

      {currentUser && (
        <>
          <Navbar
            user={currentUser} view={view} setView={setView}
            onLogout={()=>{ setCurrentUser(null); setPendingUser(null); }}
            lang={lang} setLang={setLang}
            onNameClick={handleNameEdit} t={t}
          />

          {editingName && (
            <div className="modal-overlay" onClick={()=>setEditingName(false)}>
              <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:"360px" }}>
                <h3 style={{ fontSize:"16px", fontWeight:700, marginBottom:"16px" }}>✏️ 표시 이름 변경</h3>
                <p style={{ fontSize:"12px", color:"var(--muted)", marginBottom:"12px" }}>
                  채점표에 표시되는 이름입니다
                </p>
                <input value={editNameVal} onChange={e=>setEditNameVal(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveNameEdit()}
                  style={{ marginBottom:"16px", fontSize:"15px" }} autoFocus />
                <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
                  <button className="btn btn-ghost" onClick={()=>setEditingName(false)}>{t("cancel")}</button>
                  <button className="btn btn-gold" onClick={saveNameEdit} disabled={!editNameVal.trim()}>저장</button>
                </div>
              </div>
            </div>
          )}

          <div style={{ paddingBottom:"70px" }}>
            {view==="setup"    && <SetupPanel tournament={tournament} setTournament={syncedSetTournament} users={users} setUsers={syncedSetUsers} directorLocks={directorLocks} setDirectorLocks={syncedSetDirectorLocks} setJudgeLocks={syncedSetJudgeLocks} setScores={syncedSetScores} t={t} />}
            {view==="pmgmt"    && <ParticipantMgmtPanel tournament={tournament} setTournament={syncedSetTournament} t={t} />}
            {view==="scoring"  && <JudgeScoringPanel tournament={tournament} scores={scores} setScores={syncedSetScores} currentUser={currentUser} users={users} judgeLocks={judgeLocks} setJudgeLocks={syncedSetJudgeLocks} directorLocks={directorLocks} broadcast={broadcast} t={t} />}
            {view==="director" && <DirectorPanel tournament={tournament} scores={scores} setTournament={syncedSetTournament} users={users} judgeLocks={judgeLocks} setJudgeLocks={syncedSetJudgeLocks} directorLocks={directorLocks} setDirectorLocks={syncedSetDirectorLocks} setBroadcast={syncedSetBroadcast} broadcast={broadcast} currentUser={currentUser} t={t} />}
            {view==="live"     && <LivePanel tournament={tournament} scores={scores} users={users} t={t} />}
            {view==="export"   && <ExportPanel tournament={tournament} scores={scores} users={users} t={t} />}
          </div>

          <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"rgba(13,13,13,.97)", borderTop:"1px solid var(--border)", padding:"6px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", zIndex:40, backdropFilter:"blur(8px)" }}>
            <span style={{ fontSize:"10px", color:"var(--muted)" }}>
              🌹 <strong style={{ color:"var(--gold)" }}>Tango Judge System</strong>
              &nbsp;·&nbsp; <strong style={{ color:"var(--text)" }}>김동욱 / 김토끼</strong>
            </span>
            <span style={{ display:"flex", alignItems:"center", gap:"8px" }}>
              <span style={{ fontSize:"10px", display:"inline-flex", alignItems:"center", gap:"4px" }}>
                <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:fbStatus==="ok"?"var(--green)":"var(--warn)", display:"inline-block", boxShadow:fbStatus==="ok"?"0 0 6px var(--green)":"0 0 6px var(--warn)" }}></span>
                <span style={{ color:fbStatus==="ok"?"var(--green)":"var(--warn)" }}>
                  {fbStatus==="ok"?"Firebase 연결됨":"연결 중..."}
                </span>
              </span>
              <span style={{ fontSize:"10px", color:"var(--border)" }}>© 2026 김동욱</span>
            </span>
          </div>
        </>
      )}
    </div>
  );
}



    const mountApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    };
    if (window.__firebaseDB) { mountApp(); }
    else {
      window.addEventListener("firebaseReady", mountApp, { once: true });
      setTimeout(()=>{ if (!window.__firebaseDB) mountApp(); }, 3000);
    }
  </script>
</body>
</html>
